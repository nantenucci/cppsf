TÍTULO III
Procedimiento extendido
ARTÍCULO 346°.- Procedencia y trámite.- Cuando la tramitación sea compleja a causa de la pluralidad de hechos, del elevado número de imputados o víctimas o por tratarse de casos de delincuencia organizada o trasnacional, a solicitud del Fiscal, el Tribunal podrá ordenar la duplicación de todos los términos previstos en este Código, sin perjuicio de los acuerdos relativos a la arbitración de trámite que las partes puedan acordar. La resolución será fundada y podrá ser apelada.
TÍTULO IV
Juicio por delito de acción privada
Capítulo I
Querella
ARTÍCULO 347°.- Derecho de querella.- Toda persona con capacidad civil que se pretenda ofendida por un delito de acción privada tendrá derecho a presentar querella ante el Tribunal de Juicio. Igual derecho tendrá el representante legal del incapaz, por los delitos cometidos en perjuicio de éste. En todos los casos el querellante deberá actuar con patrocinio letrado salvo que él o su representante fueran abogados.
ARTÍCULO 348°.- Unidad de representación.- Cuando los querellantes fueran varios, deberán actuar bajo una sola representación si acumularan sus pretensiones en un mismo juicio.
ARTÍCULO 349°.- Acumulación de pretensiones.- Cuando se tratara de calumnias o injurias recíprocas procederá la acumulación de las pretensiones en un solo juicio. Nunca se acumularán con las pretensiones que nacieran de delitos de acción pública.
ARTÍCULO 350°.- Forma y contenido de la querella. 1) el nombre, apellido y domicilio del querellante y en su caso, también los del mandatario; 2) el nombre apellido y domicilio del querellado, o si se ignorasen, cualquier descripción que sirva para identificarlo; 3) una relación clara, precisa y circunstanciada del hecho, con indicación del lugar, fecha y hora en que se ejecutó, si se supiera; 4) la calificación legal del mismo; 5) las pruebas que se ofrezcan, acompañándose la nómina de los testigos con indicación del nombre, apellido, profesión, domicilio y hechos sobre los que deberán ser examinados; los puntos a evacuar por los peritos y documentos que obren en su poder; cuando la querella versara sobre calumnias o injurias, el documento que a criterio del accionante las contenga, si fuera posible presentarlo; 6) la firma del querellante, cuando se presentara personalmente, o si no supiera firmar, la de otra persona a su ruego, quien deberá hacerlo ante la Oficina de Gestión Judicial. Si del texto de la querella surgieran hechos que encuadraran en un delito de acción pública, se remitirá copia de la misma al Fiscal a los fines que correspondieran.
( Artículo 350 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 351°.- Desistimiento expreso.- El querellante podrá desistir en cualquier estado del juicio, sin perjuicio de su responsabilidad por sus actos anteriores.
ARTÍCULO 352°.- Desistimiento tácito.- Se tendrá por desistida la acción privada: 1) cuando el procedimiento se paralizara durante un mes y el querellante no lo instara dentro del tercer día de notificado del decreto por el cual se lo intima a impulsarlo; 2) cuando el querellante o su mandatario no concurrieran a la audiencia de conciliación o del debate sin justa causa, la que deberá ser acreditada antes de su iniciación o en las horas hábiles del día siguiente; 3) cuando muerto o incapacitado el querellante, no compareciera ninguno de sus herederos o representantes legales a proseguir la acción, después de tres meses de ocurrida la muerte o incapacidad.
ARTÍCULO 353°.- Efectos del desistimiento.- Cuando el Tribunal declarara extinguida la pretensión penal por desistimiento expreso del querellante, se dictará el sobreseimiento del querellado y se le impondrán las costas, salvo acuerdo de partes al respecto. Cuando el desistimiento fuera tácito, el Tribunal dispondrá el archivo de las actuaciones, con costas a cargo del querellante.
Capítulo II
Procedimiento
ARTÍCULO 354°.- Tribunal interviniente.- Durante el procedimiento previo a la apertura del juicio y en el debate, intervendrán distintos jueces.
ARTÍCULO 355°.- Investigación preliminar.- Cuando el querellante ignorara el nombre, apellido o domicilio del autor del hecho, o debieran agregarse al procedimiento documentos que no estuvieran en su poder, podrá solicitar al Tribunal las medidas de investigación preliminar para individualizar al querellado o conseguir la documentación.
ARTÍCULO 356°.- Audiencia de conciliación.- Presentada la querella, se convocará a las partes a una audiencia de conciliación, remitiendo al querellado una copia de aquella. A la audiencia deberán asistir los defensores. Cuando no concurriera el querellado, se declarará la apertura del juicio.
ARTÍCULO 357°.- Conciliación y retractación.- Cuando las partes se conciliaran en la audiencia o en cualquier estado del juicio, se dictará sobreseimiento y las costas serán en el orden causado, salvo acuerdo de partes al respecto. Si el querellado se retractara en la audiencia o en la apertura del juicio, se le dictará sobreseimiento y las costas quedarán a su cargo. La retractación será publicada a petición del querellante, en la forma que el Tribunal estimara adecuada.
ARTÍCULO 358°.- Medidas de coerción.- El querellante podrá solicitar, antes de la apertura del juicio, medidas de coerción personal o real contra el querellado, las que procederán conforme a las disposiciones de este Código.
ARTÍCULO 359°.- Citación a juicio.- Si el querellado no concurriera a la audiencia de conciliación o no se produjera ésta o la retractación, será citado para que comparezca a juicio en el día y hora que se fije para el comienzo del debate.
ARTÍCULO 360°.- Normas del debate.- Se aplicarán las normas del debate común y del procedimiento abreviado con las modificaciones del presente Capítulo. En la sentencia que se dicte para los casos de calumnias e injurias cometidas por medio de la prensa, el Tribunal ordenará si lo pidiere el ofendido la publicación del pronunciamiento a cargo del condenado, si es posible, en el mismo medio, en el mismo lugar y con los mismos caracteres del artículo injurioso o calumnioso. Esta disposición será también aplicable en caso de retractación.
ARTÍCULO 361°.- Presencia del imputado.- Si el querellado no concurriera a la apertura del debate, a pedido del querellante se ordenará sea traído por la fuerza pública, suspendiéndose el comienzo del debate hasta tanto se lograra su comparendo.
ARTÍCULO 362°.- Excepciones.- Abierto el juicio, el querellado podrá plantear excepciones verbalmente, las que serán resueltas en la audiencia.
ARTÍCULO 363°.- Facultades del querellante.- El querellante tendrá similares facultades y obligaciones que correspondientes al Ministerio Público Fiscal respecto de los delitos de acción pública, y podrá ser interrogado como testigo.
TÍTULO V
Procedimiento para la reparación del daño
ARTÍCULO 364°.- Legitimación activa.- Dentro de los cinco días de adquirir firmeza la sentencia penal condenatoria, el querellante tendrá opción para reclamar ante el Tribunal de Juicio la indemnización del daño material y moral por el hecho calificado como delito.
ARTÍCULO 365°.- Límites.- El reclamo sólo podrá ser dirigido contra el penalmente condenado, debiendo fundamentarse en los límites del debate y de acuerdo a los términos de la sentencia que le sirve de presupuesto, en cuanto a los hechos.
ARTÍCULO 366°.- Contenido.- El escrito deberá contener la expresión concreta y detallada de los daños sufridos, y la relación que ellos tienen con el hecho delictivo conforme a los elementos del debate y de la condena penal precedente, la cita de las disposiciones legales del orden civil aplicables y la reparación deseada o el importe de las indemnizaciones pretendidas.
ARTÍCULO 367°.- Extensión del mandato.- La anterior designación de defensor del condenado penalmente importará mandato suficiente para representarlo judicialmente en la cuestión sin perjuicio de designar mandatario especial y autónomo al respecto.
ARTÍCULO 368°.- Admisibilidad y traslado.- Si el Tribunal de Juicio considerara formalmente admisible el reclamo, correrá traslado del mismo al condenado penal contra quien se dirija la pretensión resarcitoria, para que dentro del plazo perentorio de cinco días lo conteste. La notificación se practicará en el domicilio real del condenado penal y en el domicilio legal constituido en las actuaciones. En esta oportunidad el reclamado, fundadamente, podrá oponerse al procedimiento, debiendo en su caso el reclamante recurrir a la jurisdicción respectiva, en cuyo caso el Tribunal archivará las actuaciones sin recurso alguno. Cuando el Tribunal considerara inadmisible el reclamo, ordenará su devolución.
ARTÍCULO 369°.- Audiencia y pronunciamiento.- El Tribunal llamará a una audiencia dentro del plazo máximo de cinco días donde oirá a las partes, les requerirá las aclaraciones pertinentes y pronunciará sentencia sobre la cuestión accesoria. Rigen al respecto de esta audiencia las normas del juicio común en cuanto fueran aplicables. La indemnización pretendida será determinada prudencialmente por los Jueces. La decisión cuando no sea inmediatamente ejecutada o no pueda serlo por simple orden del Tribunal, se ejecutará por el interesado ante la jurisdicción civil y con arreglo al Código Procesal Civil y Comercial.
TÍTULO VI
Procedimiento de Hábeas Corpus
Capítulo I
Disposiciones Generales
ARTÍCULO 370°.- Procedencia.- Corresponderá la denuncia de hábeas corpus ante un acto u omisión de autoridad pública que arbitrariamente y en violación de normas constitucionales implique: 1) una limitación o amenaza actual de la libertad ambulatoria, sin orden escrita de autoridad competente; 2) el mantenimiento manifiestamente ilegítimo de una privación de la libertad inicialmente dispuesta por orden escrita de autoridad competente; 3) una agravación ilegítima de las formas y condiciones en que se cumple la privación de la libertad, sin perjuicio de las facultades propias del Juez del proceso si lo hubiera.
ARTÍCULO 371°.- Titularidad.- Podrá denunciar tanto el afectado como cualquier otra persona a su favor, sin necesidad de poder, ni patrocinio letrado.
ARTÍCULO 372°.- Juez competente.- Será competente para conocer del hábeas corpus cualquier Juez letrado que tuviera jurisdicción en el lugar donde se hubiera efectuado o se presuma que está por efectuarse la privación o restricción de la libertad personal.
Capítulo II
Procedimiento
ARTÍCULO 373°.- Denuncia.- La denuncia podrá ser deducida en forma verbal, escrita o telegráfica, en cualquier día y hora, y deberá contener: 1) nombre y domicilio real del denunciante; 2) nombre, domicilio real y demás datos personales conocidos de la persona en cuyo favor se denuncia; 3) autoridad de quien emana el acto que se afirma como lesivo; 4) causa o pretexto del acto que se afirma como lesivo en la medida del conocimiento del denunciante; 5) expresará además en qué consiste la ilegitimidad del acto. Si el denunciante ignorara alguno de los requisitos contenidos en los números 2), 3) y 4), proporcionará los datos que mejor condujeran a su averiguación.
ARTÍCULO 374°.- Deber de recepción y partes procesales. El Tribunal ante quien se formulara la denuncia deberá recibirla y darle trámite de inmediato. Presentada la denuncia se notificará al Ministerio Público de la Acusación y a la autoridad requerida, quienes serán parte necesaria en el procedimiento. En los hábeas corpus colectivos y según la naturaleza del planteo, podrá darse intervención a Fiscalía de Estado.
( Artículo 374 modificado por el Artículo 35 la Ley N° 14258 )
ARTÍCULO 375°.- Desestimación o incompetencia.- El Juez rechazará la denuncia que no fuera procedente en virtud del artículo 370, si se declarara incompetente remitirá las actuaciones al Tribunal que considere competente. La resolución será apelable. El Juez no podrá rechazar la denuncia por defectos formales, proveyendo de inmediato las medidas necesarias para su subsanación, sin perjuicio de las sanciones que correspondan.
ARTÍCULO 376°.- Auto de hábeas corpus.- Cuando se tratara de la privación de la libertad de una persona, formulada la denuncia el Juez ordenará inmediatamente o en un plazo que no excederá de diez horas, que la autoridad requerida, presente ante él al detenido. Solicitará además un informe circunstanciado del motivo que funda la medida, la forma y condiciones que se cumple, si ha obrado por orden escrita de autoridad competente, caso en el cual deberá acompañarla, y si el detenido hubiera sido puesto a disposición de otra autoridad: a quién, por qué causa, y en qué oportunidad se efectuó la transferencia. Este informe podrá efectuarse verbalmente en oportunidad de la audiencia donde se presenta al detenido, dejando constancia en acta. Cuando se tratara de amenaza actual de privación de libertad de una persona, el Juez ordenará que la autoridad requerida presente el informe a que se refiere el párrafo anterior. Si se ignorara la autoridad que detenta la persona privada de su libertad o de la cual emana el acto lesivo que sirve de base a la denuncia, el Juez librará la orden a los superiores jerárquicos de la dependencia que se indique. La orden se emitirá por escrito con expresión de fecha y hora salvo que el Juez considerara necesario constituirse personalmente en el lugar donde se encuentre el detenido, en tal caso podrá emitirla oralmente, pero dejará constancia en acta. Cuando se tratara del mantenimiento manifiestamente ilegítimo de una privación de la libertad inicialmente dispuesta por orden escrita de autoridad competente, se requerirá información sobre el tiempo de detención y de toda otra circunstancia útil para el esclarecimiento de la causal invocada.
ARTÍCULO 377°.- Audiencia y resolución.- La orden implicará para la autoridad requerida citación a la audiencia oral donde se dará lectura a la denuncia y al informe. Luego, se interrogará al amparado y se proveerá, en su caso, a los exámenes que correspondan, concediéndose la palabra a la autoridad requerida y al amparado, personalmente o por intermedio de su defensor. En el procedimiento de hábeas corpus no será admitida ninguna recusación, pero si el Juez se considerara comprendido en una causal de excusación, así lo declarará, mandando cumplir la audiencia ante el Juez que corresponda. Si se estimara necesaria la realización de diligencias probatorias, el Juez las incorporará en el mismo acto u ordenará que se produzcan a la mayor brevedad posible. Finalizada la recepción de la prueba, se oirá a los intervinientes y se dictará inmediata resolución, procediéndose a su lectura completa. Podrá prescindirse de la audiencia cuando esta resultara innecesaria para el acogimiento de la denuncia.
ARTÍCULO 378°.- Sanciones y costas.- El Juez podrá imponer hasta treinta días multa o arresto hasta diez días al funcionario responsable de dilaciones o entorpecimiento en el trámite o al culpable del acto lesivo, sin perjuicio de la responsabilidad penal que le corresponda. Las costas podrán imponerse al funcionario responsable de dicho acto y en caso de ser rechazado el hábeas corpus, serán a cargo del peticionario.
ARTÍCULO 379°.- Recurso. Podrá interponerse recurso de apelación contra la decisión del Tribunal que acoja o rechace la denuncia de hábeas corpus. La apelación contra la resolución que hace lugar al hábeas corpus colectivo es apelable por la administración penitenciaria o por Fiscalía de Estado, con efecto suspensivo desde la interposición del recurso.
( Artículo 379 modificado por el Artículo 36 la Ley N° 14258 )
TÍTULO VII
Procedimiento por Flagrancia
ARTÍCULO 379° bis.- Procedimiento por flagrancia. Aplicación. Se podrá aplicar el procedimiento establecido en el presente título en los supuestos de flagrancia descriptos en el artículo 213 de este Código. Sin perjuicio de ello, tal procedimiento será de aplicación obligatoria en caso de delitos cometidos en flagrancia y con armas de fuego. La aprehensión de una persona en flagrancia será comunicada de inmediato al Fiscal, quien decidirá el cese de la aprehensión o dispondrá la detención, si fuere procedente.
( Artículo 379 bis modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 379 ter.- Audiencia imputativa por hecho en flagrancia. En los casos previstos en el artículo precedente, el Fiscal solicitará que se realice la audiencia imputativa establecida en el artículo 274 dentro de las setenta y dos (72) horas del inicio de la privación de libertad, prorrogable a solicitud fundada del Fiscal por veinticuatro (24) horas, y la realización del trámite como Juicio por Flagrancia.
( Artículo 379 ter modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 379° quater.- Trámite. El trámite se seguirá por los siguientes actos: 1) Medidas Cautelares: en la audiencia se concederá al imputado la posibilidad de declarar ante el Juez sobre la imputación que se le hubiere hecho conocer, dentro de las previsiones del artículo 318. En la misma audiencia se plantearán y resolverán las medidas cautelares del artículo 223 y siguientes. Oído el imputado y resueltas las medidas cautelares, si se plantearan, el Fiscal podrá solicitar al Juez que la causa pase directamente a juicio oral; 2) Planteamiento y resolución de salidas alternativas: si el Juez acogiere la solicitud del Fiscal dará oportunidad a las partes a que planteen las soluciones alternativas que prevé el Código, la suspensión del procedimiento a prueba o el procedimiento abreviado. Para esto, concederá un cuarto intermedio, luego del cual resolverá en la misma audiencia, quedando concluido el proceso si se acordaran salidas alternativas; 3) Continuación del trámite y ofrecimiento de prueba: si no se plantearen soluciones alternativas o si éstas no fueran convalidadas por el Fiscal, éste formulará acusación si lo considera pertinente, de lo contrario podrá proponer que sea válida la audiencia imputativa, ofreciendo prueba y realizando su pretensión punitiva. Podrá hacerlo en la misma audiencia o en un lapso no mayor a tres (3) días. Si hubiera querellante se le correrá traslado, quien en un plazo de tres (3) días podrá adherirse a la acusación del Fiscal o acusar particularmente y deberá indicar las pruebas de que pensare valerse en el juicio. La defensa podrá ofrecer en el plazo establecido en el párrafo anterior. El ofrecimiento de prueba deberá realizarse conforme lo dispuesto en el artículo 299. Si las partes tienen algo que objetar en relación a la prueba ofrecida por las restantes deberán indicarlo por escrito dentro de los tres (3) días posteriores. El Juez podrá rechazar los planteos in limine o convocar a audiencia previo a decidir.
( Artículo 379 quater modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 379° quinquie.- JUICIO ORAL: Satisfecho el ofrecimiento de pruebas realizado por las partes, el juez dictará auto de apertura del juicio oral fijando la Oficina de Gestión Judicial fecha de la audiencia del debate lo mas próximo posible y en cualquier caso dentro de los diez días siguientes siempre que se hubiere asegurado la comparecencia del imputado. Las resoluciones que el juez dicte de conformidad a lo dispuesto en el presente artículo no serán susceptibles de recurso alguno. El juicio oral se desarrollará en los términos previstos por el Libro IV, Título I de este Código.
( Artículo 379 quinquies incorporado por el Artículo 2 la Ley N° 13472 )

LIBRO V
RECURSOS
TÍTULO I
Disposiciones generales
ARTÍCULO 380°.- Facultad de recurrir.- Las resoluciones judiciales serán recurribles sólo por los medios y en los casos expresamente establecidos. El derecho de recurrir corresponderá tan sólo a quien le fuera expresamente acordado, siempre que tuviera un interés directo en la eliminación, revocación o reforma de la resolución. Cuando la ley no distinguiera entre las diversas partes, aquel pertenecerá a cualquiera de ellas.
ARTÍCULO 381°.- Recursos del Ministerio Público de la Acusación. Los representantes del Ministerio Público de la Acusación podrán recurrir incluso a favor del imputado, o en virtud de instrucciones particulares o generales del Fiscal Regional respectivo o de instrucciones generales del Fiscal General del Ministerio Público de la Acusación, no obstante el dictamen contrario que hubieran emitido con anterioridad.
( Artículo 381 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 382°.- Recursos del imputado.- El imputado podrá recurrir cualquier resolución contraria a su interés, en los casos y condiciones previstos en este Código. Los recursos a favor del imputado podrán ser deducidos por él o su defensor.
ARTÍCULO 383°.- Facultades del querellante.- El querellante podrá recurrir en los mismos supuestos en que está facultado el Fiscal para hacerlo.
ARTÍCULO 384°.- Condiciones de interposición.- Los recursos deberán interponerse, para ser admisibles, en las condiciones de tiempo y forma que se determinan, con específica indicación de los puntos de la decisión que fueran impugnados. Diferida la redacción de los fundamentos de una resolución, el plazo para recurrir comenzará a correr una vez notificados los mismos.
ARTÍCULO 385°.- Recursos durante las audiencias.- Durante las audiencias sólo se podrá deducir reposición. Su interposición se entenderá como protesta de recurrir en apelación para el caso en que el Tribunal desestime la impugnación deducida y sea procedente.
ARTÍCULO 386°.- Efecto extensivo.- Cuando en un proceso hubiera varios coimputados, el recurso interpuesto en interés de uno de ellos favorecerá a los demás, siempre que los motivos en que se fundara no sean exclusivamente personales.
ARTÍCULO 387°.- Efecto del recurso. La interposición de un recurso suspenderá la ejecución de la decisión, salvo disposición en contrario. No tendrá efecto suspensivo cuando se hubiera ordenado la libertad del imputado o en el caso en que el recurso se interponga contra medidas cautelares de coerción personal.
( Artículo 387 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 388°.- Desistimiento.- Las partes que hubieran interpuesto un recurso podrán desistir de él antes de su resolución, cargando con las costas. El defensor no podrá desistir de los recursos interpuestos sin mandato expreso de su representado, posterior a la interposición del mismo.
ARTÍCULO 389°.- Inadmisibilidad y rechazo.- El Tribunal competente para entender en un recurso deberá declararlo inadmisible cuando la resolución impugnada fuera irrecurrible, o no se cumpliera con los requisitos formales que hacen a su admisibilidad. También deberá rechazar liminarmente el recurso cuando fuera, con evidencia, improcedente.
ARTÍCULO 390°.- Queja por recurso denegado.- Cuando sea indebidamente denegado un recurso que procediere ante otro Tribunal, ante éste podrá presentarse directamente en queja el recurrente a fin de que se declare mal denegado el recurso. La queja se interpondrá por escrito dentro de los tres (3) días de notificado el decreto denegatorio, si los Tribunales tuvieren su asiento en la misma ciudad; en caso contrario, el término será de ocho (8) días. Enseguida se requerirá informe al respecto del Tribunal contra el que se haya deducido y éste lo evacuará en el plazo de tres (3) días. Si lo estimare necesario para mejor proveer, el Tribunal ante el que se interponga el recurso ordenará que se le remitan las actuaciones de inmediato. La resolución será dictada por auto, después de recibido el informe o las actuaciones. Si la queja fuere desestimada, las actuaciones serán devueltas sin más trámite al Tribunal que corresponda. En caso contrario, se declarará mal denegado el recurso, lo que se comunicará a aquél, para que emplace a las partes y proceda según corresponda.
ARTÍCULO 391°.- Competencia del Tribunal de Alzada.- El recurso atribuirá al Tribunal de Alzada el conocimiento del proceso sólo en cuanto a los puntos de la resolución a que se refieren los agravios. Sin embargo, cuando se tratara de mejorar la situación del imputado no regirá la limitación precedente. Las resoluciones recurridas solamente por el imputado o a su favor, no podrán ser modificadas en su perjuicio.
TÍTULO II
Reposición
ARTÍCULO 392°.- Procedencia.- El recurso de reposición procederá contra las resoluciones dictadas sin sustanciación, a fin de que el mismo Tribunal que las dictó las revoque o modifique por contrario imperio.
ARTÍCULO 393°.- Plazo y forma.- El recurso se interpondrá y fundará por escrito dentro del tercer día de notificada la resolución, pero cuando ésta se dictara en una audiencia, deberá interponerse y fundarse oralmente en el mismo acto. El Tribunal resolverá, previa vista al eventual contradictor, en el término de tres días si se interpusiera por escrito, o en el mismo acto si lo hubiera sido en audiencia. En este último caso podrá diferir la redacción de su fundamentación hasta el día siguiente.
TÍTULO III
Apelación
Capítulo I
Procedencia
ARTÍCULO 394°.- Procedencia.- Este recurso sólo podrá deducirse: 1) en los casos especialmente previstos por la ley; 2) contra resoluciones que causen un gravamen irreparable; 3) contra las sentencias definitivas; 4) contra los autos que resolvieran sobre la acción, la pena o una medida de seguridad; 5) contra los autos que rechacen el acuerdo previsto para los procedimientos abreviados o la suspensión del procedimiento a prueba. Este recurso también podrá ser deducido por el imputado cuando concurra alguno de los supuestos que autorice el recurso de revisión.
ARTÍCULO 395°.- Condición de admisibilidad.- Cuando el recurso atacara un defecto del procedimiento, se requerirá como condición de admisibilidad que el recurrente haya reclamado oportunamente su subsanación o hubiera hecho protesta de recurrir en apelación, salvo en los casos de defectos absolutos motivantes de invalidación.
ARTÍCULO 396°.- Recursos del Ministerio Público Fiscal.- El Fiscal podrá impugnar: 1) los sobreseimientos; 2) las sentencias absolutorias; 3) las sentencias condenatorias; 4) los autos mencionados en el artículo precedente.
ARTÍCULO 397°.- Legitimación del imputado.- El imputado podrá impugnar: 1) la sentencia condenatoria; 2) la sentencia de sobreseimiento o absolutoria que imponga una medida de seguridad; 3) los autos que apliquen medidas cautelares, o que denieguen la extinción o suspensión de la pena, la suspensión del juicio a prueba o el procedimiento abreviado.
Capítulo II
Procedimiento
ARTÍCULO 398°.- Interposición.- El recurso de apelación se interpondrá ante el Tribunal que dictó la resolución, debidamente fundado, por escrito y con firma de letrado, dentro del plazo de diez (10) días si se trata de una sentencia, de tres (3) días si se trata de la aplicación de una medida cautelar, y de cinco (5) días en los demás casos. En esta oportunidad se citarán concretamente los errores de juicio en que se considere que se ha incurrido, las disposiciones legales que se consideren violadas o erróneamente aplicadas, y se expresará cual es la aplicación que se pretende, debiendo indicarse separadamente cada motivo con sus fundamentos. El impugnante podrá requerir la producción de prueba cuando se alegare algún hecho nuevo que pueda tener incidencia para la resolución de la causa o cuando no se hubiere practicado la prueba ofrecida por el solicitante por motivos ajenos a su voluntad.
ARTÍCULO 399°.- Remisión. Constitución del Tribunal.- Cumplidos los plazos anteriores, de inmediato se remitirán los autos al Tribunal de apelación, debiendo las partes fijar domicilio y el modo de recibir comunicaciones. Si el número de jueces lo permitiere, se integrará el Tribunal por sorteo o sistema similar que se llevará a cabo ante la Oficina de Gestión Judicial y según reglamentación a dictar. La integración será notificada a las partes y a los designados a los efectos de las recusaciones o excusaciones a las que hubiere lugar.
ARTÍCULO 400°.- Inadmisibilidad y rechazo.- Cuando se adviertan defectos formales en el escrito de interposición del recurso, el Tribunal deberá intimar al impugnante para que en el plazo de cinco días sean subsanados, bajo sanción de inadmisibilidad.
ARTÍCULO 401°.- Trámite. Abierto el recurso, el Tribunal convocará a una audiencia con un intervalo no menor de tres días ni mayor de quince según la urgencia o complejidad del caso, en la que se producirá la prueba y se oirá a las partes, las que podrán ampliar la fundamentación o desistir de algunos motivos, pero no podrán introducir otros nuevos, salvo los previstos para el recurso de revisión. Dicha audiencia deberá convocarse en el plazo máximo de siete días si la apelación se hubiere interpuesto contra una resolución que dispuso la prisión preventiva del imputado.
( Artículo 401 modificado por el Artículo 2 de la Ley N° 14448 )
ARTICULO 401 bis.- Declaración del impacto de la víctima. Con posterioridad a la conclusión del debate, el Juez o Tribunal convocará a la víctima o víctimas para que sean escuchadas en relación a lo que tengan que decir respecto de la afectación provocada por el delito. En la audiencia sólo estará presente la víctima, y a los efectos del control de la naturaleza de la declaración estarán las partes técnicas. El imputado no participará excepto que la víctima lo autorice. La víctima podrá ser acompañada por una persona de su confianza o por un profesional que ella designe. En la misma, el Juez explicará sucintamente el estado de la causa y escuchará a la víctima respecto de la afectación o el impacto que el hecho delictivo le generó, sus vivencias, efectos, expectativas y demás circunstancias que quiera manifestar sobre el impacto. A los fines de facilitar su escucha y en aras de evitar la revictimización o eventuales afectaciones, la víctima podrá hacer uso de este derecho por escrito o por medios audiovisuales que sean remitidos al Tribunal. Es condición para la validez de la sentencia la sustanciación de la declaración de impacto o su ofrecimiento de manera efectiva a la víctima si ésta no optó por ejercer este derecho.
( Artículo 401 bis incorporado por el Artículo 9 la Ley N° 14181 )
ARTÍCULO 402°.- Deliberación. Concluido el trámite fijado en el artículo anterior, los Jueces se reunirán a deliberar de conformidad a las normas que regulan el juicio común si el Tribunal de Cámara fuera pluripersonal. Si la importancia de las cuestiones a resolver o lo avanzado de la hora lo justificara, la deliberación podrá ser diferida para otra fecha. El presidente deberá señalar el tiempo de estudio para cada miembro del Tribunal. La resolución se dictará dentro de los veinte (20) días de concluida la audiencia de trámite, respetándose en lo pertinente lo dispuesto para la que se dicte en juicio común. Para la apelación de la resolución prevista en el artículo 303, la resolución podrá dictarse en la misma audiencia o dentro de los diez (10) días de concluida la misma. En los demás casos, se estará a lo establecido en el artículo 127.
( Artículo 402 modificado por el Artículo 14 la Ley N° 14392 )
ARTÍCULO 403°.- Decisión.- La sentencia o auto se dictará por mayoría de votos y en las condiciones previstas en el artículo 138; en su caso, si ésta no se obtuviere para la escala o monto de la sanción, deberá aplicarse el término medio de todos lo votos. El recurso permitirá, dentro de los límites fijados en el artículo 391, el examen y corrección de las cuestiones impugnadas.
ARTÍCULO 404°.- Revocación o anulación total o parcial.- El Tribunal que hiciera lugar al recurso, según corresponda, revocará o anulará total o parcialmente la resolución impugnada y ordenará el reenvío para la renovación de la actividad que se trate, indicándose en su caso el objeto concreto del nuevo juicio, procedimiento o resolución. Cuando de la decisión resulte la absolución del procesado, la extinción de la acción o la pena, el cese de una medida de seguridad, o sea evidente que para dictar una nueva sentencia o resolución no es necesaria la realización de un nuevo juicio o procedimiento, el Tribunal resolverá directamente sin reenvío, siempre que se preserve el derecho del imputado a la doble instancia recursiva.
ARTÍCULO 405°.- Reenvío.- Si se reenvía a un nuevo juicio o procedimiento, no podrán intervenir los jueces que hubieran conocido en el anterior. Si el reenvío procede como consecuencia de un recurso del imputado, en el nuevo juicio no podrá aplicarse una pena superior a la impuesta en el primero. Si en el nuevo juicio se obtiene una segunda absolución, esta decisión no será susceptible de impugnación alguna.
ARTÍCULO 406°.- Omisiones de la sentencia de primera instancia.- El Tribunal decidirá sobre los puntos omitidos en la sentencia de primera instancia, aunque no se hubiese pedido aclaratoria, siempre que no implique agravación de la situación del imputado y se solicitare el respectivo pronunciamiento.
ARTÍCULO 407°.- Libertad del imputado.- El Tribunal ordenará inmediatamente la libertad del imputado, cuando por efecto de su decisión debiera cesar su encarcelamiento.
ARTÍCULO 408°.- Comunicaciones.- Todas las sentencias que dictara el Tribunal de Apelación deberán ser comunicadas al Registro Único de Antecedentes Penales.
TÍTULO IV
Revisión
ARTÍCULO 409°.- Procedencia.- El recurso de revisión procederá en todo tiempo y en favor del condenado, contra la sentencia firme: 1) cuando los hechos establecidos como fundamento de la condena fueran inconciliables con los fijados por otra sentencia penal irrevocable; 2) cuando la sentencia impugnada se hubiera fundado en prueba documental o testifical, cuya falsedad hubiese sido declarada en fallo posterior irrevocable; 3) cuando la sentencia condenatoria hubiese sido pronunciada a consecuencia de prevaricato, cohecho, violencia o maquinación fraudulenta, cuya existencia hubiera sido declarada en fallo posterior irrevocable o establecido en proceso, aunque no hubiese podido llegarse a dicho fallo por haber mediado una causal extintiva o que imposibilitó proseguir el ejercicio de la acción; 4) cuando después de la condena sobrevinieran nuevos hechos o elementos de prueba que, solos o unidos a los ya examinados en el proceso, hicieran evidente que el hecho delictuoso no existió, que el condenado no lo cometió, o no se dieron las circunstancias agravantes típicas que el Tribunal tuvo en cuenta al pronunciar aquella.
ARTÍCULO 410°.- Titularidad y pretensión.- El recurso de revisión podrá ser ejercido por el defensor o por el condenado. Si este fuera incapaz, por sus representantes legales, si hubiera fallecido o hubiese sido declarado ausente con presunción de fallecimiento, por su cónyuge, ascendientes, descendientes o hermanos. Para ser admisible, deberá limitarse a demostrar la inexistencia del hecho delictuoso o de una circunstancia que contribuyó a agravar la pena o la no comisión por el condenado o la falta de la prueba en que se basó la condena, fundada en cualquiera de los incisos del artículo anterior. Cuando la revisión fuera solicitada después de la muerte del condenado, para ser admisible, sólo podrá tender a probar la inexistencia del hecho o que aquel no lo cometió.
ARTÍCULO 411°.- Interposición.- El recurso de revisión será interpuesto ante la Corte Suprema de Justicia, personalmente o por mandatario y para ser admisible deberá contener la concreta referencia de los motivos en que se funda y las disposiciones legales aplicables. Si se motivara en uno de los tres primeros incisos del artículo 409, se acompañará copia de la sentencia pertinente y en todos los casos, si correspondiera, se ofrecerán las pruebas demostrativas de los extremos invocados, acompañándoselas si existieran, para su válida admisibilidad.
ARTÍCULO 412°.- Trámite.- Si el recurso de revisión fuera en principio admisible, el Presidente del Tribunal dispondrá que se corra vista al Procurador General, quien tendrá intervención necesaria como parte, por el término de diez días. Evacuada la vista, si no correspondiera recepcionar prueba se dictará sin más trámite la providencia de autos. Si correspondiera, dispondrá la recepción de la prueba ofrecida y discusión final, en audiencia pública que se regirá por las normas del juicio común.
ARTÍCULO 413°.- Suspensión de la ejecución.- En cualquier momento del trámite la Corte Suprema podrá suspender la ejecución de la sentencia impugnada y disponer la libertad del condenado con o sin caución.
ARTÍCULO 414°.- Sentencia.- Si al pronunciarse el Tribunal acogiera el motivo de revisión alegado, anulará la sentencia impugnada pudiendo dictar directamente la sentencia o remitir a nuevo juicio la causa cuando el caso lo requiera.
ARTÍCULO 415°.- Nuevo recurso.- El rechazo del recurso de revisión no perjudicará el derecho de presentar nuevas instancias fundadas en elementos distintos.
TÍTULO V
Recurso Extraordinario

LIBRO VI
EJECUCIÓN
TÍTULO I
Ejecución Penal
Capítulo I
Función del Juez de Ejecución
ARTÍCULO 419°.- Atribuciones.- El Juez de Ejecución deberá: 1) controlar que se respeten todas las garantías constitucionales, de Tratados Internacionales con idéntica jerarquía y las dispuestas por este Código, con relación al trato que debiera dispensarse a los condenados, presos y personas sometidas a medidas de seguridad; 2) controlar el cumplimiento de las penas privativas de libertad respecto de los condenados mayores de dieciocho años al momento de la comisión del delito. Con este fin podrá convocar a su despacho a los penados para mantener con ellos una comunicación directa y reservada, así como disponer inspecciones periódicas en los establecimientos donde se alojaran, las que cumplirá personalmente o comisionando alguno de sus auxiliares judiciales; 3) resolver todas las instancias o incidentes que se suscitaran en la etapa de ejecución de la pena respecto de los condenados, unificando penas de acuerdo a la ley penal, cuando así correspondiere; 4) entender en los recursos contra las sanciones disciplinarias aplicadas por las autoridades carcelarias a los penados a que hace referencia el inciso segundo, en los casos que este Código establece; 5) controlar el cumplimiento de las medidas de seguridad decididas por sentencia definitiva; 6) coordinar y supervisar el tratamiento post-carcelario, con la colaboración del Patronato de Liberados y de las asociaciones particulares previamente admitidas para desarrollar esa actividad de asistencia y ayuda del liberado; 7) dejar sin efecto o modificar la pena impuesta cuyo control le incumbe, o las condiciones de su cumplimiento, por haber entrado en vigencia una ley más benigna o en virtud de otra razón legal; 8) disponer que la prisión domiciliaria se cumpla bajo la inspección o vigilancia de la autoridad que designe; 9) controlar la observancia de las instrucciones e imposiciones establecidas al suspenderse el procedimiento a prueba según lo dispuesto en el artículo 25.
ARTÍCULO 420°.- Orientación funcional.- En su cometido el Juez de Ejecución tenderá, en lo posible, a: 1) mitigar los efectos negativos del encarcelamiento, promoviendo la aplicación del régimen abierto cuando procediera; 2) propender a la obtención del consenso del condenado respecto del tratamiento que se determine; 3) orientar la fase ejecutiva a la personalización del encarcelado, procurando la adecuación del contenido y del tiempo de la pena o, en su caso, de la medida de seguridad, a la evolución de la personalidad del interno, sobre la base de los estudios y consideraciones técnico-científicas del equipo interdisciplinario interviniente; 4) favorecer la individualización del tratamiento de acuerdo a los medios científicos más adecuados al caso para lograr el fin de la ejecución penal. En este sentido se inclinará por las modalidades alternativas que gradualmente fueran reintegrando un espacio de autonomía al interno, fortificando su capacidad de responsabilidad con el ejercicio, cada vez más exigente, de procesos positivos de aprendizaje social; 5) hacer cumplir el principio de legalidad en la ejecución de la pena, amparando y resolviendo a favor del otorgamiento de los derechos y beneficios del penado cuando, de la verificación objetiva de los resultados del tratamiento así correspondiera, de acuerdo a la ley y a la reglamentación vigente; 6) fomentar, en cuanto la ley lo autorice, el contacto del penado con el medio adonde deberá retornar una vez agotada su condena, facilitando así el objetivo de su reinserción social; 7) aprovechar y controlar la reglamentaria participación privada, especialmente de asociaciones o grupos intermedios, en la reeducación de los internos.
Capítulo II
Penas
ARTÍCULO 421°.- Pena privativa de libertad.- Una vez firme la sentencia que ordenara cumplir efectivamente pena privativa de libertad, el Tribunal dispondrá el inmediato encarcelamiento del condenado si éste no estuviera sometido a prisión preventiva, y se pondrán las actuaciones y el preso a disposición del Juez de Ejecución.
ARTÍCULO 422°.- Ejecución diferida.- Si con el tiempo de prisión preventiva antes cumplido, el condenado se encontrara habilitado para solicitar su libertad condicional, el Tribunal de Juicio podrá diferir la ejecución de la sentencia comunicando la circunstancia al Tribunal de Ejecución, quien ordenará el encarcelamiento si fuera denegada la libertad condicional solicitada.
ARTÍCULO 423°.- Revocación de la condena condicional.- El Tribunal que condenara por la comisión de un nuevo delito al beneficiario de una anterior condenación condicional, será competente para revocarla y proceder conforme a lo dispuesto sobre acumulación de penas. Si no se cumpliera la regla precedente, lo hará el Tribunal que hubiera aplicado la pena mayor.
ARTÍCULO 424°.- Cómputo.- El Juez de Ejecución practicará el cómputo o, en su caso, revisará el practicado en la sentencia fijando la fecha de vencimiento de la pena notificándolo al Fiscal, al condenado y a su defensor, quienes podrán interponer el recurso de reposición. El cómputo podrá reformarse siempre que se comprobara su error o nuevas circunstancias lo hicieran necesario.
ARTÍCULO 425°.- Comunicaciones.- El Juez de Ejecución dispondrá remitir testimonio de la sentencia condenatoria firme al establecimiento donde se encontrara alojado el condenado, y expedirá comunicaciones al Registro Único de Antecedentes Penales de la Provincia, al Registro Nacional de Reincidencias y a los organismos que establezca la reglamentación.
ARTÍCULO 426°.- Accesoria, inhabilitación y multa.- Cuando la pena privativa de libertad importara la accesoria del artículo 12 del Código Penal, o se condenara a inhabilitación absoluta, a inhabilitación especial, o a pena de multa, el Juez de Ejecución ordenará las anotaciones y comunicaciones que correspondan. Dispondrá, en su caso, el secuestro de documentos para realizar la actividad temporalmente vedada y exigirá copia de la boleta de depósito del importe de la multa en una cuenta especial del Banco que la reglamentación designe con identificación de la causa judicial a la que se refiere. Si el depósito no se efectuara en el plazo fijado, la sentencia se ejecutará por el Fiscal ante el Tribunal con competencia civil. Los importes provenientes de las multas referidas se destinarán al Ministerio Público Fiscal para el eventual pago de costas y, cuando la ley lo disponga, a un fondo para el mantenimiento de la defensa oficial, en la proporción que la reglamentación establezca.
ARTÍCULO 427°.- Rehabilitación.- El inhabilitado podrá solicitar su rehabilitación por instancia escrita ante el Juez de Ejecución, acompañando copia certificada de la sentencia respectiva y ofreciendo la prueba en que fundara su pretensión. Si la presentación resultara admisible, el Juez correrá vista al Fiscal por el término de tres días, posibilitándole ofrecer pruebas o hacer observaciones previas y siguiéndose los lineamientos regulados para la sustanciación de los incidentes durante la ejecución.
ARTÍCULO 428°.- Ley más benigna.- El Juez de Ejecución resolverá el incidente planteado para dejar sin efecto o modificar la condena firme impuesta, con fundamento en la entrada en vigencia de una ley más benigna o en virtud de otra razón legal, rigiendo al respecto las normas del juicio común en cuanto fueran aplicables.

ARTÍCULO 435°.- Medida de seguridad.- Cuando se dispusiera por sentencia la aplicación de una medida de seguridad, el Juez de Ejecución determinará, en su caso, el establecimiento adecuado donde deba cumplirla, contando con la posibilidad de modificar ulteriormente su decisión y debiendo asesorarse al efecto por peritos. Por lo menos cada seis meses el establecimiento de mención, informará sobre todas las circunstancias que influyan en la continuidad o cesación de la medida o en la modificación del tratamiento que se dispense. Cuando el Tribunal tuviera noticia de la desaparición de las causas motivantes de la internación, lo hará saber al Ministerio Público Fiscal y al interesado, o a quien ejercite su curatela, para que ofrezcan pruebas y concurran a la audiencia oral en la fecha inmediata que se fije, requiriendo el dictamen de por lo menos dos peritos. La resolución podrá ordenar el cese de la medida de seguridad o la modificación de la forma en que se cumplía.

TÍTULO II
Costas e indemnizaciones
Capítulo I
Costas
ARTÍCULO 444°.- Oportunidad.- Toda decisión que pusiera fin a la causa o a un incidente, deberá resolver sobre el pago de las costas procesales y a cargo de quien corresponden.
ARTÍCULO 445°.- Contenido.- Las costas procesales consistirán en: 1) la tasa de justicia o cualquier otro tributo que corresponda por la actuación judicial; 2) los gastos originados durante la tramitación del procedimiento; 3) los honorarios de los abogados, de los peritos, asesores técnicos, traductores e intérpretes.
ARTÍCULO 446°.- Liquidación de gastos.- Resuelta la imposición de costas, las partes practicarán una planilla donde detallarán los gastos sufragados en la actividad realizada durante el procedimiento. El Ministerio Público Fiscal estimará las costas y gastos que haya devengado su actuación conforme con la reglamentación que oportunamente se establecerá.
ARTÍCULO 447°.- Determinación de costas.- Practicadas las planillas que contengan las costas, se pondrán de manifiesto público en la Oficina de Gestión Judicial siguiéndose el trámite previsto en el Código Procesal Civil y Comercial hasta su firmeza. La ejecución de las costas se hará en la sede civil competente.
ARTÍCULO 448°.- Imposición.- Las costas serán impuestas a la parte vencida aunque no mediara pedido expreso, salvo: 1) cuando la parte vencida reconociera como fundadas las pretensiones de su adversario y lo hubiera exteriorizado en término; 2) cuando se reconociera razón plausible para actuar en el procedimiento.
ARTÍCULO 449°.- Personas exentas.- Los abogados que actuaran como funcionarios del Ministerio Público Fiscal o como patrocinantes o defensores en el procedimiento, no podrán ser condenados en costas, salvo el caso de notorio desconocimiento del derecho o de grave negligencia en el desempeño de sus funciones, o cuando especialmente en este Código se dispusiera lo contrario, sin perjuicio de la responsabilidad penal o disciplinaria en que incurrieran.
ARTÍCULO 450°.- Procedimiento abreviado.- Cuando se acordara el procedimiento abreviado, cada parte soportará sus propias costas.
ARTÍCULO 451°.- Pluralidad de condenados.- Cuando fueran varios los condenados al pago de costas, el Tribunal fijará la parte proporcional que corresponda a cada uno, sin perjuicio de la solidaridad que establece la ley civil.
Capítulo II
Indemnizaciones
ARTÍCULO 452°.- Revisión.- Cuando a causa de un recurso de revisión el condenado fuera absuelto o se le impusiera una pena menor, tendrá derecho a ser indemnizado por el Estado provincial en razón del tiempo de privación de libertad o inhabilitación sufrida, o por el sufrido en exceso, salvo que él hubiera contribuido responsablemente a su propia condena. Tendrá también derecho a una indemnización por la multa pagada o su exceso. Igual derecho tendrá cuando el recurso de revisión versara sobre una medida de seguridad.
ARTÍCULO 453°.- Encarcelamiento preventivo o internación provisional.- Cuando el imputado fuera absuelto o sobreseído, tendrá derecho a ser indemnizado por el Estado Provincial por los días de prisión cautelar sufrido o por el tiempo que duró la internación provisional, siempre y cuando se demostrara la ausencia de los presupuestos que debieron legitimar la medida de coerción.
ARTÍCULO 454°.- Competencia.- La indemnización deberá ser demandada ante el tribunal civil competente contra el Estado Provincial, sin perjuicio del derecho de éste a repetir de quien considere responsable.
ARTÍCULO 455°.- Ley más benigna.- La aplicación de una ley posterior más benigna no habilitará a la indemnización aquí regulada.

<script>
function parseCodigo(raw){
  const lines = raw.split('\n');
  const libroRe = /^LIBRO\s+([IVXLCM]+)\s*$/;
  const tituloRe = /^T[IÍ]TULO\s+([IVXLCM]+)\s*$/;
  const capRe = /^Cap[ií]tulo\s+([IVXLCM]+)\s*$/;
  const seccionRe = /^Secci[oó]n\s+(\S+)\s*$/;
  const artStartRe = /^ART[IÍ]CULO?\s+([0-9]+\s*[°º]?\s*(?:bis|ter|quater|quinquies|sexies|septies|octies)?)\s*\.-\s*(.*)$/i;
  const derogadoRe = /^\(\s*Art[ií]culo\s+([0-9]+[^)]*)\s+derogado[^)]*\)\s*$/i;
  const notaLineRe = /^\(.*\)\s*$/;

  const libros = [];
  const articles = [];
  let curLibro=null, curTitulo=null, curCap=null, curSecc=null, curArt=null, expect=null;

  function ensureLibro(){ if(!curLibro){ curLibro={num:'',titulo:'',numLabel:'',titulos:[]}; libros.push(curLibro);} }
  function ensureTitulo(){ ensureLibro(); if(!curTitulo){ curTitulo={num:'',titulo:'',numLabel:'',capitulos:[]}; curLibro.titulos.push(curTitulo);} }
  function ensureCap(){ ensureTitulo(); if(!curCap){ curCap={num:'',titulo:'',numLabel:'',articulos:[]}; curTitulo.capitulos.push(curCap);} }

  for(let raw of lines){
    const line = raw.trim();
    if(!line) continue;
    if(expect){
      if(expect==='libro') curLibro.titulo=line;
      else if(expect==='titulo') curTitulo.titulo=line;
      else if(expect==='capitulo') curCap.titulo=line;
      else if(expect==='seccion') curSecc.titulo=line;
      expect=null;
      continue;
    }
    let m;
    if(m=line.match(libroRe)){
      curLibro={num:m[1],titulo:'',numLabel:'LIBRO '+m[1],titulos:[]};
      libros.push(curLibro); curTitulo=curCap=curSecc=null; curArt=null;
      expect='libro'; continue;
    }
    if(m=line.match(tituloRe)){
      ensureLibro();
      curTitulo={num:m[1],titulo:'',numLabel:'TÍTULO '+m[1],capitulos:[]};
      curLibro.titulos.push(curTitulo); curCap=curSecc=null; curArt=null;
      expect='titulo'; continue;
    }
    if(m=line.match(capRe)){
      ensureTitulo();
      curCap={num:m[1],titulo:'',numLabel:'Capítulo '+m[1],articulos:[]};
      curTitulo.capitulos.push(curCap); curSecc=null; curArt=null;
      expect='capitulo'; continue;
    }
    if(m=line.match(seccionRe)){
      curSecc={num:m[1],titulo:'',numLabel:'Sección '+m[1]};
      curArt=null;
      expect='seccion'; continue;
    }
    if(m=line.match(derogadoRe)){
      ensureCap();
      const art={numero:m[1].trim(),derogado:true,texto:'',nota:line,
        libroLabel:curLibro?(curLibro.numLabel+(curLibro.titulo?' — '+curLibro.titulo:'')):'',
        tituloLabel:curTitulo?(curTitulo.numLabel+(curTitulo.titulo?' — '+curTitulo.titulo:'')):'',
        capLabel:curCap?(curCap.numLabel+(curCap.titulo?' — '+curCap.titulo:'')):''};
      articles.push(art); curCap.articulos.push(art); curArt=null;
      continue;
    }
    if(notaLineRe.test(line) && !artStartRe.test(line)){
      if(curArt) curArt.nota = (curArt.nota?curArt.nota+' ':'') + line;
      continue;
    }
    if(m=line.match(artStartRe)){
      ensureCap();
      curArt={numero:m[1].replace(/\s+/g,' ').trim(),derogado:false,texto:m[2].trim(),nota:'',
        libroLabel:curLibro?(curLibro.numLabel+(curLibro.titulo?' — '+curLibro.titulo:'')):'',
        tituloLabel:curTitulo?(curTitulo.numLabel+(curTitulo.titulo?' — '+curTitulo.titulo:'')):'',
        capLabel:curCap?(curCap.numLabel+(curCap.titulo?' — '+curCap.titulo:'')):''};
      articles.push(curArt); curCap.articulos.push(curArt);
      continue;
    }
    if(curArt){ curArt.texto += (curArt.texto?' ':'') + line; }
  }
  return {libros, articles};
}

let DATA = {libros:[],articles:[]};

function romanToArabic(s){
  const map={I:1,V:5,X:10,L:50,C:100,M:1000};
  let r=0;
  for(let i=0;i<s.length;i++){
    const v=map[s[i]]||0, n=map[s[i+1]]||0;
    r += v<n ? -v : v;
  }
  return r||9999;
}
function artSortKey(numero){
  const m = numero.match(/^(\d+)/);
  return m ? parseInt(m[1],10) : 999999;
}

function renderSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML='';
  DATA.libros.forEach((libro,li)=>{
    const det = document.createElement('details');
    det.className='toc-libro';
    if(li===0) det.open=true;
    const sum = document.createElement('summary');
    sum.innerHTML = `${libro.numLabel} <span class="toc-libro-title">${libro.titulo}</span>`;
    det.appendChild(sum);
    libro.titulos.forEach(tit=>{
      const detT = document.createElement('details');
      detT.className='toc-titulo';
      const sumT = document.createElement('summary');
      sumT.innerHTML = `${tit.numLabel} <span class="toc-titulo-title">${tit.titulo}</span>`;
      detT.appendChild(sumT);
      tit.capitulos.forEach(cap=>{
        const div = document.createElement('div');
        div.className='toc-cap';
        let label = cap.numLabel + (cap.titulo? ' — '+cap.titulo : '');
        if(!label && cap.articulos.length){
          const nums = cap.articulos.map(a=>artSortKey(a.numero));
          label = 'Arts. ' + Math.min(...nums) + ' a ' + Math.max(...nums);
        }
        div.textContent = label;
        div.onclick = ()=>{ mostrarCapitulo(cap); document.querySelectorAll('.toc-cap').forEach(e=>e.classList.remove('activo')); div.classList.add('activo'); cerrarSidebarMobile(); };
        detT.appendChild(div);
      });
      det.appendChild(detT);
    });
    sb.appendChild(det);
  });
}

function mostrarCapitulo(cap){
  const cont = document.getElementById('main-inner');
  cont.innerHTML='';
  const h = document.createElement('div');
  h.className='section-title';
  let titulo = cap.numLabel + (cap.titulo? ' — '+cap.titulo : '');
  if(!titulo && cap.articulos.length){
    const nums = cap.articulos.map(a=>artSortKey(a.numero));
    titulo = cap.articulos[0].tituloLabel || ('Arts. ' + Math.min(...nums) + ' a ' + Math.max(...nums));
  }
  h.textContent = titulo;
  cont.appendChild(h);
  cap.articulos.forEach(art=> cont.appendChild(renderArticulo(art)) );
  window.scrollTo(0,0);
  document.querySelector('.main').scrollTo(0,0);
}

function renderArticulo(art, resaltar){
  const div = document.createElement('div');
  div.className='articulo' + (resaltar?' destacado':'');
  div.id = 'art-' + art.numero.replace(/\s+/g,'');
  const bc = document.createElement('div');
  bc.className='breadcrumb';
  bc.textContent = [art.libroLabel, art.tituloLabel, art.capLabel].filter(Boolean).join(' · ');
  div.appendChild(bc);
  const num = document.createElement('span');
  num.className = 'art-num' + (art.derogado?' derogado':'');
  num.textContent = 'Art. ' + art.numero + (art.derogado?' (derogado)':'');
  div.appendChild(num);
  const txt = document.createElement('div');
  if(art.derogado){
    txt.className='art-derogado-txt';
    txt.textContent = art.nota.replace(/^\(\s*|\s*\)$/g,'');
  } else {
    txt.className='art-texto';
    txt.textContent = art.texto;
  }
  div.appendChild(txt);
  if(!art.derogado && art.nota){
    const nota = document.createElement('div');
    nota.className='art-nota';
    nota.textContent = art.nota;
    div.appendChild(nota);
  }
  return div;
}

function highlightText(el, term){
  if(!term) return;
  const re = new RegExp('('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
  el.querySelectorAll('.art-texto').forEach(t=>{
    t.innerHTML = t.textContent.replace(re,'<mark>$1</mark>');
  });
}

function buscar(q){
  const cont = document.getElementById('main-inner');
  const contador = document.getElementById('contador');
  q = q.trim();
  if(!q){
    cont.innerHTML = `<div class="empty">Elegí un capítulo del índice o escribí un número de artículo / palabra clave para buscar.</div>`;
    contador.textContent='';
    return;
  }
  const soloNum = /^\d+$/.test(q);
  let resultados;
  if(soloNum){
    resultados = DATA.articles.filter(a=> artSortKey(a.numero)===parseInt(q,10) );
  } else {
    const ql = q.toLowerCase();
    resultados = DATA.articles.filter(a=> !a.derogado && a.texto.toLowerCase().includes(ql) );
  }
  contador.textContent = resultados.length + (resultados.length===1?' resultado':' resultados');
  cont.innerHTML='';
  if(!resultados.length){
    cont.innerHTML = `<div class="empty">Sin resultados para «${q}».</div>`;
    return;
  }
  resultados.forEach(art=>{
    const el = renderArticulo(art, true);
    cont.appendChild(el);
    if(!soloNum) highlightText(el, q);
  });
}

let debounceT;
document.getElementById('buscador').addEventListener('input', e=>{
  clearTimeout(debounceT);
  const v = e.target.value;
  debounceT = setTimeout(()=>buscar(v), 150);
});

function abrirSidebarMobile(){
  document.getElementById('sidebar').classList.add('abierto');
  document.getElementById('sidebarOverlay').classList.add('visible');
}
function cerrarSidebarMobile(){
  document.getElementById('sidebar').classList.remove('abierto');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}
document.getElementById('menuBtn').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.contains('abierto') ? cerrarSidebarMobile() : abrirSidebarMobile();
});
document.getElementById('sidebarOverlay').addEventListener('click', cerrarSidebarMobile);

window.addEventListener('DOMContentLoaded', ()=>{
  DATA = parseCodigo(RAW_TEXT);
  renderSidebar();
  document.getElementById('contador').textContent = DATA.articles.length + ' artículos indexados';
});
</script>
