LIBRO III
INVESTIGACIÓN PENAL PREPARATORIA
TÍTULO I
Procedimiento
Capítulo I
Disposiciones Generales
ARTÍCULO 251°.- Competencia. Corresponde al Ministerio Público de la Acusación la dirección técnica y jurídica de la investigación penal, el diseño de la estrategia procesal y la litigación en estrados judiciales. Como responsable de la dirección investigativa, la Fiscalía dirigirá sus requerimientos a la Policía de Investigaciones, de manera centralizada en cada Circunscripción y por conducto de la autoridad que designe la Fiscalía Regional. Las directivas de investigación serán formalizadas por sistema u otro medio fehaciente, y en ningún caso se dirigirán a funcionarios policiales determinados. Queda expresamente prohibida la asignación de efectivos policiales para realizar tareas investigativas bajo dependencia de una agencia o unidad fiscal en particular. La investigación podrá asimismo quedar a cargo del querellante, en los términos de este Código, debiendo requerirse al Juez las medidas coercitivas que correspondan.
( Artículo 251 modificado por el Artículo 18 la Ley N° 14258 )
ARTÍCULO 252°.- Competencia policial. Por iniciativa propia o cumpliendo órdenes del Ministerio Público de la Acusación, podrán prevenir en la Investigación Penal Preparatoria, el Organismo de Investigaciones, la Policía de Investigaciones y los demás organismos policiales o facultados legalmente para funciones investigativas. Fuera de los casos en que se reciban directivas de investigación, la Policía de Investigaciones podrá aplicar protocolos de activación automática ante determinado evento, los que serán creados por convenio entre el Poder Ejecutivo y el Ministerio Público de la Acusación, con noticia posterior a la Fiscalía.
( Artículo 252 modificado por el Artículo 19 la Ley N° 14258 )
ARTÍCULO 253°.- Objeto de la investigación.- La Investigación Penal Preparatoria tendrá por objeto: 1) averiguar los hechos que con apariencia de delito fueran denunciados o conocidos, con la finalidad de preparar la eventual acusación que permita la apertura del juicio penal; 2) reunir los elementos que permitan probar: a) la individualización de los presuntos autores, cómplices o instigadores; b) las circunstancias que califiquen o atenúen el hecho; c) las circunstancias que permitan determinar causales de justificación, inculpabilidad, inimputabilidad o excusas absolutorias; d) la extensión del daño causado por el hecho; e) la edad, educación, costumbres, condiciones de vida, medios de subsistencia y antecedentes del imputado, el estado y desarrollo de sus facultades mentales, las condiciones en que actuó, los motivos que hubieran podido determinar su conducta, y las demás circunstancias personales que tengan vinculación con la ley penal.
ARTÍCULO 254°.- Iniciación y duración de la Investigación Penal Preparatoria. La Investigación Penar Preparatoria podrá iniciarse por decisión del Ministerio Público de la Acusación, o por acción de la Policía con noticia inmediata a la Fiscalía.
( Artículo 254 modificado por el Artículo 20 la Ley N° 14258 )
ARTÍCULO 255°.- Comunicación inmediata.- En todos los casos en que se iniciara una Investigación Penal Preparatoria y se hubiera individualizado fehacientemente al imputado, deberán comunicarse al Registro Único de Antecedentes Penales de la provincia las siguientes circunstancias: 1) nombre, apellido y demás elementos identificatorios del imputado; 2) si se encuentra detenido el imputado y en su caso, fecha, hora de detención y Juez a disposición de quien se encuentra; 3) nombre, apellido y demás elementos identificatorios del denunciante, de la víctima y del damnificado, si los hubiera; 4) fecha del hecho atribuido y de la iniciación de la investigación, así como la calificación provisional del mismo; 5) repartición policial, Fiscalía interviniente y defensor designado si lo hubiera.
ARTÍCULO 256°.- Información al Fiscal.- Recibida la comunicación a que refiere el artículo anterior, el Registro Único de Antecedentes Penales procederá de inmediato a informar al Fiscal interviniente las siguientes circunstancias: 1) si el imputado cuenta con otras investigaciones penales en trámite, haciendo saber en su caso, Fiscalía y repartición policial interviniente; 2) medidas de coerción que se hubieran dictado en su contra; 3) suspensiones del procedimiento a prueba acordadas a la misma persona; 4) declaraciones de rebeldía; 5) juicios penales en trámite; 6) condenas anteriores, libertades condicionales, reincidencias en que hubiera incurrido y toda otra referencia de utilidad respecto del imputado. En caso de que el imputado registrara pluralidad de causas, la información pertinente será remitida a todos los Fiscales intervinientes.
ARTÍCULO 257°.- Reserva de la información.- La información que obrara en poder del Registro Único de Antecedentes Penales será reservada y sólo podrá ser conocida y utilizada por el Ministerio Público Fiscal, la Policía, el imputado, la defensa y los Jueces.
ARTÍCULO 258°.- Reserva de las actuaciones.- Los actos de la investigación y su documentación serán secretos para quienes no sean parte en el procedimiento o no tuvieran expresa autorización para conocerlos.
ARTÍCULO 259°.- Conocimiento a la defensa. Las actuaciones que documentan la investigación penal preparatoria podrán ser conocidas por el imputado, su defensa y el querellante, después de realizada la audiencia imputativa regulada por el artículo 274. Sin embargo, podrán imponerse de las mismas quince (15) días después de haber peticionado al Fiscal la realización de dicha audiencia, si por cualquier motivo ésta no se hubiera celebrado. Excepcionalmente, si resultara útil al éxito de la investigación, el Fiscal podrá solicitar fundadamente autorización al Juez para disponer la reserva total o parcial del legajo de investigación por un plazo que no podrá exceder de diez (10) días consecutivos. Si la eficacia de un acto particular dependiera de la reserva total o parcial del legajo de investigación, el Fiscal, previa autorización del Juez, podrá disponerla por el plazo que resulte indispensable para cumplir el acto en cuestión, el que nunca superará las cuarenta y ocho (48) horas. En ambos casos, la autorización se resolverá en audiencia unilateral en forma inmediata. Las actuaciones reservadas no podrán ser presentadas o invocadas para fundar ninguna decisión judicial contra el imputado mientras sean secretas. La defensa deberá imponerse de las mismas en un plazo no inferior a cuarenta y ocho (48) horas previas a la toma de la decisión judicial que pudiere basarse en las actuaciones objeto de la reserva.
( Artículo 259 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 260°.- Formalidades para actos irreproducibles o definitivos.- Deberán constar en actas debidamente formalizadas, con expresa mención de la fecha, hora, intervinientes, firmas de los funcionarios actuantes y mención de cualquier otro dato útil a la eficiencia y acreditación de la autenticidad del documento, los operativos dirigidos a la búsqueda e incorporación de pruebas, inspecciones, constataciones, registros, requisas, secuestros, aprehensiones, detenciones, reconocimientos y toda otra diligencia que se considerara irreproducible o definitiva. Las restantes diligencias de la investigación no guardarán otras formalidades que las exigidas por la reglamentación y por las instrucciones generales y especiales expedidas por el Ministerio Público Fiscal, salvo las que tuvieran una formalidad expresamente prevista en este Código.
ARTÍCULO 261°.- Instancia privada y antejuicio.- Mediando un obstáculo legal, sólo se realizarán los actos urgentes que interrumpan la comisión del hecho punible o preserven la prueba que corriera el riesgo de perderse por la demora, tales como tomar nombres y domicilios de los testigos, constatar la existencia del hecho por medio de croquis, relevamientos fotográficos, e informes médicos, siempre que no se afectare el interés protegido por el impedimento.
Capítulo II
Denuncia
ARTÍCULO 262°.- Facultad de denunciar.- Toda persona que tuviera noticia de un delito perseguible de oficio, podrá denunciarlo ante el Ministerio Público Fiscal o a las autoridades policiales. Cuando la acción penal dependiera de instancia privada, sólo podrá denunciar el titular del poder de instar.
ARTÍCULO 263°.- Denuncia obligatoria.- Siempre que no existiera obligación de guardar secreto, tendrán el deber de denunciar los delitos perseguibles de oficio: 1) los funcionarios o empleados públicos que los conocieran en el ejercicio de sus funciones; 2) los profesionales de la salud, cuando se tratara de delitos contra la vida o la integridad corporal de las personas.
ARTÍCULO 264°.- Forma. La denuncia podrá hacerse en forma escrita o verbal, personalmente o por mandatario especial. En este último caso, se deberá acompañar el poder respectivo. La denuncia escrita no necesita ser ratificada. Cuando fuere verbal se consignará en acta por el funcionario interviniente.
( Artículo 264 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 265°.- Contenido.- La denuncia deberá contener, en cuanto fuera posible: 1) una relación circunstanciada del hecho con indicación de los autores, cómplices e instigadores; 2) la individualización del daño y la identidad del damnificado; 3) los elementos probatorios que ofreciera para su ulterior producción; 4) la calificación legal que a criterio del denunciante merece el hecho si se formulara por abogado o con patrocinio letrado. Cuando la denuncia escrita fuera ratificada por el denunciante, se tratará de completar el contenido faltante.
ARTÍCULO 266°.- Denuncia repetida.- Cuando se formulara una denuncia, deberá interrogarse a su autor para que exprese si con anterioridad denunció el mismo hecho.
ARTÍCULO 267°.- Copia o certificación.- Hecha la denuncia se expedirá al denunciante, si lo solicitara, copia de la misma o certificación en que conste: fecha de su presentación, el hecho denunciado, el nombre del denunciante y denunciado, los comprobantes que se hubieran presentado y las circunstancias que se consideraran de utilidad.
Capítulo III
Dirección de Investigación - Actos de la Policía
ARTÍCULO 268°.- Deberes y atribuciones. La Policía investigará bajo dirección del Ministerio Público de la Acusación. Sin perjuicio de ello, deberá investigar todo delito de acción pública que llegue a su conocimiento en razón de su función, por orden fiscal o por denuncia, debiendo, en este último caso, comunicar dicho extremo en forma inmediata al Ministerio Público de la Acusación a los fines de recibir directivas. La Policía tendrá los siguientes deberes y atribuciones: 1) recibir denuncias; 2) requerir la inmediata intervención del Organismo de Investigaciones o, en defecto, de la actuación operante del mismo, practicar sin demora las diligencias necesarias para hacer constar las huellas o rastros del delito, cuando hubiera peligro de que desaparezcan o se borren por retardo de estas diligencias; 3) impedir que los hechos cometidos sean llevados a consecuencias ulteriores e individualizar la evidencia que pueda dar sustento a la acusación; 4) realizar los actos que le encomendara el Fiscal; 5) aprehender, detener e incomunicar a las personas, en los casos que este Código autoriza, informándolo de inmediato al Fiscal. En todos los casos deberá poner a las mismas a disposición del Juez competente dentro de las veinticuatro (24) horas de efectuada la medida; 6) recoger las pruebas y demás antecedentes que pudiera adquirir en el lugar de la ejecución del hecho punible y practicar las diligencias urgentes que se consideraran necesarias para establecer su existencia y determinar los responsables, debiéndose recopilar por separado, en lo posible y de acuerdo a los distintos hechos que se investiguen, las respectivas actuaciones; 7) poner en conocimiento del Fiscal las informaciones y diligencias practicadas, requiriendo su autorización para realizar aquellas medidas probatorias que, por su naturaleza, sean definitivas e irreproducibles, y que deberán colectarse con control de la defensa, si el imputado estuviera individualizado. Si fuera imposible cumplir con estas exigencias ante el inminente peligro de frustración de la medida, la misma, excepcionalmente, se realizará con intervención del Juez Comunitario de Pequeñas Causas o certificándose su fidelidad con un (1) testigo mayor de dieciocho (18) años, hábil y que no pertenezca a la repartición, fotografías u otros elementos corroborantes. Si por las especiales circunstancias del caso no fuera posible la presencia de un (1) testigo, la diligencia tendrá valor con la constancia con dos (2) funcionarios actuantes y material fílmico registrado desde el inicio de la misma; 8) disponer que antes de practicarse las averiguaciones y exámenes a que debe procederse, no hubiera alteración alguna en todo lo relativo al hecho y estado del lugar en que fue cometido; 9) proceder a todos los exámenes, indagaciones y pesquisas que juzgara indispensables, recabando los informes y noticias que pudieran servir de utilidad al Fiscal o a la defensa, documentando las declaraciones sólo cuando se estime necesario; 10) secuestrar los instrumentos del delito o cualquier otro elemento que pudiera servir para el objeto de la investigación en caso de urgencia o peligro en la demora. Sin embargo, no podrá imponerse de la correspondencia, papeles privados, material informático y grabaciones que secuestrara, sino que los remitirá intactos al Fiscal competente para que éste requiera autorización al Tribunal; 11) impedir, si lo juzgara conveniente, que ninguna persona se aparte del lugar del hecho o sus adyacencias, antes de concluir las diligencias más urgentes de investigación, con comunicación a la Fiscalía; 12) identificar al imputado; 13) informar al imputado inmediatamente de que fuera citado, aprehendido o detenido, que cuenta con los siguientes derechos: a. nombrar abogado para que lo asista y represente; b. conferenciar en forma privada y libre con su defensor, antes de prestar declaración o realizar un acto que requiera su presencia; c. abstenerse de declarar sin que ello signifique una presunción en su contra, o solicitar ser escuchado por el Fiscal; d. solicitar del Fiscal la intimación de los hechos que se le atribuyen, la calificación jurídica penal que provisionalmente merezcan y la prueba que existe en su contra; e. solicitar se practique la prueba que estimara de utilidad. La información precedente le será entregada al imputado por escrito, dejando constancia fehaciente de su entrega. Rige lo dispuesto por el artículo 110; 14) cumplimentar lo necesario para que el imputado sea revisado por el médico, bioquímico o psicólogo, en los casos en que así correspondiera; 15) cumplimentar con la información a enviar al Registro Único de Antecedentes Penales. 16) desarrollar su actuación de acuerdo a los principios, derechos y garantías establecidos en la Constitución de la Provincia, Constitución Nacional, y Pactos Internacionales que la integran, respetando los derechos humanos y garantizando su plena vigencia.
( Artículo 268 modificado por el Artículo 11 la Ley N° 14392 )
ARTÍCULO 269°.- Requerimiento de auxilio médico.- Los funcionarios a quienes correspondieran las diligencias iniciales de investigación podrán ordenar que los acompañe el primer médico que fuera habido, para prestar los auxilios de su profesión. El requerimiento será formulado bajo el apercibimiento de sancionarse al renuente hasta con quince días multa, sanción que aplicará el Tribunal a solicitud del Fiscal, sin perjuicio de la responsabilidad penal en que se incurriera.
ARTÍCULO 270°.- Cumplimiento de directivas. La Policía de Investigaciones y las demás fuerzas policiales cumplirán con las directivas y protocolos de investigación, bajo la dirección jurídica de la Fiscalía en los términos de los artículos 251 y 252. Deberán también cumplir las órdenes de los Tribunales, en cuanto Impliquen funciones o tareas de índole investigativa de las previstas en el artículo 204 bis.
( Artículo 270 modificado por el Artículo 21 la Ley N° 14258 )
ARTÍCULO 271°.- Poder disciplinario. Cuando los funcionarios policiales violaran disposiciones legales o reglamentarias, omitieran o retardaran la ejecución de un acto propio de sus funciones, o lo cumplieran negligentemente, el Ministerio Público Fiscal lo informará al Ministerio respectivo a los efectos disciplinarios que correspondan, sin perjuicio de las responsabilidades civiles y penales que pudieren caber.
( Artículo 271 modificado por el Artículo 22 la Ley N° 14258 )
Capítulo IV
Actos del Fiscal
ARTÍCULO 272°.- Fiscalización de la Investigación Penal Preparatoria.- El Fiscal de Distrito deberá fiscalizar todas las actuaciones que cumpliera la Policía en función judicial en el ámbito de su competencia territorial, con la finalidad de decidir sobre su mérito conforme a las disposiciones de este Capítulo.
ARTÍCULO 273°.- Desestimación de la denuncia y archivo.- El Fiscal ordenará la desestimación de la denuncia cuando no se pudiera proceder, se hubiera extinguido la acción penal, el hecho no fuera punible o no existieran elementos serios o verosímiles para iniciar fundadamente una investigación. En caso que mediara un obstáculo legal, se procederá conforme a lo establecido en los artículos 26 y concordantes de este Código.
ARTÍCULO 274°.- Audiencia Imputativa. Cuando el Fiscal estime que de los elementos reunidos en la investigación surgen elementos verosímiles para sostener preliminarmente la responsabilidad penal del imputado, procederá a citarlo para concretar una audiencia donde le brindará la información a que alude el artículo siguiente. El querellante tendrá derecho a participar de la audiencia, a ser oído, a realizar preguntas al imputado, dirigirse y peticionar al Tribunal y aportar elementos jurídicos y probatorios. Realizada la audiencia, el imputado recuperará inmediatamente la libertad, salvo que el Fiscal o, en su caso, el querellante considere procedente la aplicación de prisión preventiva, en cuyo caso solicitará en ese acto, la audiencia prevista en el artículo 223 de este Código y continuará la detención hasta su realización, debiendo esta última tener lugar dentro de los plazos máximos y bajo la modalidad de cómputo de los mismos prevista en el artículo 214 de este Código. En oportunidad de esa audiencia y de acuerdo a lo establecido en el artículo 13, el Fiscal, en búsqueda de los objetivos de simplicidad y abreviación, propondrá los acuerdos previstos por este Código. Antes de la realización de la audiencia, la víctima tendrá derecho a ser escuchada por el Fiscal. Si en virtud de lo dispuesto en este artículo, la audiencia se celebrare ante el Juez competente, tendrá asimismo derecho a ser oída por éste en esa audiencia para que manifieste lo que considere en relación al suceso delictivo y la afectación que el mismo le provocó. Le será comunicado su derecho de la manera más ágil y eficiente a los fines de facilitar su ejercicio. En el supuesto que no quisiera hacer uso de su derecho a ser oída, no se encontrare en condiciones de salud o fuese imposible su localización, la audiencia se concretará sin su participación.
( Artículo 274 modificado por el Artículo 23 la Ley N° 14258 )
ARTÍCULO 275°.- Información al imputado en la audiencia imputativa.- El Fiscal dará a conocer al imputado, bajo su firma, por escrito y dejando constancia fehaciente de la comunicación: 1) el hecho atribuido y su calificación jurídico penal; 2) las pruebas fundantes de la intimación; 3) todos los derechos que este Código le acuerda al imputado al momento de originarse su condición, especialmente los de procurar procedimientos abreviados.
ARTÍCULO 276°.- Asistencia técnica.- Para ser válida la audiencia, deberá estar presente el defensor del imputado. El defensor podrá ser nombrado en la misma audiencia, si no hubiera sido designado con anterioridad. Si el imputado nombrara abogado defensor de confianza, o se le debiera asignar un defensor de oficio, se suspenderá la audiencia hasta tanto se haga presente el designado, a quien se le notificará de inmediato de la fecha y hora en que debe concurrir para cumplir su función. Si durante la incomunicación del imputado alguna persona de su relación hubiera propuesto defensor, se le hará conocer antes del acto.
ARTÍCULO 277°.- Eventual interrogatorio Fiscal.- En la misma audiencia, cumplida la información precedente y celebrada la entrevista confidencial con su defensor, el imputado podrá peticionar ser oído e incluso manifestar su conformidad para que el Fiscal proceda a interrogarlo. Se observarán las normas sobre la validez y forma de la declaración del imputado. El defensor le podrá hacer saber las alternativas que prevé la ley penal o procesal como consecuencias o beneficios derivados de sus eventuales reconocimientos. La inobservancia de estos preceptos invalidará el acto, sin perjuicio de la responsabilidad disciplinaria o penal que correspondiera.
ARTÍCULO 278°.- Registro. El acto a que refiere el artículo anterior se documentará en acta sucinta y se registrará por audio y video. Para la utilización de los registros en juicio, se observará lo dispuesto en el artículo 112. Se entregará copia del acta y del registro al imputado y a su defensa técnica.
( Artículo 278 modificado por el Artículo 24 la Ley N° 14258 )
ARTÍCULO 280°.- Declaración a solicitud del imputado.- Cuando el imputado en la audiencia imputativa del artículo 274 no hubiera ejercido el derecho a declarar, o considerara necesario ampliar o modificar su anterior declaración, podrá solicitarlo al Fiscal, en cualquier momento de la Investigación Penal Preparatoria y hasta la presentación de la requisitoria de acusación contemplada en el artículo 294 de este Código. En esta audiencia el Fiscal podrá formular las preguntas que considerara pertinentes. Cuando el Fiscal no estimara imprescindible la audiencia para ampliar o modificar anteriores declaraciones, podrá disponer que las mismas se formulen por escrito con el patrocinio del defensor. Este mismo derecho podrá ser utilizado por el imputado a quien no se le hubiera recepcionado declaración con las formalidades previstas en los artículos 274 y concordantes.
ARTÍCULO 281°.- Nueva audiencia imputativa. Cuando se modificaran los hechos intimados, su calificación legal, o se pretendiera atribuir un hecho nuevo, el fiscal deberá convocar al imputado a una nueva audiencia imputativa, o solicitarla al tribunal, según el caso, aplicándose al respecto los artículos 274 y concordantes.
( Artículo 281 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 282°.- Validez de actos irreproducibles.- Adjudicada la calidad de imputado, toda medida probatoria que por su naturaleza o características debiera considerarse definitiva o irreproducible, para ser válida, será ordenada por el Fiscal y notificada a la defensa y al querellante si lo hubiera, a fin de que ejerciten sus facultades. En caso de divergencia respecto al modo de realización del acto, se requerirá verbalmente la intervención del Tribunal de la Investigación, el que adoptará las medidas que considere pertinente para la realización garantizadora del mismo.
ARTÍCULO 283°.- Actos urgentes.- Cuando alguna de las medidas a que refiere el artículo anterior requiera suma urgencia, deberá solicitarse la intervención del Tribunal de la Investigación que prescindirá de las notificaciones previstas en el artículo anterior y dispondrá lo pertinente para garantizar la realización del acto. Si fuera imposible ocurrir al Tribunal de la Investigación, de lo que se dará cuenta fundamente en acta, se observará lo previsto por el artículo 268 inciso 6) de este Código.
ARTÍCULO 284°.- Discrepancias.- Cuando existieran discrepancias entre el Fiscal y la defensa respecto de la realización de cualquiera de los actos que requieren la participación necesaria de ambos, estarán legitimados para ocurrir ante el Juez de la Investigación Penal Preparatoria que se impondrá oral y sumariamente de la situación y resolverá sin recurso alguno.
ARTÍCULO 285°.- Garantías constitucionales.- El Fiscal requerirá al Juez de la Investigación Penal Preparatoria la correspondiente orden, cuando para practicar la medida de investigación sea imprescindible el allanamiento de domicilio, la interceptación de correspondencia, la intervención de las comunicaciones o cualquier otra medida que pudiera afectar derechos y garantías amparados constitucionalmente.
ARTÍCULO 286°.- Proposición de diligencias probatorias. El imputado, su defensor y el querellante podrán proponer diligencias probatorias en el curso de la investigación y ocurrir ante el Fiscal Regional respectivo si el Fiscal interviniente no las practicase. El Fiscal Regional resolverá lo que corresponda tras una breve averiguación.
( Artículo 286 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 287°.- Participación del querellante.- Cuando el Fiscal estimara agotada la investigación, y se hubiera celebrado la audiencia del artículo 274 y concordantes, citará al querellante interviniente en el procedimiento, si lo hubiera, proporcionándole las copias y las explicaciones necesarias para que se imponga del procedimiento, de su decisión de abrir o no el juicio y de los extremos que habrá de contener su acusación. En esta oportunidad, le acordará un plazo de cinco días para que señale por escrito y puntualmente sus eventuales diferencias. Si no hubiera disenso, el querellante formulará su acusación en el plazo establecido en el artículo 294.
ARTÍCULO 288°.- Disenso entre el Fiscal y el querellante. Si hubiera disenso sobre los temas señalados en el artículo anterior, las cuestiones controvertidas serán resueltas por el Fiscal Regional respectivo, sin recurso alguno, después de una entrevista informal donde los discrepantes fundamentarán sus pretensiones. Cuando la disidencia hubiera referido a pruebas faltantes, y el Fiscal Regional hubiese aceptado la pretensión del querellante, fijará un plazo no mayor de treinta (30) días para su producción; si no le hiciere lugar, el querellante podrá postular su producción en el debate. Satisfecho el trámite y producida en su caso la prueba, el querellante formulará su acusación en el plazo establecido en el artículo 294 y solicitará las cautelas pertinentes dentro de los primeros cinco (5) días.
( Artículo 288 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 289°.- Archivo Fiscal.- Cuando se estimara que no hay más medidas a practicar, realizada la audiencia del artículo 274 y cumplimentado el trámite con el querellante si lo hubiera, el Fiscal dispondrá el archivo de las actuaciones en los siguientes casos: 1) cuando fuera evidente: a) que media una causal extintiva del ejercicio de la acción penal u otra de carácter también perentorio; b) que el hecho investigado no se cometió o no encuadra en una figura penal; c) que el delito no ha sido cometido por el imputado o media una causa de justificación, inimputabilidad, inculpabilidad o excusa absolutoria; 2) cuando no hubiera suficientes elementos de prueba para fundar la requisitoria de apertura del juicio y no fuera razonable, objetivamente, prever la incorporación de nuevas pruebas.
ARTÍCULO 290°.- Archivo jurisdiccional. Transcurridos diez (10) meses desde la realización de la audiencia del artículo 274, la defensa podrá solicitar al Fiscal el archivo a que refiere el artículo precedente. La solicitud se hará por escrito y el Fiscal resolverá en el término de quince (15) días. Denegada la solicitud o transcurrido dicho plazo sin que el Fiscal se expida, la defensa podrá instar ante el Juez de la investigación penal preparatoria el archivo denegado, ofreciendo la prueba que fundamente su pretensión. El Tribunal convocará a una audiencia oral y pública donde, escuchadas las partes y producida la prueba pertinente, resolverá en el acto el archivo por las causales del artículo anterior o lo denegará. La solicitud con el procedimiento previsto en el presente artículo podrá reiterarse cada seis (6) meses.
( Artículo 290 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 291°.- Archivo y Desestimación. Notificación y disconformidad. La desestimación y el archivo dispuesto por el Fiscal, serán notificados a la víctima y en su caso al querellante, quienes en un plazo de cinco (5) días podrán manifestar su disconformidad ante el Fiscal Regional. El Fiscal Regional realizará, cuando corresponda, una sumaria averiguación y convalidará o revocará la decisión cuestionada. En este último caso, podrá impartir instrucciones y aun designar nuevo Fiscal como encargado de la investigación. Cuando el Fiscal Regional convalidara la decisión del inferior, dentro del mismo plazo, se podrá ocurrir ante el Fiscal General, quien luego de cumplir idéntico procedimiento, resolverá definitivamente. En caso de mantenerse el rechazo de la pretensión de la víctima, ésta podrá iniciar la persecución conforme el procedimiento de querella, cualquiera fuera el delito de que se trate, dentro del plazo de sesenta (60) días hábiles de notificada la resolución del Fiscal General. Esta circunstancia se le hará conocer a la víctima al momento de presentar su denuncia.
( Artículo 291 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 292°.- Efectos.- Sin perjuicio de lo establecido en los artículos 291 y 293, las resoluciones que dispongan desestimar la denuncia o archivar la Investigación Penal Preparatoria, impedirán una nueva actividad persecutoria por los mismos hechos. Si el imputado se encontrara detenido o en prisión preventiva, apenas se dicte el archivo, el Fiscal solicitará al Juez que disponga su libertad.
ARTÍCULO 293°.- Reapertura de la Investigación Penal Preparatoria. No obstante lo dispuesto en el artículo anterior, si se modificara la situación probatoria preexistente, el Fiscal deberá elevar al Fiscal Regional respectivo, un detalle de los elementos probatorios sobrevinientes, a fin de requerir autorización expresa para la reapertura de la investigación. La ausencia de dicha autorización invalidará lo actuado y hará viable la excepción de archivo. La reapertura de la investigación penal preparatoria no procederá en el supuesto en que el damnificado directo o víctima hubiese deducido querella, conforme lo dispuesto en el artículo 291.
( Artículo 293 modificado por el Artículo 2 la Ley N° 13746 )
TÍTULO II
Procedimiento intermedio
ARTÍCULO 294°.- Procedencia de la acusación.- Realizada la audiencia imputativa prevista en el artículo 274, si el Fiscal estimara contar con elementos para obtener una sentencia condenatoria, procederá a formular por escrito su requisitoria de acusación ante el Juez de la Investigación Penal Preparatoria. Si hubiera querellante, una vez cumplimentados los trámites previstos en los artículos 287 y 288, las requisitorias de acusación deberán formularse en el término común de sesenta (60) días a contar desde la notificación del rechazo definitivo de las propuestas del querellante por el Ministerio Público Fiscal, o del vencimiento del plazo fijado para la producción de la prueba según el artículo 288. Si no hubiera disenso, las requisitorias deberán presentarse en el término de sesenta (60) días a contar desde el vencimiento del plazo establecido en el segundo párrafo del artículo 287.
ARTÍCULO 295°.- Contenido de la acusación.- El requerimiento acusatorio, para ser válido, deberá contener: 1) los datos personales del imputado y su domicilio legal; 2) una relación clara, precisa, circunstanciada y específica del hecho, con detalle de la extensión del daño causado; en caso de contener varios hechos punibles independientes, la separación y el detalle de cada uno de ellos; 3) los fundamentos de la acusación, con la expresión de los elementos de convicción que la motivan; 4) la calificación legal de los hechos, con expresión precisa de los preceptos jurídicos aplicables; 5) la pena que se solicita para el o los imputados o, en su caso, la medida de seguridad, indicando las circunstancias de interés para la determinación de ellas; 6) la solicitud de apertura del juicio. Con la acusación se acompañarán los documentos y medios de prueba materiales que se tuvieran. Podrán indicarse y servirán como acusación alternativa, aquellas circunstancias del hecho que permitirían encuadrar el comportamiento del imputado en una figura distinta de la ley penal, que se precisará, para el caso que no resultaren demostrados en el debate los elementos que componen su calificación jurídica principal.
ARTÍCULO 296°.- Audiencia preliminar.- Presentada la acusación del Fiscal y del querellante, en su caso, el Juez de la Investigación Penal Preparatoria notificará de inmediato a las partes y pondrá a su disposición los documentos y medios de pruebas materiales, para que puedan examinarlas en el plazo común de cinco (5) días. En el mismo acto se convocará a las partes a una audiencia oral y pública que deberá realizarse dentro de un plazo no menor de diez (10) días ni mayor de veinte (20). El Juez de la Investigación no permitirá que en la audiencia preliminar se pretendan resolver cuestiones que sean propias del juicio.
ARTÍCULO 297°.- Facultades de las partes.- Dentro de los cinco (5) días de notificada la audiencia prevista en el artículo anterior, las partes, por escrito, podrán: 1) señalar los vicios formales o el incumplimiento de aspectos formales de la acusación; 2) objetar las solicitudes de sobreseimiento, sobre la base de defectos formales o sustanciales; 3) oponer las excepciones previstas en este Código, cuando no hubieran sido planteadas con anterioridad, salvo que se funden en hechos nuevos; 4) solicitar el sobreseimiento; 5 ) proponer la aplicación de un principio de oportunidad; 6) solicitar la suspensión de juicio a prueba; 7) solicitar la imposición o revocación de una medida cautelar; 8) solicitar el anticipo jurisdiccional de prueba, conforme a lo establecido en el siguiente artículo de este Código; 9) proponer la aplicación de un procedimiento abreviado; 10) proponer la conciliación; 11) plantear cualquier otra cuestión incidental que permita una mejor preparación del juicio. La presentación que se efectúe será puesta en conocimiento de las demás partes, en un plazo no mayor de cuarenta y ocho horas.
ARTÍCULO 298°.- Anticipo jurisdiccional de prueba. En cualquier instancia previa al juicio, las partes podrán solicitar, fundadamente, el anticipo jurisdiccional de prueba en forma excepcional y cuando por razones debidamente acreditadas se considere que no pudiera recibirse durante el juicio. La diligencia será documentada según las previsiones establecidas en este Código para los actos irreproducibles y exhibidos los registros en la audiencia de debate de juicio oral a instancias de las partes. En ningún caso podrán ser utilizados en la audiencia de debate de juicio oral los registros de esta actividad si estuviere disponible y fuera posible la concurrencia del testigo, perito o intérprete a la audiencia de debate.
( Artículo 298 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 299°.- Ofrecimiento de prueba. Indicación del Tribunal. Las partes deberán ofrecer la prueba para el juicio oral tres (3) días antes de la fecha de la audiencia preliminar. A tal efecto, presentarán la lista de testigos, peritos e intérpretes que pretendan sean convocados al debate, con indicación del nombre, profesión y domicilio. Acompañarán igualmente, los documentos de que piensan servirse o indicarán dónde se encuentran. Los medios de pruebas serán ofrecidos con mención de los hechos o circunstancias que se pretendan probar, o de lo contrario no serán admitidos. Deberán las partes indicar si, conforme a las disposiciones legales, corresponde la intervención de un Tribunal conformado uni o pluripersonalmente, o si, razones absolutamente excepcionales, que se explicitarán, aconsejan la intervención de un Tribunal de juicio pluripersonal.
( Artículo 299 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 300°.- Ofrecimiento de prueba para la audiencia preliminar.- Dentro del plazo de cinco (5) días de notificada la audiencia prevista en el artículo 296, las partes deberán ofrecer los medios de prueba necesarios para resolver las cuestiones propias de la audiencia preliminar y el juez admitirá las que fueren pertinentes. Dentro del plazo de cuarenta y ocho horas siguientes de la puesta en conocimiento prevista en la última parte del artículo 297, las demás partes podrán ofrecer los medios de pruebas necesarios para resolver las cuestiones vinculadas al artículo nombrado.
ARTÍCULO 301°.- Intervinientes.- La audiencia preliminar se desarrollará conforme a las reglas del debate, con la presencia ininterrumpida del juez, del imputado y su defensor y del fiscal, y de los demás intervinientes constituidos en el procedimiento. La presencia del fiscal y del defensor del imputado, constituye requisito de validez de la misma. La falta de comparecencia del querellante, debidamente notificado, implica abandono de la persecución penal por su parte.
ARTÍCULO 302°.- Desarrollo. La audiencia preliminar se lleva a cabo oralmente y durante su realización no se admite la presentación de escritos. Se produce la prueba ofrecida y admitida, incorporándose la que, en su caso, se hubiese diligenciado, dándose oportunidad para que cada parte fundamente sus pretensiones. Luego de ello, y de corresponder según la ley, el Juez intentará la conciliación de las partes, formulando proposiciones para la reparación integral del daño social o particular causado. Se tratarán las estipulaciones o acuerdos probatorios a los que lleguen las partes por sí, o por sugerencia del Juez, que versen sobre aspectos en los cuales no haya controversia sustantiva. Tales acuerdos hacen que las partes aceptan como probados alguno o algunos de los hechos y sus circunstancias y serán puestos en conocimiento del Tribunal de juicio o del jurado en la forma que las partes lo estimen más conveniente. Cada parte puede formular las solicitudes, observaciones y planteamientos que estimare relevantes con relación a las pruebas ofrecidas por las demás.
( Artículo 302 modificado por el Artículo 25 la Ley N° 14258 )
ARTÍCULO 303.- Resolución. Dentro de los cinco (5) días de finalizado el debate, el Juez, fundadamente y dejándose constancia en acta, resolverá todas las cuestiones planteadas y, en su caso: 1) admitirá o rechazará, total o parcialmente, la acusación del Fiscal y del querellante si lo hubiera, ordenará, en su caso, la apertura del juicio común o por jurados; 2) ordenará la corrección de los vicios formales de la acusación; 3) resolverá las excepciones planteadas; 4) sobreseerá, si se presentan los presupuestos necesarios; 5) suspenderá el procedimiento a prueba o aplicará criterios de oportunidad, resolviendo lo que corresponda; 6) ratificará, revocará, sustituirá, morigerará o impondrá medidas cautelares; 7) ordenará, si correspondiere, el anticipo jurisdiccional de prueba solicitado; 8) aprobará los acuerdos a los que hubieren llegado las partes respecto a la reparación del daño y ordenará todo lo necesario para ejecutar lo acordado; 9) admitirá o rechazará la prueba ofrecida para el juicio; y 10) ordenará la separación o la acumulación de los juicios. Esta resolución será recurrible por las partes.
( Artículo 303 modificado por el Artículo 12 la Ley N° 14392 )
ARTÍCULO 304°.- Auto de apertura a juicio. Cuando la Resolución del artículo anterior disponga la apertura del juicio, habiendo adquirido firmeza, deberá contar con las siguientes precisiones: 1) si el juicio se llevará a cabo ante un tribunal de jurados o ante un tribunal de jueces profesionales conformado uni o pluripersonalmente; 2) los hechos por los cuales se autoriza la apertura del juicio, describiéndolos con precisión, como así también indicándose su calificación jurídica; 3) la identificación de los acusados y las partes admitidas; 4) la decisión sobre la admisibilidad o inadmisibilidad de la prueba ofrecida para el debate y, en su caso, las convenciones probatorias a las que hubieren arribado las partes; cuando procediera el juicio por jurados, la decisión sobre este punto quedará diferida de pleno derecho para la oportunidad prevista en el artículo 22 de la ley 14.253; 5) la individualización de quienes deben ser citados a la audiencia del juicio oral, debiendo estarse a lo establecido en el apartado anterior cuando procediera el juicio por jurados; 6) cuando el acusado soporte una medida de coerción, su subsistencia o consideración; 7) en caso de pluralidad de querellantes, la orden de unificar personería cuando fuere necesario; y 8) la orden de remitir las actuaciones, la documentación y cosas secuestradas a la Oficina de Gestión Judicial.
( Artículo 304 modificado por el Artículo 13 la Ley N° 14392 )
ARTÍCULO 305°.- Efectos. El auto de apertura a juicio es irrecurrible, sin perjuicio, en su caso, de la impugnación de la sentencia definitiva que se dictare en el juicio. No obstante, la defensa en esta oportunidad podrá hacer uso de las facultades previstas en el artículo 143.
( Artículo 305 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 306°.- Sobreseimiento. Mediando acuerdo entre las partes sobre el sobreseimiento, las mismas presentarán un escrito conjunto. El Tribunal controlará la legalidad de la petición, emitiendo su pronunciamiento al efecto, sin necesidad de citar a las partes a audiencia. Si el Tribunal así lo considera, podrá convocar a audiencia. En caso de controversia, a pedido de parte, el sobreseimiento se pronunciará, en los supuestos previstos en el artículo 289 inciso primero. El Juez de la investigación penal preparatoria convocará a una audiencia oral y pública donde, escuchadas las partes y producida la prueba pertinente, resolverá. Si su dictado implicara la imposición de una medida de seguridad se abstendrá de hacerlo remitiendo la causa al Tribunal de Juicio. El sobreseimiento cerrará definitiva e irrevocablemente el procedimiento con relación al imputado para quien se dicte. Tendrá valor de cosa juzgada con respecto a la cuestión penal sobre la que se pronuncie, pero no favorecerá a otros posibles copartícipes. Dictado el sobreseimiento, el Juez de la investigación penal preparatoria dispondrá la libertad del imputado, si correspondiere. El sobreseimiento procederá en cualquier estado y grado del proceso en los casos previstos en el inciso 1) a. del artículo 289. Cuando por nuevas pruebas producidas durante el juicio, resulte evidente la concurrencia de alguno de los casos contemplados en el inciso 1) b. y c. del artículo 289, el Fiscal, fundadamente, podrá solicitar el sobreseimiento del acusado. Ejecutoriado que fuera se librará la comunicación al Registro Único de Antecedentes Penales.
( Artículo 306 modificado por el Artículo 2 la Ley N° 13746 )

LIBRO IV
JUICIO Y PROCEDIMIENTOS ESPECIALES
TÍTULO I
Juicio Común
Capítulo I
Preparación del Juicio e Integración del Tribunal
ARTÍCULO 307°.- Preparación del juicio. Con noticia de las partes, dentro de las cuarenta y ocho (48) horas de recibidas las actuaciones, la Oficina de Gestión Judicial, por sorteo o sistema similar que se lleva a cabo según reglamentación a dictar, integra el Tribunal que intervendrá en el juicio, determinando el o los Jueces permanentes que deben asistir a él. La integración es notificada a las partes y al o los designados a los efectos de las recusaciones o excusaciones a las que hubiere lugar. Cuando se hubiere ordenado juicio oral ante un tribunal de jurados, el Juez que conduzca el debate será sorteado del colegio de jueces penales, con exclusión de los que hubieren intervenido durante la investigación penal preparatoria. Integrado definitivamente el Tribunal, se procede a fijar lugar, día y hora de inicio del juicio, que no se realizará antes de diez (10) días ni después de los treinta (30) días corridos, salvo que existan motivos fundados para posponer la fecha que no podrá ser incierta. Se citará al debate a los testigos o peritos asegurándose su comparecencia, pondrá a su disposición a los detenidos que hubiere y dispondrá las medidas necesarias para la organización y desarrollo del juicio, conservando para su eventual utilización en el mismo la documentación y cosas secuestradas. En casos complejos o cuando se lo solicite, la oficina judicial puede convocar a las partes para resolver cuestiones prácticas que hagan a la organización del debate. Las partes deben cooperar en la localización y comparecencia de los testigos que hubieren propuesto.
( Artículo 307 modificado por el Artículo 28 la Ley N° 14258 )
ARTÍCULO 308°.- Integración del Tribunal - Conocimiento de las actuaciones.- El Tribunal se integrará conforme lo dispuesto en el artículo 43 de este Código. En caso de integración pluripersonal el Tribunal será presidido por uno de los Jueces designados al efecto. En ningún caso podrán tomar conocimiento previo de los elementos probatorios que puedan valorarse en el juicio.
Capítulo II
Debate
Sección Primera
Audiencias
ARTÍCULO 309°.- Inmediación. El debate se realizará con la presencia ininterrumpida de las personas que componen el Tribunal, del Ministerio Público de la Acusación, del querellante en su caso, del imputado y su defensa. Si el defensor no compareciera al debate o se retirara de la audiencia, se procederá de inmediato a su reemplazo conforme a las disposiciones de este Código. Si el querellante no concurriera al debate o se retirara de la audiencia sin autorización, cesará .en su intervención, sin perjuicio de que pueda ser compelido a comparecer como testigo.
( Artículo 309 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 310°.- Asistencia del imputado.- El imputado asistirá a la audiencia, libre en su persona, sin perjuicio de la vigilancia y cautelas necesarias que se dispongan para impedir su fuga o violencia. Excepcionalmente se podrá autorizar que el imputado se retire de la audiencia cuando causas justificadas así lo determinen.
ARTÍCULO 311°.- Oralidad y publicidad.- Para ser válido el debate será oral y público. Las partes podrán consultar esquemas o ayuda memorias escritos, pero no leerlos. Podrán solicitar autorización para la lectura de material solamente en aquellos casos que este Código así lo disponga o cuando, por la naturaleza del mismo, resulte ello imprescindible. La publicidad implica el desarrollo del debate a puertas abiertas, pero el Tribunal podrá excepcionalmente resolver aun de oficio, que total o parcialmente se realice a puertas cerradas cuando la publicidad pudiera afectar a quien alegue su condición de víctima, a terceros o a la seguridad del Estado. La resolución será fundada, se hará constar en el acta y será irrecurrible. Desaparecida la causa de la clausura, se deberá permitir el acceso al público. La reglamentación que se dicte podrá determinar prohibiciones genéricas para el acceso a la sala de audiencia, así como facultar al Tribunal a adoptar medidas que atiendan a garantizar el orden y la seguridad en la sala. Durante el debate las resoluciones se dictarán verbalmente, pero se dejará constancia en el acta.
ARTÍCULO 312°.- Continuidad, receso y suspensión.- El debate continuará durante todas las audiencias consecutivas que fueran necesarias hasta su terminación. Sin perjuicio de ello, las partes podrán solicitar recesos por un plazo máximo de dos horas por motivos fundados. El Juez, a su vez, dispondrá los recesos necesarios para asegurar la eficacia del desarrollo de la audiencia. El debate podrá suspenderse a pedido de parte o aun de oficio, por un plazo que en cada oportunidad no superará el término de quince días, cuando: 1) así lo exigiera la resolución de un incidente que no pudiera decidirse inmediatamente; 2) fuera necesario practicar algún acto fuera del lugar de la audiencia y no pudiera cumplirse durante un receso; 3) fuera imprescindible para poder lograr la producción de alguna prueba; 4) fuera imposible su realización o continuación por enfermedad del Juez o de las partes que imprescindiblemente deben estar presentes; 5) lo solicitara la parte, cuando por circunstancias no previstas, tuviera necesidad de contar con tiempo para preparar su actividad acusatoria o defensista. En caso de suspensión, el Juez anunciará el día y hora de la nueva audiencia, y ello valdrá como citación para las partes. El vencimiento del plazo máximo de suspensión importará la invalidación del debate, que deberá iniciarse nuevamente, dentro de los sesenta días. Durante el tiempo de suspensión, el Juez y Fiscales podrán intervenir en otros juicios, de conformidad a lo que se disponga en la reglamentación respectiva.
ARTÍCULO 313°.- Postergación extraordinaria.- Si el imputado no compareciera al comienzo de la primera audiencia del debate, se ordenará la postergación del mismo hasta tanto aquel sea traído por la fuerza pública o fuera detenido, salvo que justificara debidamente su inasistencia. En tales casos se fijará de inmediato nueva audiencia.
ARTÍCULO 314°.- Poder de policía y disciplina.- El Juez ejercerá el poder de policía y disciplina en la audiencia y podrá sancionar en el acto, con hasta diez días multa o arresto hasta de ocho días, las infracciones al orden y seguridad, sin perjuicio de expulsar al infractor de la sala.
ARTÍCULO 315°.- Obligación de los asistentes.- Los que asistieran a la audiencia deberán permanecer en silencio, no podrán llevar armas u otras cosas aptas para molestar u ofender, ni adoptar una conducta intimidatoria, provocativa o contraria al decoro, ni producir disturbios o exteriorizar de cualquier modo, opiniones o sentimientos.
Sección Segunda
Actos del debate
ARTÍCULO 316°.- Dirección del debate.- El Juez dirigirá el debate, aceptando o rechazando las peticiones de las partes, hará las advertencias que correspondieran, recibirá los juramentos y moderará la discusión impidiendo derivaciones impertinentes, sin coartar el ejercicio de la acusación y la libertad de la defensa. Para el ejercicio de sus facultades podrá llamar a todas las partes a su despacho privado o conferenciar con éstas reservadamente sin suspender el debate.
ARTÍCULO 317°.- Apertura.- El día y hora fijado, el Juez, se constituirá en la sala de audiencias. Después de verificar la presencia del Ministerio Público Fiscal y del imputado y su defensor, el Juez declarará abierto el debate, advirtiendo al imputado que esté atento a lo que va a oír. Inmediatamente después practicará el interrogatorio de identificación del imputado. Acto seguido el Juez concederá la palabra sucesivamente y por el tiempo que fije, al Fiscal, al querellante, en su caso, y al defensor para que sinteticen la acusación y la línea de defensa respectivamente.
ARTÍCULO 318°.- Declaración del imputado. En cualquier instancia del debate el imputado tendrá derecho a ser oído cuando así lo peticione él o su defensor. En ningún caso el Tribunal podrá requerir declaración al imputado ni solicitarle que preste juramento o promesa de decir verdad.
( Artículo 318 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 319°.- Declaración de varios imputados.- Si los imputados fueran varios, el Juez podrá alejar de la sala de audiencias a los que no se encontraran declarando, pero después de todos los interrogatorios, deberá informarles sumariamente de lo ocurrido durante su ausencia.
ARTÍCULO 320°.- Facultades del imputado.- En el curso del debate, el imputado podrá hacer todas las declaraciones que considerara pertinentes, siempre que se refieran al objeto del juicio. El Juez impedirá cualquier divagación y si persistiera, podrá alejarlo de la audiencia. El imputado podrá hablar con su defensor sin que por ello la audiencia se suspenda, pero no durante su declaración o antes de responder a preguntas que se le formulen. En estas oportunidades nadie le podrá hacer sugerencia alguna.
ARTÍCULO 321°.- Ampliación de la acusación.- Durante el debate, el Ministerio Público Fiscal, y el querellante en su caso, podrán ampliar la acusación por inclusión de un hecho nuevo o circunstancia que modifica la calificación legal o la pena del mismo hecho objeto del debate, o que integra la continuación delictiva, que no hubieran sido mencionados originariamente.
ARTÍCULO 323°.- Recepción de pruebas. El Juez autorizará la producción de la prueba que las partes hubieran ofrecido oportunamente y hubiera sido admitida. En primer término se producirá la prueba del Fiscal, luego la del querellante y finalmente la de la defensa. El orden en que se irá produciendo la prueba será decidido por la parte que la ofreció.
( Artículo 323 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 324°.- Nuevas pruebas.- Las partes podrán solicitar la producción de nuevas pruebas las que, en caso de oposición, serán admitidas cuando se alegara fundadamente que antes se las desconocía.
ARTÍCULO 325°.- Interrogatorio. El perito, asesor técnico, testigo o intérprete previo prestar juramento, será interrogado por el Juez sobre su identidad personal. Inmediatamente después será interrogado directamente por la parte que lo hubiera ofrecido y luego contra interrogado por las demás. Formulada la pregunta y antes de que fuera contestada, las partes podrán oponerse y el Juez decidirá luego de oír a las demás.
( Artículo 325 modificado por el Artículo 1 la Ley N° 13405 )
ARTICULO 325 bis.- Reglas de interrogatorio y contrainterrogatorio. En sus interrogatorios, las partes que hubieren presentado a un testigo o perito no podrán formular sus preguntas de tal manera que ellas sugirieran la respuesta. Durante el contra interrogatorio, las partes podrán confrontar al perito o testigo con sus propios dichos u otras versiones de los hechos presentadas en el juicio. En ningún caso se admitirán preguntas engañosas, aquellas destinadas a coaccionar ilegítimamente al testigo o perito, ni las que fueren formuladas en términos poco claros para ellos. Estas reglas se aplicarán al procedimiento de anticipo jurisdiccional de prueba establecido en el art. 298 del Código Procesal Penal.
( Artículo 325 bis incorporado por el Artículo 2 la Ley N° 13405 )
ARTÍCULO 326°.- Lectura de actas y documentos de la Investigación Penal Preparatoria. Uso de Declaraciones previas al juicio. Usos de prueba material. En ningún caso el Juez ordenará la lectura de actas de la Investigación Penal Preparatoria. Sólo podrán usarse en la sala de juicio por los litigantes, previa autorización del Tribunal, los documentos, dictámenes periciales, actas o cualquier otro soporte técnico en el que se hayan registrado actos o manifestaciones con anterioridad al juicio, en caso de que un imputado, testigo, perito o intérprete olvide información relevante o para confrontarlas con su declaración actual. La prueba material está constituida por objetos, documentos y cualquier otro soporte técnico que contenga o constituya evidencia relevante de la comisión de un delito. Para su uso en juicio oral los objetos y documentos serán exhibidos, leídos y/o reproducidos, según corresponda. Será siempre introducida al juicio a través de los testigos y peritos y solo podrán incorporarse al juicio aquellos objetos que fueran previamente exhibidos.
( Artículo 326 modificado por el Artículo 29 la Ley N° 14258 )
ARTÍCULO 327°.- Comparendo.- Las partes deberán colaborar para el comparendo de los peritos, asesores técnicos, intérpretes o testigos que ofrecieran. El Juez a pedido de parte, dispondrá lo necesario para hacer comparecer por la fuerza pública a quien estando oportunamente citado no hubiera asistido.
ARTÍCULO 328°.- Inspección judicial.- El Juez, a pedido de parte, podrá disponer, se practiquen inspecciones oculares de lugares o de cosas. En tales casos el acta labrada será leída luego en la audiencia.
ARTÍCULO 329°.- Discusión final.- Terminada la recepción de las pruebas, el Juez preguntará a las partes si están en condiciones de producir sus alegatos finales. Si así fuera, concederá sucesivamente la palabra al Fiscal, al querellante y a la defensa del imputado para que en ese orden emitan sus conclusiones verbalmente. Podrán hablar dividiéndose sus tareas, dos Fiscales o hasta dos defensores del imputado. Finalizados los alegatos podrá haber réplica, correspondiendo a la defensa hablar en último término. La réplica deberá limitarse a la refutación de los argumentos adversarios que antes no hubieran sido discutidos. En caso de manifiesto abuso de la palabra, el Juez podrá llamar la atención al orador, y si éste persistiera, podrá limitar prudencialmente el tiempo para que concluya su alegato. Concluida la discusión final se dará por cerrado el debate.
ARTICULO 329 bis.- Declaración del impacto de la víctima. Con posterioridad a la conclusión del debate, el Juez o Tribunal convocará a la víctima ó víctimas para que sean escuchadas en relación a lo que tengan que decir respecto de la afectación provocada por el delito. En la audiencia sólo estará presente la víctima, y a los efectos del control de la naturaleza de la declaración estarán las partes técnicas. El imputado no participará excepto que la víctima lo autorice. La víctima podrá ser acompañada por una persona de su confianza o por un profesional que ella designe. En la misma, el Juez explicará sucintamente el estado de la causa y escuchará a la víctima respecto de la afectación o el impacto que el hecho delictivo le generó, sus vivencias, efectos, expectativas y demás circunstancias que quiera manifestar sobre el impacto. A los fines de facilitar su escucha y en aras de evitar la revictimización o eventuales afectaciones, la víctima podrá hacer uso de este derecho por escrito o por medios audiovisuales que sean remitidos al Tribunal. Es condición para la validez de la sentencia la sustanciación de la declaración de impacto o su ofrecimiento de manera efectiva a la víctima si ésta no optó por ejercer este derecho.
( Artículo 329 bis incorporado por el Artículo 9 la Ley N° 14181 )
Capítulo III
Acta del debate
ARTÍCULO 330°.- Contenido.- Se labrará un acta del debate que para ser válida deberá contener: 1) el lugar y fecha de la audiencia, con mención de la hora en que comenzó y terminó, los recesos y suspensiones dispuestos; 2) el nombre y apellido del Juez, Fiscales, querellantes, y defensores; 3) los datos personales del imputado; 4) el nombre y apellido de los testigos, peritos, asesores técnicos e intérpretes, con mención del juramento o compromiso y la enunciación de los otros elementos probatorios incorporados al debate; 5) las instancias y síntesis de las pretensiones de las partes; 6) otras menciones prescriptas por la ley, o las que el Juez ordenara hacer y aquellas que expresamente solicitaran las partes; 7) la firma del juez, de los fiscales, querellantes en su caso y defensores, previa lectura.
( Artículo 330 modificado por el Artículo 1 la Ley N° 13405 )
Capítulo IV
Sentencia
ARTÍCULO 331°.- Deliberación.- Inmediatamente después de terminado el debate, el Juez o Tribunal pasará a deliberar citando a las partes para la lectura de la decisión en un plazo no mayor de dos (2) días. La deliberación será secreta. El acto para ser válido no podrá suspenderse, salvo fuerza mayor, en cuyo caso lo será por un plazo que no podrá superar los tres (3) días. La causa de suspensión se hará constar y se informará a la Cámara de Apelaciones. En la oportunidad fijada y constituido nuevamente el Tribunal, se procederá a dar lectura a la decisión, ante quienes se encuentren presentes. La fundamentación de la sentencia será dada a conocer en dicho acto, valiendo como suficiente notificación para los presentes, o podrá diferirse su redacción hasta por un plazo no mayor de cinco (5) días más. En este último caso, se notificará por cédula que los fundamentos se encuentran a disposición de las partes y el plazo para impugnar la decisión comenzará a correr desde dicha notificación.
( Artículo 331 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 332°- Orden de tratamiento.- El Juez resolverá todas las cuestiones que hubieran sido objeto del juicio, apreciando únicamente la prueba recepcionada durante el debate. Seguirá en lo posible el siguiente orden: 1) las cuestiones incidentales que hubieran sido diferidas; 2) las cuestiones relativas a la existencia del hecho delictuoso, con discriminación de las circunstancias jurídicamente relevantes; 3) la participación del imputado; 4) la calificación legal; 5) la sanción aplicable en cuanto a la especie; 6) la sanción aplicable en cuanto al monto; 7) el destino de las cosas o efectos puestos a disposición del proceso; 8) las costas.
ARTÍCULO 333°.- Requisitos de la sentencia. La sentencia deberá contener: 1) lugar y fecha en que se dicta, el nombre y apellido del Juez, Fiscales, querellantes y defensores, las condiciones personales del imputado y la enunciación del hecho que haya sido objeto de la acusación respetando la regla de la congruencia; 2) decisión sobre cada una de las cuestiones planteadas en la deliberación, con los fundamentos en que se basa y la motivación en elementos probatorios incorporados legalmente al debate; 3) la parte resolutiva, con mención de las disposiciones legales aplicadas; 4) el cómputo de la pena impuesta, si se estimara conveniente practicarlo sin aguardar la intervención del Juez de la Ejecución; 5) si el imputado estuviere privado de su libertad y la sentencia fuera absolutoria dispondrá la libertad, salvo que el mismo estuviere a disposición de otra autoridad competente. En igual forma se procederá en caso de sentencia condenatoria a pena privativa de libertad de ejecución condicional o que diere por compurgada la pena con la preventiva sufrida; 6) la firma del Juez. Toda sentencia condenatoria dispondrá la extracción de muestras biológicas necesarias que permitan obtener la huella genética digitalizada de la persona condenada para su incorporación al Registro Provincial de Huellas Genéticas Digitalizadas y la inscripción de la sentencia en el mismo.
( Artículo 333 modificado por el Artículo 21 la Ley N° 14374 )
ARTÍCULO 333 bis.- Decomiso. La sentencia también resolverá el decomiso de las cosas que hayan servido para cometer el hecho y de las cosas o ganancias que sean producto o provecho del delito, independientemente de quien sea su titular, dejando a salvo los derechos de restitución o indemnización de terceros de buena fe. El destino de los bienes será determinado por la Agencia Provincial de Registro, Administración y Destino de Bienes y Derechos Patrimoniales. Cuando el autor o los partícipes han actuado como mandatarios de alguien o como órganos, miembros o administradores de una persona de existencia ideal, y el producto o el provecho del delito ha beneficiado al mandante o a la persona de existencia ideal, el comiso se pronunciará contra éstos. Cuando con el producto o el provecho del delito se hubiese beneficiado un tercero a título gratuito, el comiso se pronunciará contra éste. Decomiso sin condena. Los bienes serán decomisados de modo definitivo, sin necesidad de condena penal, cuando el imputado hubiera reconocido la procedencia o uso ilícito de los mismos, o cuando se hubiera podido comprobar la ilicitud de su origen o del hecho material al que estuviesen vinculados, y el imputado no pudiera ser enjuiciado por motivo de fuga. En estos casos, se promoverá el correspondiente incidente a fin de salvaguardar derechos de eventuales terceros ajenos al hecho delictivo. Acciones. Todo reclamo o litigio sobre el origen, naturaleza o propiedad de los bienes, se canalizará a través de un reclamo administrativo formulado ante la Autoridad de Aplicación, o una acción civil de restitución. Cuando el bien hubiera sido subastado sólo se podrá reclamar su valor monetario.
( Artículo 333 bis incorporado por el Artículo 17 la Ley N° 13579 )
ARTÍCULO 334°.- Pronunciamiento.- La sentencia se pronunciará siempre en nombre del Poder Judicial de la Provincia de Santa Fe, protocolizándose el original y agregándose copia a las actuaciones.
ARTÍCULO 335°.- Congruencia.- Al dictar sentencia el Tribunal nunca podrá apartarse del hecho contenido en la acusación o de sus ampliaciones ni aplicar sanciones más graves que las peticionadas.
ARTÍCULO 336°.- Absolución.- En todos los casos la sentencia absolutoria ordenará la cesación de las restricciones impuestas provisionalmente y dispondrá sobre la aplicación de medidas de seguridad que se hubieran solicitado.
ARTÍCULO 337°.- Aclaratoria.- El Tribunal no podrá variar la sentencia pero sí aclarar algún concepto dudoso u obscuro o suplir una omisión material, de oficio o a instancia de parte, dentro de los tres (3) días de la notificación del acto. El error puramente numérico no perjudica; puede ser corregido por el Tribunal en cualquier tiempo. También podrá hacerse uso de esa facultad para resolver algún punto accesorio o secundario de la cuestión principal y que hubiera sido omitido al decidir sobre ésta última. El pedido de aclaratoria suspenderá el plazo que hubiere empezado a correr para la deducción del recurso que fuera procedente. La decisión formará parte de la sentencia a que se refiere.
ARTÍCULO 338°.- Comunicación.- Las sentencias serán comunicadas una vez firmes, a través de la Oficina de Gestión Judicial al Registro Único de Antecedentes Penales, salvo las que tuviera a cargo comunicar el Tribunal de Ejecución.
TÍTULO II
Procedimiento abreviado
ARTÍCULO 339°.- Instancia común. En cualquier momento de la investigación penal preparatoria, el Fiscal y el defensor del imputado, en forma conjunta, podrán solicitar al Tribunal de la investigación preparatoria, la apertura del procedimiento abreviado en escrito que, para ser válido, contendrá: 1) los datos personales del Fiscal, del defensor y del imputado; 2) el hecho por el que se acusa, su calificación legal y las evidencias acreditantes de los extremos fácticos invocados; 3) la pena solicitada por el Fiscal, la que deberá ser motivada de conformidad con el artículo 140 del presente Código, determinarse en base a las pautas establecidas en los artículos 40 y 41 del Código Penal y acorde a los hechos que se investigan; 4) la conformidad del imputado y su defensa respecto de los requisitos precedentes y del procedimiento escogido, así como también la admisión de culpabilidad por el hecho indicado en el inciso 2); 5) en su casa, la firma del querellante o, en su defecto, la constancia de que el Fiscal lo ha notificado del acuerdo y no ha manifestado en término su disconformidad. En caso de disconformidad, será necesaria la firma del Fiscal Regional respectivo; 6) cuando el acuerdo versara sobre la aplicación de una pena superior a los seis (6) años de prisión efectiva se requerirá la firma del Fiscal Regional respectivo. Si la pena excediera los ocho (8) años de prisión o se hubiese modificado la calificación legal en favor del imputado respecto de la oportunamente atribuida en la audiencia irnputativa o si se tratare de una imputación por delitos comprendidos en el Libro Segundo "De los Delitos", Titulo III "Delitos Contra la Integridad Sexual" del Código Penal, se requerirá el aval del Fiscal General.
( Artículo 339 modificado por el Artículo 30 la Ley N° 14258 )
ARTÍCULO 340°.- Notificación al querellante. Producido el acuerdo y antes de la presentación a que alude el artículo precedente, el Fiscal notificará y entregará una copia certificada del contenido del mismo al querellante. Éste podrá, en el término de tres (3) días, manifestar fundadamente ante el Fiscal su disconformidad con el acuerdo.
( Artículo 340 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 341°.- Admisibilidad. El Juez de la investigación penal preparatoria declarará inadmisible la presentación que no cumplimentara los recaudos enunciados en el articulo 339.
( Artículo 341 modificado por el Artículo 31 la Ley N° 14258 )
ARTÍCULO 342°.- Audiencia. En caso de admitir la presentación, el Juez o Tribunal convocará a las partes a una audiencia pública, que se regirá en lo pertinente por las disposiciones del artículo 127; El Tribunal, en presencia de las partes, explicará al imputado el contenido y las implicancias del acuerdo propuesto, y recabará su libre, informada y expresa aceptación.
( Artículo 342 modificado por el Artículo 32 la Ley N° 14258 )
ARTÍCULO 343°.- Rechazo y resolución. El Tribunal podrá rechazar el acuerdo cuando considere que las evidencias enunciadas resultan insuficientes para acreditar los extremos invocados, o cuando discrepe con la calificación jurídica propuesta en función de los hechos acordados o acreditados. De no mediar rechazo, dictará sentencia dentro de los cinco (5) días, de estricta conformidad con la pena y modo de ejecución aceptados por las partes, valorando directamente la prueba alegada por las partes. No obstante, si a partir del hecho planteado en el acuerdo, estimara que el mismo carece de tipicidad penal o resulta manifiesta la concurrencia de cualquier circunstancia legalmente determinante de la exención de pena, de su atenuación, dictará sentencia absolviendo o disminuyendo la pena en los términos en que proceda.
( Artículo 343 modificado por el Artículo 33 la Ley N° 14258 )
ARTÍCULO 344°.- Acuerdo durante el juicio o el procedimiento intermedio. En los juicios por delito de acción privada o en los que se hubiera efectuado conversión de la acción penal en privada, el procedimiento abreviado podrá ser acordado por las partes hasta la clausura del debate. En los procesos por delitos de acción pública, el acuerdo podrá ser presentado hasta los tres días posteriores a la notificación prevista en el artículo 307, primer párrafo.
( Artículo 344 modificado por el Artículo 1 de la Ley N° 14448 )
ARTÍCULO 345°.- Pluralidad de imputados.- La existencia de varios imputados en un mismo procedimiento no impedirá la aplicación de estas reglas a alguno de ellos.
