TÍTULO III
Medidas cautelares
Capítulo I
Reglas generales
ARTÍCULO 205°.- Presupuestos.- El Tribunal a pedido de parte podrá ordenar medidas de coerción real o personal cuando se cumplieran todos los siguientes presupuestos: 1) apariencia de responsabilidad en el titular del derecho a afectar por la medida cautelar; 2) existencia de peligro frente a la demora en despachar la medida cautelar; 3) proporcionalidad entre la medida cautelar y el objeto de la cautela; 4) contracautela en los casos de medidas cautelares reales solicitadas por el querellante.
ARTÍCULO 206°.- Cesación de la coerción.- En caso que se advirtiera la posterior ausencia de uno o más de los presupuestos a que alude el artículo anterior, el Tribunal podrá, a pedido de parte, hacer cesar de inmediato la cautela ordenada.
ARTÍCULO 207°.- Cesación provisoria del estado antijurídico producido. El Fiscal, la víctima, el damnificado, el querellante y el imputado podrán solicitar al Tribunal de la investigación penal preparatoria que disponga provisionalmente las medidas del caso para que cese el estado antijurídico, o se disminuya o evite que se agrave el daño producido por el hecho investigado con apariencia de delito en las cosas o efectos. La incidencia será sustanciada en audiencia oral y resuelta sin recurso alguno, aunque no se hubiese celebrado la audiencia imputativa. Sin perjuicio de ello, será apelable si causare gravamen irreparable. Cuando la actividad presumiblemente delictiva hubiera implicado el desplazamiento forzado de personas de su lugar de residencia o la apropiación de inmuebles para el desarrollo de actividades ilícitas, podrá ordenarse el desalojo inmediato y por la fuerza pública de los intrusos y la restitución del inmueble a quien aparezca verosímilmente como su legítimo tenedor o hubiera sido víctima de desplazamiento forzado e independientemente de la configuración de delito penal en torno a la usurpación misma. También podrá ordenarse la inactivación física de inmuebles, cuando los mismos hubieran sido utilizados para la actividad ilícita o no fueran susceptibles de otra utilización. El Tribunal podrá delegar en el Fiscal o en la autoridad administrativa la determinación del medio técnico de inactivación, pudiendo en su caso procederse a la demolición total, al desmontaje selectivo de materiales o al bloqueo físico de aberturas. De igual modo, podrá delegarse el monitoreo periódico de la inactivación, en cuyo caso la autoridad administrativa podrá intervenir sin necesidad de nueva autorización ante eventuales reanudaciones del estado antijurídico, de todo lo cual se dará noticia posterior al Fiscal y en su caso al Tribunal. Asimismo, y con la finalidad de desalentar la reanudación de la actividad ilícita, podrá disponerse la refuncionalización del inmueble y su utilización para la prestación de servicios estatales o para el desarrollo de actividades comunitarias o de bien público, bajo supervisión del Poder Ejecutivo y con informes periódicos a la Fiscalía y al Tribunal. Las medidas dispuestas no obstarán a las acciones civiles a que hubiere lugar.
( Artículo 207 modificado por el Artículo 5 la Ley N° 14392 )
ARTÍCULO 208°.- Finalidad y alcance. Las medidas de coerción se despacharán con la finalidad de evitar el riesgo de que se frustre la actividad probatoria o las pretensiones de las partes, o para hacer cesar la actividad antijurídica o sus efectos.
( Artículo 208 modificado por el Artículo 12 la Ley N° 14258 )
ARTÍCULO 208 bis.- En las causas por infracción a los artículos 84 bis, 94 bis y 193 bis del Código Penal, cuando las lesiones o muertes sean consecuencia de la conducción imprudente, negligente, inexperta o antirreglamentaria de un vehículo con motor, o la situación de peligro para la vida o la integridad física de las personas se creare mediante la participación en una prueba de velocidad o de destreza con un vehículo con motor, realizada sin la debida autorización de autoridad competente, el juez de la Investigación Penal Preparatoria podrá, a pedido de parte, inhabilitar provisoriamente para conducir al imputado, reteniéndole a tal efecto la licencia habilitante y comunicando la resolución a los Registros Nacional y Provincial de Antecedentes de Tránsito. Esta medida cautelar durará como máximo seis meses y podrá ser prorrogada por períodos no inferiores a un mes, hasta el dictado de la sentencia. La medida y sus prórrogas pueden ser revocadas o apeladas. El período efectivo de inhabilitación provisoria puede ser computado para el cumplimiento de la sanción de inhabilitación sólo si el imputado aprobare un curso de los contemplados en el artículo 83 inc. d) de la ley nacional Nº 24.449.
( Artículo 208 bis modificado por el Artículo 1 la Ley N° 13734 )
Capítulo II
Coerción personal
ARTÍCULO 209°.- Presentación espontánea.- Quien considerara que como imputado corre riesgo de ser detenido en relación a una Investigación Penal Preparatoria, podrá presentarse ante el Ministerio Público Fiscal, para dejar constancia de que se ha presentado espontáneamente y solicita ser convocado si correspondiera, por medio de una citación.
ARTÍCULO 210°.- Citación.- Cuando fuera necesaria la presencia del imputado para su identificación policial o para celebrar la audiencia imputativa a que refiere el artículo 274, y siempre que no fuera procedente ordenar su detención, se dispondrá su citación.
ARTÍCULO 211°.- Arresto.- Cuando en el primer momento de la Investigación Penal Preparatoria no fuere posible individualizar a los presuntos responsables y a los testigos, se podrá disponer que los presentes no se alejen del lugar, ni se comuniquen entre sí antes de declarar, y aún ordenar el arresto si fuera necesario por un plazo no mayor de veinticuatro horas.
ARTÍCULO 212°.- Aprehensión. La Policía deberá aprehender a quien sorprenda en flagrancia en la comisión de un delito de acción pública. En la misma situación, cualquier persona puede practicar la aprehensión entregando inmediatamente el aprehendido a la Policía. En ambos casos, la Policía dará aviso sin dilación alguna al Ministerio Público de la Acusación, quien decidirá el cese de la aprehensión o dispondrá la detención si fuera procedente. Si se trata de un delito dependiente de instancia privada, será informado de inmediato al titular del poder de instar.
( Artículo 212 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 213°.- Se considerará que hay flagrancia cuando el presunto autor: a) fuera sorprendido en el momento de intentar o de cometer el hecho; b) fuera en el momento y lugar de intentar o cometer el hecho indicado por la víctima o un tercero como autor o partícipe de un delito; c) fuera perseguido o aparezca en un registro audiovisual inmediatamente después de su comisión; d) tuviera objetos o exhibiera rastros que hicieran presumir que acaba de participar en el delito; e) se hubiese fugado de un establecimiento penitenciario o de cualquier otro lugar de detención.
( Artículo 213 modificado por el Artículo 13 la Ley N° 14258 )
ARTÍCULO 214°.- Detención. La detención será ordenada por el Fiscal contra aquel imputado respecto del cual estimara que los elementos reunidos en la investigación penal preparatoria autorizaran a celebrar la audiencia prevista en el artículo 274, siempre que se trate de delitos reprimidos con pena privativa de libertad y pudiera existir riesgo de fuga o de entorpecimiento probatorio. La detención tendrá una duración máxima de noventa y seis (96) horas. A pedido fundado de parte, el juez podrá prorrogar sin recurso alguno, su duración por otras noventa y seis (96) horas más. Cuando la tramitación sea compleja a causa de la pluralidad de hechos, del elevado número de detenidos o víctimas, o por tratarse de casos de delincuencia organizada o trasnacional, la detención tendrá una duración máxima de quince (15) días. A solicitud del Fiscal, el Tribunal podrá ordenar la prórroga de la detención por el término máximo de quince (15) días más. En ningún caso será aplicable la duplicación de los términos previstos por el artículo 346. Si al vencimiento de la detención o de su prórroga no se hubiera solicitado la audiencia prevista en el artículo 224, el imputado o su defensa podrán plantear denuncia de hábeas corpus. En todos los casos que medie pedido del imputado o su defensa, aquel deberá ser llevado ante los estrados judiciales a fin de que el Tribunal controle sumariamente la legalidad de la detención, lo que deberá realizarse dentro de las veinticuatro (24) horas desde la formulación del pedido de control.
( Artículo 214 modificado por el Artículo 1 la Ley N° 14267 )
ARTÍCULO 215°.- Incomunicación.- Con motivación suficiente, y hasta la celebración de la audiencia imputativa el Fiscal podrá ordenar la incomunicación del detenido. La medida cesará automáticamente luego de finalizada dicha audiencia o al vencimiento del plazo máximo previsto para la celebración de la misma.
ARTÍCULO 216°.- Comunicación con el defensor.- En ningún caso la incomunicación del detenido impedirá que éste se comunique con su defensor, en forma privada, inmediatamente antes de comenzar su declaración o antes de cualquier acto que requiera su intervención personal.
ARTÍCULO 217°.- Orden. La orden de detención que emanara del Fiscal será escrita y contendrá los datos indispensables para una correcta individualización del imputado y una descripción sucinta del hecho que la motiva, debiendo especificar si debe o no hacerse efectiva la incomunicación. Además, se dejará constancia del Juez a cuya disposición deberá ponerse al imputado una vez detenido, lo que deberá ocurrir dentro de las veinticuatro (24) horas de operada la medida. En caso de aprehensión por flagrancia o en supuestos de urgencia, la orden podrá ser transmitida verbalmente, dejándose constancia en la misma de tal extremo. La orden escrita podrá ser emitida por cualquier medio que garantice la veracidad y exigencias de la misma, cuando existan las condiciones técnicas para su implementación.
( Artículo 217 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 218°.- Libertad por orden Fiscal.- El Fiscal podrá disponer la libertad del aprehendido o detenido hasta el momento en que fueran presentado el mismo ante un juez.
ARTÍCULO 219°.- Medidas cautelares no privativas de la libertad. Siempre que el peligro de fuga o de entorpecimiento probatorio pudiera razonablemente evitarse con una medida cautelar que no implique privación de libertad, el Tribunal de oficio o a pedido de parte, impondrá con fundamento suficiente, ésta en lugar de la prisión. Entre otras, podrá disponerse, de acuerdo a las circunstancias del caso, cualquiera de las medidas que se detallan a continuación de manera individual o combinada: 1) la obligación de someterse al cuidado de una persona o institución, quien periódicamente informará al Tribunal sobre la situación. La persona o institución deberá, a solicitud del Fiscal o el querellante, acreditar que cuenta con capacidad para controlar al imputado y que no mantuvo una vinculación con el mismo, en relación a los hechos que se investigan; 2) la obligación de presentarse periódicamente ante la autoridad que se designe; 3) la prohibición de salir del país, un ámbito territorial determinado, de concurrir a determinados lugares o a determinadas reuniones, de comunicarse por cualquier medio con ciertas personas o de aproximarse a las mismas dentro del espacio que se determine; 4) el abandono del domicilio, cuando se trate de hechos de violencia doméstica y la víctima conviva con el imputado; 5) la prohibición de tener, portar, transportar, almacenar, registrar, receptar, suministrar, comercializar, intermediar o utilizar de cualquier forma armas de fuego, municiones, explosivos o cualquier otro material controlado, pudiendo asimismo disponerse la clausura de las instalaciones destinadas a cualquiera de estas actividades, sin perjuicio de las facultades de los organismos de contralor; como así también la prohibición de portación y utilización de armas blancas en la vía pública; 6) la prestación de una caución patrimonial por el propio imputado o por otra persona; 7) la vigilancia mediante dispositivos electrónicos de rastreo o posicionamiento de su ubicación física. Para disponerla, el Tribunal deberá previamente consultar sobre la disponibilidad del dispositivo; 8) la simple promesa jurada de someterse al proceso penal, cuando con ésta bastara como medida cautelar o fuere imposible el cumplimiento de otra. Es presupuesto de validez de las medidas la celebración previa de la audiencia imputativa prevista por los artículos 274 y siguientes.
( Artículo 219 modificado por el Artículo 6 la Ley N° 14392 )
ARTÍCULO 220°.- Procedencia de la prisión preventiva. A pedido de parte, podrá imponerse prisión preventiva al imputado, cuando se estimaran reunidas las siguientes condiciones: 1) existencia de elementos de convicción suficientes para sostener su probable autoría o participación punible en el hecho investigado; 2) la pena privativa de libertad, que razonablemente pudiera corresponder en caso de condena, sea de efectiva ejecución. En este sentido, y para ser válidas, las decisiones relativas a eventuales condenaciones condicionales deberán proyectarse sobre todos los elementos del artículo 26 del Código Penal; 3) las circunstancias del caso autorizarán a presumir el peligro de fuga o de entorpecimiento de la investigación. Presupuesto de validez de la medida es la celebración previa de la audiencia imputativa prevista por los artículos 274 y siguientes.
( Artículo 220 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 220º bis.- Medidas cautelares para imputados privados de su libertad. Cuando el imputado se encontrara privado de su libertad por disposición de otra autoridad competente, fuera por la aplicación de prisión preventiva o de pena privativa de libertad de cumplimiento efectivo, y siempre que las circunstancias del caso autorizaran a presumir el peligro de entorpecimiento de la investigación y se encontraren reunidos los requisitos previstos en el artículo anterior, a pedido de parte, el Tribunal podrá imponerle fundadamente, entre otras, cualquiera de las siguientes medidas de manera Individual o combinada: 1) la modificación, restricción o suspensión temporal del régimen de visitas; 2) la modificación, restricción o suspensión temporal del régimen de comunicaciones; 3) la modificación de las condiciones de la detención o de ejecución de la pena privativa de libertad; 4) la prohibición de comunicarse o contactar con ciertos reclusos alojados en el mismo establecimiento. En cualquier caso, deberá respetarse el régimen de progresividad prevista en las leyes de fondo. Las medidas se impondrán como máximo hasta la formulación de la requisitoria de acusación ante el Juez de la Investigación Penal Preparatoria. Presentada ésta, cesarán de pleno derecho.
( Artículo 220 bis incorporado por el Artículo 44 la Ley N° 14258 )
ARTÍCULO 221°.- Peligrosidad procesal. La existencia de peligro de fuga o de entorpecimiento de la investigación podrá elaborarse a partir del análisis de alguna de las siguientes circunstancias, sin perjuicio de la valoración de otras que, en el caso, resultaren relevantes y fueran debidamente analizadas y fundadas: 1) la magnitud y modo de cumplimiento de la pena en expectativa. Se tendrán en cuenta a este respecto las reglas de los artículos 40, 41, 41 bis, 41 ter, 41 quater y 41 quinquies del Código Penal, como así también la pluralidad de imputaciones o de causas en trámite. La imposición de pena privativa de libertad de efectivo cumplimiento por sentencia condenatoria cuando no se hallare firme será considerada como causal de peligro de fuga; 2) la importancia del daño a resarcir y la actitud que el imputado adoptara voluntariamente frente a él; 3) el comportamiento del imputado durante el desarrollo del Procedimiento o de otro procedimiento anterior, en la medida en que perturbara o hubiere perturbado el proceso. Particularmente, se tendrá en cuenta si puso en peligro a denunciantes, víctimas y testigos o a sus familiares, si influyó o trato de influir sobre los mismos, si ocultó información sobre su identidad o proporcionó una falsa, si se presentó espontáneamente o debió ser habido mediante captura, o si se resistió al accionar policial al momento de su aprehensión o durante el desarrollo de medidas investigativas; 4) la violación de medidas de coerción establecidas en el mismo proceso o en otros anteriores; 5) la declaración de rebeldía durante el desarrollo del procedimiento o de otro procedimiento anterior o el haber proporcionado datos falsos o esquivos sobre su identidad o actividades; 6) la falta de arraigo del imputado, de su familia y de sus negocios o trabajo, como así también toda circunstancia que permita razonablemente expedirse acerca de sus posibilidades de permanecer oculto o abandonar el país; 7) la ausencia de residencia fija. Ante pedido del Fiscal o del querellante, la residencia denunciada deberá ser debidamente comprobada; 8) la tenencia, portación, transporte, almacenamiento, registro, receptación, suministro, comercialización, intermediación o utilización de armas de fuego, municiones, explosivos u otros materiales controlados, como así también la portación y la utilización de armas blancas por uno o algunos de los imputados, ya sea antes, durante o después de la ejecución del hecho delictivo; 9) que el imputado tenga una condena anterior total o parcialmente cumplida en un proceso judicial, salvo que haya transcurrido, desde el cumplimiento de la condena, un término igual al de la impuesta en dicho proceso que nunca podrá ser mayor a diez (10) años. En tal caso no podrá tenerse en cuenta este apartado; 10) el estar siendo investigado o haber sido investigado en otros procesos penales por la eventual comisión de delitos dolosos dentro de los tres (3) años anteriores a la comisión del hecho por el que se peticiona la prisión preventiva y siempre que el imputado hubiere obtenido anteriormente en alguno de esos procedimientos el dictado de prisión preventiva o alguna de las medidas previstas en el artículo 219.
( Artículo 221 modificado por el Artículo 7 la Ley N° 14392 )
ARTÍCULO 222°.- Atenuación de la coerción. El Tribunal, de oficio, o luego de escuchar en audiencia a las partes, morigerará los efectos del medio coercitivo en la medida que cumplimente el aseguramiento perseguido. Con suficiente fundamento y consentimiento del imputado, podrá imponerle: 1) su prisión domiciliaria con el control o la vigilancia que se especifique, en los casos establecidos en el artículo 10 del Código Penal; 2) su encarcelamiento con salida diaria laboral y/o salida periódica para afianzar vínculos familiares, bajo la responsabilidad y cuidado de una persona o institución que se comprometa formalmente ante la autoridad y suministre informes periódicos; 3) su ingreso en una institución educadora o terapéutica, pública o privada, que sirva a la personalización del internado en ella.
( Artículo 222 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 223°.- Solicitud de audiencia. En el mismo escrito de solicitud de audiencia imputativa o en cualquier estado de la investigación penal preparatoria, la Fiscalía podrá solicitar audiencia para tratar la aplicación de medidas coercitivas contra el imputado. Si éste estuviera detenido, la solicitud deberá realizarse dentro del término de la detención o de su prórroga, de conformidad con el artículo 214. Vencido el término del artículo 214, sin deducirse la instancia estando el imputado detenido, la defensa podrá plantear una denuncia de hábeas corpus, sin perjuicio de procederse de oficio.
( Artículo 223 modificado por el Artículo 16 la Ley N° 14258 )
ARTÍCULO 224°.- Desarrollo de la audiencia. La audiencia a la que refiere el artículo anterior se regirá en lo pertinente por las disposiciones del artículo 127. La acreditación del riesgo de fuga o de entorpecimiento de la investigación tendrá lugar mediante informes estandarizados, conforme a la reglamentación que al efecto se dicte.
( Artículo 224 modificado por el Artículo 17 la Ley N° 14258 )
ARTÍCULO 225°.- Nueva audiencia. Mediando acuerdo entre las partes sobre la morigeración o revocación de las medidas cautelares impuestas, las mismas presentarán un escrito conjunto al Tribunal, quien controlará la legalidad de la propuesta, emitiendo una nueva resolución al efecto, sin necesidad de citar a las partes a audiencia. Si el Tribunal así lo considera, podrá convocar a audiencia. En caso de controversia y mediando una solicitud por escrito donde cualquiera de las partes invocaran elementos probatorios sobrevinientes, el Tribunal convocará a una nueva audiencia con la finalidad de analizar la eventual modificación o revocación de la resolución que impusiera o rechazara medidas cautelares. Cuando se alegara como única motivación del examen, el transcurso del tiempo que sobrelleva en prisión el imputado, bajo condición de admisibilidad, deberá mediar un lapso no menor de noventa (90) días entre las sucesivas audiencias. Se observará el trámite previsto en los artículos precedentes, adecuando el orden de las intervenciones en la audiencia al carácter de promotor o contradictor en el incidente que asuman cada una de las partes.
( Artículo 225 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 226°.- Recursos. La resolución que imponga, modifique o rechace medidas coercitivas personales, será apelable, sin efecto suspensivo.
( Artículo 226 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 227°.- Cesación de la prisión preventiva. El Tribunal dispondrá, de oficio o luego de oídas las partes en audiencia, la cesación de la prisión preventiva cuando: a) por el tiempo de duración de la misma, no guardara proporcionalidad con el encarcelamiento efectivo que razonablemente pudiera corresponder en caso de condena; b) su duración excediera de dos (2) años. En este último caso, antes de que se cumpliera tal plazo, el Ministerio Público de la Acusación podrá solicitar al Tribunal la prórroga del encarcelamiento preventivo. Dicha prórroga será otorgada excepcionalmente por un plazo máximo de un (1) año. Vencido dicho plazo, si no hubiera comenzado la audiencia de debate, la prisión preventiva cesará definitivamente. Dictada la sentencia condenatoria, si se concedieran recursos contra ella, la prisión preventiva no tendrá término máximo de duración, sin perjuicio de su cese por el inciso primero.
( Artículo 227 modificado por el Artículo 8 la Ley N° 14392 )
ARTÍCULO 228°.- Cesación de las medidas cautelares no privativas de la libertad. Las medidas cautelares no privativas de la libertad impuestas, o aquellas que hubieren atenuado la prisión preventiva, cesarán automáticamente y de pleno derecho al cumplirse los plazos y condiciones previstos en el artículo anterior.
( Artículo 228 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 229°.- Caducidad. Efectos. Las libertades provisionales que sean otorgadas como consecuencia de las medidas de coerción o las morigeraciones dispuestas respecto de una prisión preventiva, caducarán de pleno derecho cuando el imputado fuera detenido en relación a otro procedimiento penal. El imputado será puesto a disposición de todos los Tribunales intervinientes y la viabilidad de nuevas medidas de coerción o de la prisión preventiva, será nuevamente analizada, a instancia de parte, teniendo en cuenta todas las persecuciones penales en trámite. En caso de acumulación, será competente para entender en este análisis, el Juez de la investigación penal preparatoria del lugar donde tenga su asiento el Tribunal ante quien correspondiera acumular las pretensiones punitivas. Se observará el trámite de la audiencia oral prevista en el artículo 224. En caso de incumplimiento injustificado por parte del imputado de las cargas y deberes establecidos como consecuencia de la aplicación de las medidas dispuestas en los artículos 219 o 222, el Fiscal o el querellante podrán solicitar en audiencia convocada al efecto la aplicación de otras medidas cautelares más ajustadas a las circunstancias del caso.
( Artículo 229 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 230°.- Internación provisional.- El Tribunal, a pedido de parte, podrá ordenar la internación del imputado en un establecimiento asistencial cuando, a los requisitos para la prisión preventiva, se agregare la comprobación por dictamen de dos peritos de que el mismo sufre una grave alteración o insuficiencia de sus facultades mentales, que lo tornan peligroso para sí o para los demás. Regirán, análogamente los artículos que regulan el trámite de la prisión preventiva. Cuando no concurrieran los presupuestos para despachar la prisión preventiva, y sí las demás circunstancias a que se alude precedentemente, el Tribunal informará al órgano juridisccional competente para resolver sobre su incapacidad e internación y pondrá a su disposición a quien estuviera detenido, de conformidad a lo dispuesto por el Código Procesal Civil y Comercial en la materia.
( Artículo 231 derogado por el Artículo 45 la Ley N° 14258 )
ARTÍCULO 232°.- Cauciones.- Las cauciones a las que se refiere este capítulo serán personales o reales. En las primeras el imputado asumirá solidariamente con uno o más fiadores la obligación de pagar la suma que el tribunal fije cuando corresponda hacerse efectiva. El fiador deberá ser persona capaz, acreditando solvencia suficiente y no podrá tener otorgadas y subsistentes más de dos fianzas. En las segundas, se constituirá otorgando prendas, hipotecas, dando bienes a embargo o depósito de dinero, efectos públicos o valores cotizables, también por la cantidad que se fije.
ARTÍCULO 233°.- Forma.- Las cauciones se otorgarán antes de ordenarse la libertad, en acta suscripta a la que se agregarán los documentos que acrediten la solvencia, si correspondiere, donde el imputado y el tercero fijarán domicilio a dichos efectos.
ARTÍCULO 234°.- Sustitución.- El fiador podrá pedir al Tribunal que lo sustituya por otra persona que él presente, quien deberá reunir las condiciones de aquél. El imputado podrá reemplazar el bien sujeto a cautela por otro u otros de igual valor en cualquier momento.
ARTÍCULO 235°.- Incomparecencia. Sanciones.- Si el imputado no comparece al ser citado o se sustrae a la ejecución de la pena privativa de libertad, se librará orden de captura y se fijará un término no mayor de diez días para que comparezca. De ello se notificará al fiador y al imputado, bajo apercibimiento de que si éste no compareciere o no justificare estar impedido por fuerza mayor, la caución se hará efectiva al vencimiento de ese término, se dispondrá la ejecución de conformidad con las normas correspondientes del Código Procesal Civil y Comercial quedando legitimado, a dichos efectos, el Ministerio Público.
ARTÍCULO 236°.- Cancelación de cauciones. Trámite.- La caución se cancelará y las garantías serán restituidas: 1) cuando el imputado fuere constituido en prisión dentro del plazo que se le acordó al revocarse la libertad; 2) cuando se revoque la orden de detención, se sobresea o absuelva al imputado, o se lo condene en forma condicional; 3) cuando dentro del plazo fijado el condenado se presentare a cumplir la condena o fuera detenido. Todas las cuestiones referidas a cauciones se tramitará conforme lo dispuesto para el recurso de reposición.
Capítulo III
Coerción real
ARTÍCULO 237°.- Embargo e inmovilización de fondos. El Tribunal dispondrá a pedido de parte, embargo en bienes del imputado en medida suficiente para garantizar la pena pecuniaria y las costas del juicio. También podrá solicitar la medida el querellante, para garantizar la reparación del daño causado por el delito atribuido. Asimismo, podrá disponer la inmovilización de los fondos depositados en las entidades bancarias, mutuales, cooperativas y en personas jurídicas privadas.
( Artículo 237 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 238°.- Inhibición e inscripción litigiosa de bienes. Medidas de no innovar. De no conocerse bienes libres, o en caso de insolvencia o insuficiencia de los bienes embargados, el Tribunal podrá disponer a pedido de parte o del querellante, la inhibición general del imputado, la que podrá sustituirse si ofreciera bienes o diera caución suficiente. A pedido de parte, el Tribunal podrá disponer la inscripción como litigiosa de los bienes o derechos patrimoniales relacionados con el delito, derivados u obtenidos directa o indirectamente de actividades ilícitas, utilizados de cualquier forma para el desarrollo de actividades ilícitas o que constituyan un incremento patrimonial no justificado, sean o no los mismos de titularidad registral del imputado, siempre que existan elementos que permitan considerar razonablemente que provienen de actividades ilícitas con las que los mismos se encuentran vinculados. Asimismo, y en las condiciones del párrafo precedente, podrán solicitarse medidas de no innovar.
( Artículo 238 modificado por el Artículo 16 la Ley N° 13579 )
ARTÍCULO 239°.- Trámite y sustanciación. El Tribunal, a pedido de parte, podrá adoptar desde el inicio de la Investigación Penal Preparatoria cualquier medida cautelar que considere suficiente para asegurar el decomiso de los bienes o derechos patrimoniales sobre los que, por tratarse de instrumentos o efectos relacionados con el delito que se investiga, el decomiso presumiblemente pueda recaer. Lo mismo podrá disponerse con la finalidad de hacer cesar la comisión del delito o sus efectos, o para evitar que se consolide su provecho u obstaculizar la impunidad de sus partícipes. En todos los casos se deberá dejar a salvo los derechos de restitución o indemnización de terceros de buena fe. Las solicitudes de medidas cautelares de coerción real serán sustanciadas en instancia única y en la misma audiencia prevista para la prisión preventiva o sus alternativas, o si fuera el caso, en una que se solicite al sólo efecto, donde se arbitrará el mismo trámite.
( Artículo 239 modificado por el Artículo 16 la Ley N° 13579 )
ARTÍCULO 240°.- Secuestro. El Fiscal podrá ordenar el secuestro de los efectos sujetos a decomiso o que pudieran servir como medio de prueba. En el plazo máximo de cuarenta y ocho (48) horas de secuestradas, deberá indicar en cuáles de los supuestos mencionados se realiza la medida. Cuando tengan la condición de ser objeto de prueba, las diligencias probatorias deberán agotarse dentro de los seis (6) meses, pudiendo procederse de conformidad con el artículo 298. Vencido dicho término, la Agencia Provincial de Registro, Administración y Destino de Bienes y Derechos Patrimoniales quedará habilitada a disponer de los efectos sin más trámite.
( Artículo 240 modificado por el Artículo 9 la Ley N° 14392 )
ARTÍCULO 241°.- Objetos no sometidos a secuestro.- Sin perjuicio de lo establecido en el artículo 169, no podrán ser objeto de secuestro: 1) las comunicaciones entre el imputado y las personas que deban abstenerse de declarar como testigo; 2) las notas que hubieran tomado los nombrados anteriormente sobre comunicaciones confiadas por el imputado, o sobre cualquier circunstancia a la cual se extienda el derecho o el deber de abstenerse de declarar; 3) los resultados de exámenes o diagnósticos relativos a las ciencias médicas realizadas al imputado bajo secreto profesional.
ARTÍCULO 242°.- Destino de los bienes. Régimen. Los bienes que fueran objeto de secuestro, depósito, cautela previa o decomiso, como consecuencia de la investigación de hechos ilícitos, quedarán a disposición de la Agencia Provincial de Registro, Administración y Destino de Bienes y Derechos Patrimoniales, la que tendrá a su cargo la custodia, administración, conservación y disposición de los mismos. Los automotores o motocicletas o cualquier otros bienes muebles registrables que durante el lapso de seis (6) meses permanecieran secuestrados, y sobre los cuales no se hubiera efectuado reclamo por su propietario o persona con legítimo derecho sobre los mismos, o en caso de que efectuado el mismo no se hubiera agotado el procedimiento, podrán ser entregados en calidad de depósito renovable anualmente al Poder Ejecutivo, para que lo utilice en funciones específicas de la Policía, Organismo de Investigación del Ministerio Público de la Acusación o de los institutos de privación de libertad, educativos o asistenciales del Estado Provincial. El Fiscal solicitará la destrucción de las armas de fuego y materiales controlados que, durante el lapso de seis (6) meses, hubieran permanecido secuestradas a disposición de autoridad judicial y sobre las cuales no se hubiera efectuado reclamo por su propietario o persona con legítimo derecho. El Juez o Tribunal correspondiente ordenará la destrucción previo informe sobre sus características, aptitud para el disparo, toma de disparo testigo y toda otra circunstancia conducente para asegurar la prueba. En caso de que se hubiere efectuado el reclamo pero no se hubiera agotado el procedimiento, se estará a lo dispuesto en el artículo 243 y concordantes.
( Artículo 242 modificado por el Artículo 10 la Ley N° 14392 )
ARTÍCULO 243°.- Devolución.- Tan pronto como fuera posible, el Fiscal ordenará la devolución de los objetos secuestrados que no estén sometidos a decomiso, restitución o embargo, a la persona de cuyo poder se sacaron. Esta devolución podrá ordenarse provisionalmente en calidad de depósito, e imponerse al poseedor la obligación de exhibirlos. Los efectos sustraídos serán devueltos, en las mismas condiciones y según corresponda al damnificado o al poseedor de buena fe de cuyo poder hubieran sido secuestrados. Si se suscitare controversia sobre la restitución o la forma de ella, se dispondrá que los interesados ocurran a la jurisdicción civil.
ARTÍCULO 244°.- Normas supletorias. Serán de aplicación supletoria respecto a las medidas cautelares de coerción real, las normas legales y reglamentarias que establecen la actuación de la Agencia Provincial de Registro, Administración y Destino de Bienes y Derechos Patrimoniales en primer término, y las disposiciones del Código Procesal Civil y Comercial.
( Artículo 244 modificado por el Artículo 16 la Ley N° 13579 )
TÍTULO IV
Inadmisibilidad e invalidación por actividad procesal defectuosa
ARTÍCULO 245°.- Inadmisibilidad.- La inadmisibilidad de los actos de parte será declarada: 1) cuando estuviese prescripta por la ley; 2) cuando se intentase actuar sin tener facultad o ésta se hubiere extinguido o agotado por caducidad o preclusión. Si un acto de parte fuera erróneamente admitido, sus efectos serán invalidados, salvo que la deficiencia se corrigiera oportunamente o que el acto haya alcanzado su finalidad respecto de todos los interesados.
ARTÍCULO 246°.- Principio.- No podrán ser valorados para fundar una decisión judicial, ni utilizados como presupuestos de ella, los actos cumplidos con inobservancia de las formas y condiciones previstas en este Código, salvo que el defecto haya sido subsanado o no se hubiera protestado oportunamente por él. Las partes sólo podrán impugnar las decisiones judiciales que les causaran gravamen, con fundamento en el defecto, en los casos y formas previstos por este Código, siempre que el interesado no hubiera contribuido a provocarlo. Se procederá del mismo modo cuando el defecto consistiera en la omisión de un requisito que la ley prevé para la validez del acto.
ARTÍCULO 247°.- Protesta.- Cuando el defecto fuera subsanable, el interesado deberá formular la protesta, mientras se cumple el acto o inmediatamente después de cumplido cuando hubiese estado presente en él; y antes de dictarse la decisión a impugnar, cuando no hubiere estado presente. Si, por las circunstancias del caso, fue imposible advertir oportunamente el defecto, el interesado deberá formular la protesta inmediatamente después de conocerlo. La protesta implicará el reclamo de subsanación y deberá describir el defecto individualizando el acto viciado o el requisito omitido, proponiendo la solución que correspondiera. Se sustanciará según lo previsto para la reposición.
ARTÍCULO 248°.- Defectos absolutos.- Aunque pueda formularse, no será necesaria la protesta previa y podrán ser invalidados aun de oficio, en cualquier estado y grado de la causa, los defectos concernientes a la intervención, asistencia y representación del imputado en los casos y formas que la ley establece o los que implicaran inobservancia de derechos y garantías previstos por la Constitución Nacional, por los Tratados Internacionales con idéntica jerarquía y por la Constitución Provincial. En estos casos el imputado podrá impugnar, aunque tuviera responsabilidad en la provocación del defecto.
ARTÍCULO 249°.- Renovación o rectificación.- Los defectos deberán ser subsanados, siempre que fuera posible, renovando el acto, rectificando su error o cumpliendo el requisito omitido, de oficio o a instancia de parte.
ARTÍCULO 250°.- Efectos.- La invalidación de un acto se extiende a todos los consecutivos que dependan directamente de él. Sin embargo, no se podrá retrotraer el procedimiento a etapas anteriores, con grave perjuicio para el imputado, cuando la invalidación se funde en la violación de una garantía prevista en su favor. El Juez o Tribunal establecerá a cuales actos anteriores o contemporáneos que por conexidad alcanza la invalidación.
