<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Código Procesal Penal de Santa Fe — Antenucci Penal Ediciones</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#1B3A6B; --azul2:#2E5BA8; --azul-l:#EBF1FB;
  --gris:#F4F4F2; --gris2:#E8E8E4; --gris3:#9A9A96;
  --negro:#111110; --blanco:#FAFAF8; --borde:#D8D8D4;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  --sidebar:300px; --topbar:56px;
}
html,body{height:100%;background:var(--gris);font-family:var(--sans);color:var(--negro);font-size:14px}
.shell{display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:var(--topbar) 1fr;height:100vh}

/* TOPBAR */
.topbar{grid-column:1/-1;background:var(--azul);display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:2px solid var(--azul2)}
.menu-btn{display:none;background:none;border:none;color:#fff;font-size:20px;line-height:1;cursor:pointer;padding:4px 6px;flex-shrink:0}
.logo-cuervo{width:32px;height:32px;flex-shrink:0}
.topbar-brand{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.topbar-brand b{font-family:var(--mono);font-size:14px;font-weight:600;color:#fff;letter-spacing:.02em}
.topbar-brand span{font-size:11px;color:#8FB0DD;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-search{margin-left:auto;width:340px;position:relative}
.topbar-search input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(143,176,221,.35);border-radius:5px;color:#fff;padding:7px 12px 7px 32px;font-family:var(--sans);font-size:13px}
.topbar-search input::placeholder{color:#8FB0DD}
.topbar-search input:focus{outline:none;background:rgba(255,255,255,.14);border-color:#8FB0DD}
.topbar-search::before{content:"⌕";position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8FB0DD;font-size:15px}
.topbar-count{font-family:var(--mono);font-size:11px;color:#8FB0DD;white-space:nowrap}
.sidebar-overlay{display:none;position:fixed;inset:0;top:var(--topbar);background:rgba(0,0,0,.35);z-index:40}
.sidebar-overlay.visible{display:block}

/* SIDEBAR */
.sidebar{background:#fff;border-right:1px solid var(--borde);overflow-y:auto;padding:10px 0 40px}
.toc-libro{border-bottom:1px solid var(--gris2)}
.toc-libro>summary{list-style:none;cursor:pointer;padding:10px 16px;font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--azul);letter-spacing:.04em;display:flex;align-items:center;gap:6px}
.toc-libro>summary::-webkit-details-marker{display:none}
.toc-libro>summary::before{content:"▸";font-size:10px;color:var(--gris3);transition:transform .15s}
.toc-libro[open]>summary::before{transform:rotate(90deg)}
.toc-libro-title{color:var(--negro);font-weight:500;font-family:var(--sans);font-size:12px}
.toc-titulo{padding-left:14px}
.toc-titulo>summary{list-style:none;cursor:pointer;padding:6px 14px;font-size:11px;font-weight:600;color:#3D5A85;display:flex;gap:6px;align-items:baseline}
.toc-titulo>summary::-webkit-details-marker{display:none}
.toc-titulo-title{color:var(--negro);font-weight:400;font-size:11.5px}
.toc-cap{padding:3px 14px 3px 30px;font-size:11.5px;color:#555;cursor:pointer;border-radius:4px;margin:1px 8px}
.toc-cap:hover{background:var(--azul-l);color:var(--azul)}
.toc-cap.activo{background:var(--azul);color:#fff}

/* MAIN */
.main{overflow-y:auto;padding:28px 40px 80px}
.main-inner{max-width:820px;margin:0 auto}
.cover{text-align:center;padding:60px 20px;color:var(--gris3)}
.cover .cuervo-big{width:56px;height:56px;margin:0 auto 18px;opacity:.85}
.cover h2{font-family:var(--mono);color:var(--azul);font-size:20px;margin-bottom:8px}
.cover p{font-size:13px;max-width:420px;margin:0 auto;line-height:1.6}

.breadcrumb{font-family:var(--mono);font-size:10.5px;color:var(--gris3);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
.section-title{font-size:19px;font-weight:600;color:var(--azul);margin:26px 0 14px;padding-bottom:8px;border-bottom:2px solid var(--azul-l)}
.section-title:first-child{margin-top:0}

.articulo{background:#fff;border:1px solid var(--borde);border-radius:7px;padding:16px 20px;margin-bottom:10px;scroll-margin-top:16px}
.articulo.destacado{border-color:var(--azul2);box-shadow:0 0 0 2px var(--azul-l)}
.art-num{font-family:var(--mono);font-size:12px;font-weight:600;color:#fff;background:var(--azul);border-radius:4px;padding:2px 9px;display:inline-block;margin-bottom:8px}
.art-num.derogado{background:var(--gris3)}
.art-texto{font-size:13.5px;line-height:1.65;color:#232322;text-align:justify}
.art-texto mark{background:#FFE9A8;color:inherit;border-radius:2px;padding:0 2px}
.art-nota{margin-top:10px;font-size:11.5px;color:var(--azul2);font-style:italic;border-top:1px dashed var(--borde);padding-top:8px}
.art-derogado-txt{font-size:13px;color:var(--gris3);font-style:italic}

.empty{text-align:center;padding:60px 20px;color:var(--gris3);font-size:13px}

::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--gris2);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--gris3)}

@media(max-width:820px){
  .shell{grid-template-columns:1fr}
  .menu-btn{display:block}
  .topbar-brand span{display:none}
  .topbar-count{display:none}
  .sidebar{position:fixed;left:-320px;top:var(--topbar);bottom:0;width:82vw;max-width:300px;z-index:50;transition:left .2s;box-shadow:2px 0 12px rgba(0,0,0,.15)}
  .sidebar.abierto{left:0}
  .main{grid-column:1}
  .topbar-search{width:auto;flex:1}
}
</style>
</head>

const RAW_TEXT_PARTS = [];

LIBRO I
DISPOSICIONES GENERALES
TÍTULO I
Normas fundamentales
ARTÍCULO 1°.- Juicio previo.- Nadie podrá ser penado o ser sometido a una medida de seguridad sin juicio previo fundado en ley anterior al hecho del proceso y sustanciado conforme a las reglas de éste Código. En el procedimiento penal rigen todas las garantías y derechos consagrados en la Constitución de la Nación Argentina, en los tratados internacionales con idéntica jerarquía y en la Constitución de la Provincia. Dichas disposiciones son de aplicación directa y prevalecen sobre cualquier otra de inferior jerarquía normativa informando toda interpretación de las leyes y criterios para la validez de los actos del procedimiento penal.
ARTÍCULO 2°.- Inobservancia de regla de garantía.- La inobservancia de una regla de garantía establecida a favor del imputado no podrá ser hecha valer en su perjuicio, ni podrá ser utilizada para retrotraer contra su voluntad, el procedimiento a etapas anteriores.
ARTÍCULO 3°.- Principios y reglas procesales.- Durante el proceso se observarán los principios de oralidad, publicidad, contradicción, concentración, inmediatez, simplificación y celeridad.
ARTÍCULO 4°.- Jueces naturales y jurados.- Nadie podrá ser juzgado por otros jueces que los designados de acuerdo a la Constitución e instituidos con anterioridad al hecho objeto del proceso. En los casos en que sea procedente la conformación del jurado se regirá por las normas que establezca una ley especial.
ARTÍCULO 5°.- Estado de inocencia.- Nadie podrá ser considerado ni tratado como culpable mientras una sentencia firme no lo declare tal.
ARTÍCULO 6°.- Non bis in idem.- Nadie podrá ser perseguido penalmente más de una vez por el mismo hecho. No se podrán reabrir los procedimientos fenecidos, salvo la revisión de las sentencias a favor del condenado, según las reglas previstas por este Código.
ARTÍCULO 7°.- In dubio pro reo.- En caso de duda sobre los hechos deberá estarse a lo que sea más favorable al imputado, en cualquier grado e instancia del proceso.
ARTÍCULO 8°.- Inviolabilidad de la defensa.- La defensa en juicio deberá comprender para las partes, entre otros, los siguientes derechos: ser oídas, contar con asesoramiento y representación técnica, ofrecer prueba, controlar su producción, alegar sobre su mérito e impugnar resoluciones jurisdiccionales, en los casos y por los medios que este Código autoriza.
ARTÍCULO 9°.- Derechos de la víctima.- Para quien invocara verosímilmente su calidad de víctima o damnificado o acreditara interés legítimo en la Investigación Penal Preparatoria, se le reconocerá el derecho a ser informado de la participación que puede asumir en el procedimiento, del estado del mismo, de la situación del imputado y de formular las instancias de acuerdo a las disposiciones de este Código.
ARTÍCULO 10°.- Restricción a la libertad.- La libertad personal sólo podrá ser restringida en los límites absolutamente indispensables para evitar el entorpecimiento probatorio en la investigación o el juicio y asegurar la actuación de la pretensión punitiva.
ARTÍCULO 11°.- Interpretación restrictiva.- Será interpretada restrictivamente toda disposición legal que coarte la libertad personal, limite el ejercicio de un poder conferido a los sujetos del proceso o establezca invalidaciones procesales o exclusiones probatorias.
ARTÍCULO 12°.- Condiciones carcelarias.- La privación de la libertad, sólo puede cumplirse en establecimientos que satisfagan las condiciones previstas en la Constitución Nacional y Tratados Internacionales de Protección de Derechos Humanos. Ningún detenido podrá ser objeto de tratos crueles, inhumanos o degradantes a su dignidad.
ARTÍCULO 13°.- Reglas particulares de actuación.- Con autorización o a instancias del Tribunal, las partes podrán acordar el trámite que consideren más adecuado en cualquier etapa del procedimiento, privilegiando los objetivos de simplicidad y abreviación, salvaguardando la garantía del debido proceso y el juicio público oral.
ARTÍCULO 14°.- Garantías para el ejercicio de las acciones procesales.- Las normas referidas a la organización del sistema de enjuiciamiento penal deberán garantizar una equitativa y proporcional distribución de los cargos y recursos presupuestarios que se asignen a las funciones de acusar, defender y juzgar, a fin de no resentir el eficaz y oportuno ejercicio de ninguna de ellas. En la Investigación Penal Preparatoria la reglamentación establecerá mecanismos para la actuación inmediata del Tribunal.
ARTÍCULO 15°.- Arbitración de trámite.- En caso de silencio u obscuridad de este Código o de su reglamentación, se arbitrará la tramitación que deba observarse respetando las normas fundamentales o aplicando supletoriamente el Código Procesal Civil y Comercial de la Provincia de Santa Fe en cuanto fuera pertinente.
TÍTULO II
Acciones
Capítulo I
Acción Penal
ARTÍCULO 16°.- Acción promovible de oficio.- La preparación y el ejercicio de la acción penal pública estará a cargo del Ministerio Público Fiscal, quien podrá actuar de oficio siempre que no dependiera de instancia privada. Podrá sin embargo estar a cargo del querellante, en los términos de este Código. Las peticiones del querellante habilitarán a los Tribunales a abrir o continuar el juicio, a juzgar y a condenar con arreglo a las disposiciones de éste Código. La participación de la víctima como querellante no alterará las facultades concedidas por la ley al Ministerio Público, ni lo eximirá de sus responsabilidades. El Ministerio Público estará obligado a promover la acción penal pública de los hechos punibles que lleguen a su conocimiento, siempre que existan suficientes indicios fácticos de la existencia de los mismos. Cuando sea pertinente, se aplicarán los criterios de oportunidad legalmente establecidos.
ARTÍCULO 17°.- Acción dependiente de instancia privada.- Cuando la acción penal dependiera de instancia privada, no se podrá ejercitar si las personas autorizadas por la ley penal no formularan manifestación expresa ante autoridad competente, de su interés en la persecución.
ARTÍCULO 18°.- Acción de ejercicio privado.- La acción de ejercicio privado se ejercerá por medio de querella en la forma en que este Código establece.
Capítulo II
Reglas de disponibilidad
ARTÍCULO 19°.- Criterios de oportunidad. El Ministerio Público de la Acusación podrá no promover o prescindir total o parcialmente, de la acción penal, en los siguientes casos: 1) cuando el Código Penal o las leyes penales especiales lo establezcan o permitan al Tribunal prescindir de la pena; 2) cuando se trate de hechos que por su insignificancia no afecten gravemente el interés público, salvo que fuesen cometidos por un funcionario público en el ejercicio o en razón de su cargo o que se hubiesen utilizado armas de fuego para la comisión; 3) cuando las consecuencias del hecho sufridas por el imputado sean de tal gravedad que tornen innecesaria o desproporcionada la aplicación de una pena, salvo que mediaren razones de seguridad o interés público; 4) cuando la pena en expectativa carezca de importancia con relación a la pena ya impuesta por otros hechos; 5) cuando exista conciliación entre los interesados, y el imputado haya reparado los daños y perjuicios causados en los hechos delictivos con contenido patrimonial cometidos sin violencia física o intimidación sobre las personas, salvo que existan razones de seguridad, interés público o se encuentre comprometido el interés de un menor de edad; 6) cuando exista conciliación entre los interesados y el imputado, en los delitos culposos, lesiones leves, amenazas y/o violación de domicilio, salvo que existan razones de seguridad, interés público, se encuentre comprometido el interés de un menor de edad, se hubiesen utilizado armas de fuego para la comisión, o se tratare de un hecho delictivo vinculado con la violencia de género; 7) cuando el imputado se encuentre afectado por una enfermedad incurable en estado terminal, según dictamen pericial, o tenga más de setenta (70) años, y no exista mayor compromiso para el interés público; 8) si hubiere transcurrido un año del inicio de la investigación penal y se presuma que no haya de resultar pena privativa de la libertad; 9) si el caso objeto de investigación no se encontrare previsto como prioritario de acuerdo a los lineamientos generales político criminales establecidos previamente mediante Resolución fundada de la Fiscalía General. En los supuestos de los incisos 2, 3 y 6 es necesario que el imputado haya reparado los daños y perjuicios ocasionados, en la medida de lo posible, o firmado un acuerdo con la víctima en ese sentido, o afianzado suficientemente esa reparación. Cuando el hecho delictivo cuya persecución se prescindiera o limitara, tuviere una pena máxima de reclusión o prisión de seis (6) años o más, se requerirá el consentimiento del Fiscal Regional respectivo.
( Artículo 19 modificado por el Artículo 1 la Ley N° 14258 )
ARTÍCULO 20°.- Mediación.- A los efectos de lograr la conciliación señalada anteriormente, se establecerán procesos de mediación entre los interesados según la reglamentación respectiva, asegurando la dignidad de la víctima, del imputado y la igualdad de tratamiento de ambos.
ARTÍCULO 21°.- Trámite. Con fundamento, el Fiscal podrá archivar la Investigación. El imputado, sin recurso alguno, podrá plantear ante el Fiscal la aplicación de un criterio de oportunidad, fundando su pedido. La solicitud de aplicación de un criterio de oportunidad deberá ser comunicada por el Fiscal a la víctima, aunque no estuviere constituida como querellante, quien deberá ser oída, pudiendo formular oposición. En todos los casos en los que la víctima haya aceptado la aplicación del criterio de oportunidad, se entiende que renunció a su derecho a concurrir como querellante exclusivo.
( Artículo 21 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 22°.- Resolución. Conversión. En caso de controversia entre las partes u oposición de la víctima, a pedido del interesado, se llamará a audiencia donde considerará la legalidad de la posición sostenida por el Fiscal. Si la misma es aceptada, la acción pública se tramitará conforme a lo previsto para el procedimiento de querella, cualquiera fuera el delito de que se tratase. En tal caso, la querella deberá presentarse dentro del término de sesenta (60) días hábiles desde la notificación de la resolución. La víctima tendrá el derecho y el Estado el deber de asegurarle el asesoramiento jurídico necesario cuando no pudiese afrontar los gastos en forma particular. Vencido el término, la acción penal quedará extinguida para el autor o partícipe a cuyo favor se aceptó el criterio de oportunidad, salvo el supuesto del inciso 2) del artículo 19 en que los efectos se extenderán a todos los partícipes.
( Artículo 22 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 23°.- Oportunidad.- La solicitud Fiscal de aplicación de criterios de oportunidad se podrá presentar hasta el momento de la audiencia preliminar del juicio.
Capítulo III
Suspensión del procedimiento a prueba
ARTÍCULO 24°.- Suspensión del procedimiento a prueba.- Cuando se peticionara la suspensión del juicio a prueba, el Fiscal que contara con el acuerdo del imputado y su defensor, podrá solicitarla al Tribunal que corresponda, en aquellos casos en que sea procedente la aplicación de una condena de ejecución condicional. Cuando el delito prevea pena de inhabilitación, ella formará parte de las reglas de conducta que se establezcan. A tal efecto se llevará a cabo una audiencia a la que concurrirá el imputado, su defensor y las partes interesadas, y en la que, oídos los mismos, se decidirá sobre la razonabilidad de la oferta de reparación de daños que se hubiese efectuado y sobre la procedencia de la pretensión. En caso de hacerse lugar a la suspensión del juicio a prueba, se establecerá el tiempo de suspensión del juicio, las reglas de conducta que deberá cumplir el imputado, se detallarán los bienes, que de ser pertinente, se abandonarán en favor del estado y la forma reparatoria de los daños. La resolución se dictará por auto fundado y, si fuese admitiendo la petición, se notificará en forma personal al imputado y se comunicará al Registro Único de Antecedentes de la Provincia y al Registro Nacional de Reincidencias. En caso de incumplimiento o inobservancia de las condiciones o reglas de conducta, el Tribunal resolverá lo que corresponda después de oír al imputado y a las partes o interesados. La decisión podrá ser precedida de una investigación sumaria y es irrecurrible.
ARTÍCULO 25°.- Control.- El Juez de Ejecución Penal controlará la observancia de las instrucciones e imposiciones resolviendo previa audiencia de las partes y a tenor de la prueba producida al efecto.
Capítulo IV
Obstáculos legales
ARTÍCULO 26°.- Obstáculos legales.- Si el ejercicio de la acción penal dependiera de desafuero, juicio político o enjuiciamiento, se observarán las condiciones y los límites establecidos por la ley.
ARTÍCULO 27°.- Desafuero.- Cuando hubiera mérito para formular acusación respecto de un legislador o miembro de una convención constituyente, el Fiscal se abstendrá de hacerlo y así lo declarará por requerimiento fundado, solicitando a la Cámara o cuerpo respectivo el desafuero correspondiente. En la investigación preparatoria que brinde sustento probatorio a la decisión, no se aplicarán las disposiciones que impliquen una sujeción al proceso, o el ejercicio del poder coercitivo respecto del afectado, pero podrán recibírsele a éste las explicaciones y pruebas que quiera proporcionar. A tal efecto podrá llamárselo a prestar declaración, pero, si no concurre, no podrá forzárselo. Removido que fuera el obstáculo constitucional, se formalizará la audiencia imputativa, cesando las restricciones al procedimiento común. Cuando el afectado fuera detenido, en los casos autorizados por la Constitución y la ley, el fiscal pondrá inmediatamente el hecho en conocimiento de la Cámara o cuerpo al que pertenezca, a fin de que resuelva sobre el privilegio y la cautela. Se pondrá también en su conocimiento la causa que existiera pendiente contra quien, estando acusado, hubiera sido elegido legislador o convencional, suspendiéndose el procedimiento a su respecto hasta que se produzca el desafuero.
ARTÍCULO 28°.- Antejuicio.- Respecto de un funcionario sujeto a juicio político o comprendido en la ley de enjuiciamiento de magistrados por delito que constituya causal de destitución, se procederá conforme al artículo anterior en lo que fuera aplicable, librando el Fiscal las comunicaciones pertinentes al Tribunal de enjuiciamiento que corresponda. En caso que la ley autorizara la detención del afectado, se lo pondrá a disposición del Tribunal de enjuiciamiento.
ARTÍCULO 29°.- Imposibilidad de proceder.- Si el desafuero es negado o no se produce la destitución, el Fiscal declarará que no se puede proceder y dispondrá el archivo de las actuaciones.
Capítulo V
Cuestiones previas y prejudiciales
ARTÍCULO 30°.- Cuestiones previas penales.- Cuando la solución de un proceso penal dependiera de otro proceso penal y no correspondiera la acumulación de ambos, el ejercicio de la acción se suspenderá en el primero, cumplida la etapa de Investigación Penal Preparatoria, hasta que en el segundo se dicte sentencia firme.
ARTÍCULO 31°.- Cuestiones previas no penales.- Cuando la existencia del delito dependiera de cuestiones previas no penales, el ejercicio de la acción penal podrá suspenderse, hasta que el órgano correspondiente dicte resolución que haya quedado firme. La suspensión no impedirá que se realicen los actos de la Investigación Penal Preparatoria.
ARTÍCULO 32°.- Prejudicialidad.- Cuando la existencia del delito dependiera de cuestión prejudicial establecida por la ley, el ejercicio de la acción penal se suspenderá, hasta que en la jurisdicción respectiva recaiga sentencia firme con valor de cosa juzgada en sede penal. La suspensión no impedirá que se realicen los actos de la Investigación Penal Preparatoria.
ARTÍCULO 33°.- Apreciación.- Cuando se dedujera una cuestión previa o prejudicial, el Tribunal la sustanciará y al resolver podrá apreciar, no obstante lo dispuesto en los artículos anteriores, si la cuestión invocada es seria, fundada y verosímil. En caso de que apareciera opuesta con el exclusivo propósito de dilatar el proceso, autorizará la continuación del trámite.
Capítulo VI
Excepciones
ARTÍCULO 34°.- Procedencia.- La defensa del imputado podrá plantear las siguientes excepciones de previo y especial pronunciamiento: 1) falta de jurisdicción o incompetencia; 2) falta de acción, porque no se pudo promover, o no fue legalmente promovida, o no pudiera ser proseguida, o estuviera extinguida la acción; 3) cosa juzgada; 4) pendencia de causa penal; 5) archivo por investigación penal preparatoria antecedente; 6) falta de personalidad en el querellante, o de personería en su representante. Si concurrieran dos o más excepciones, deberán interponerse conjuntamente. La excepción de cosa juzgada podrá ser planteada en cualquier momento del juicio.
ARTÍCULO 35°.- Trámite.- Durante la Investigación Penal Preparatoria y en las demás etapas del procedimiento, previa sustanciación, las excepciones se deducirán por escrito, ante el Tribunal competente, ofreciendo toda la prueba que le sirviera de fundamento. El Tribunal convocará, a una audiencia oral y pública, donde luego de disponer la producción de las pruebas pertinentes, oirá a las partes y pronunciará su resolución, pudiendo diferir la redacción de los fundamentos para el día siguiente. La resolución será apelable.
TÍTULO III
La Justicia Penal
Capítulo I
Jurisdicción
ARTÍCULO 36°.- Carácter y extensión.- La jurisdicción se extenderá al conocimiento de los hechos cometidos en el territorio de la Provincia y afirmados como delictuosos por el actor penal, con excepción de aquellos de jurisdicción federal o militar.
ARTÍCULO 37°.- Jurisdicciones especiales. Prioridad de juzgamiento.- Cuando se imputara a una misma persona uno o más delitos cuyo conocimiento correspondiera al fuero federal o militar y otro u otros de jurisdicción local, será juzgado primero en aquellas jurisdicciones especiales. Del mismo modo se procederá en casos de delitos conexos. Sin perjuicio de ello el proceso de jurisdicción local podrá sustanciarse simultáneamente con el otro, siempre que no se obstaculice el ejercicio de las respectivas jurisdicciones o la defensa del imputado.
ARTÍCULO 38°.- Jurisdicciones comunes. Prioridad de juzgamiento.- Si a una persona se le imputara un delito de jurisdicción local y otro correspondiente a la jurisdicción nacional de la Capital Federal o de otra Provincia, primero será juzgada en esta Provincia si la persona se encontrara con prisión preventiva o el delito aquí imputado fuera de mayor gravedad. Del mismo modo se procederá en caso de delitos conexos. Cuando la situación cautelar del imputado en las distintas jurisdicciones sea similar y los delitos fueran de la misma gravedad tendrá prioridad en el juzgamiento el Tribunal que previno.
ARTÍCULO 39°.- Unificación de penas.- Cuando corresponda la unificación de pena, se procederá conforme a las disposiciones del Código Penal, por el Tribunal de juicio o el Juez de ejecución según corresponda.
Capítulo II
Competencia
Sección Primera
Competencia por grado, estado y materia
ARTÍCULO 40°.- Corte Suprema de Justicia.- Sin perjuicio de las funciones otorgadas por otras leyes, la Corte Suprema de Justicia conoce del recurso de revisión de sentencias condenatorias o que apliquen una medida de seguridad en los procesos penales, en los casos autorizados por este Código.
( Artículo 40 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 41°.- Cámaras de Apelación en lo Penal.- Cada cámara de apelación, conocerá: 1) de los recursos que se interpongan contra las sentencias y resoluciones de los tribunales de la investigación penal preparatoria, del juicio penal, de faltas y de ejecución penal; 2) de las quejas; 3) de los conflictos de competencia y separación; 4) en todo otro caso que disponga la ley.
ARTÍCULO 42°.- División del trabajo de los jueces penales en razón de la materia.- Los jueces penales entenderán en causas que involucren como imputados a personas mayores de dieciocho años de edad y distribuirán su labor conformando Tribunales de la Investigación Penal Preparatoria, de Juicio y de Ejecución Penal. Tal división de funciones será dispuesta por la reglamentación respectiva.
ARTÍCULO 43°.- Tribunales de Juicio. Los Tribunales de Juicio juzgarán todos los hechos afirmados como delitos dolosos o culposos por el actor penal. El Tribunal de Juicio se integrará pluripersonalmente, con tres (3) magistrados, cuando cualquiera de los acusadores hubiera solicitado la aplicación de una pena privativa de libertad superior a dieciocho (18) años y no procediera el juicio por jurados, o en casos de extrema complejidad. En los demás casos, se integrará de manera unipersonal.
( Artículo 43 modificado por el Artículo 1 la Ley N° 14392 )
ARTÍCULO 44°.- Jurados.- Cuando se autorice el Juicio por Jurados, una ley determinará la forma en que se integrarán en Colegio los Jurados, sus características, requisitos para la convocatoria y la fecha de entrada en vigencia de esta forma de juzgamiento.
ARTÍCULO 45°.- Tribunales de la Investigación Penal Preparatoria.- Los Jueces que integren los tribunales de la Investigación Penal Preparatoria efectuarán un control de legalidad procesal y resguardo de las garantías constitucionales de acuerdo a las facultades que este Código otorga, resolviendo las instancias que formulen las partes y los incidentes que se produzcan durante esa etapa.
ARTÍCULO 46°.- Tribunal de Ejecución.- El Juez de Ejecución Penal tendrá a su cargo el control del cumplimiento de las penas y medidas de seguridad y demás funciones que este Código les asigne, así como la resolución de las instancias o incidentes que se formulen.
ARTÍCULO 47°.- Determinación de la competencia por la edad - Para determinar la competencia por razón de la edad, se tendrá en cuenta la fecha de comisión del hecho.
( Artículo 48 derogado por el Artículo 38 la Ley N° 13018 )
ARTÍCULO 49°.- Oficina de Gestión Judicial.- Los Jueces y Tribunales serán asistidos por una oficina judicial. Sin perjuicio de las facultades e intervención de los Jueces previstas por este Código, corresponderá al director o jefe de la oficina judicial, dirigiendo al personal auxiliar, organizar las audiencias y debates que se fijen, citar y trasladar a las personas cuando fuera necesario, ordenar las comunicaciones e informes pertinentes, y colaborar en todos los trabajos materiales que el Juez o Tribunal le indiquen, dictando al efecto las disposiciones de mero trámite del caso; las partes podrán cuestionarlas ante el juez, quien decidirá sin sustanciación alguna. La oficina judicial deberá velar muy particularmente para evitar la frustración de audiencias que fueran fijadas; a tales efectos contará con personal y medios que permitan ejecutar las diligencias.
Sección Segunda
Competencia territorial
ARTÍCULO 50°.- Reglas generales.- Será competente el Tribunal del lugar donde se afirma, con suficiente fundamento, cometido o tentado el hecho con apariencia delictiva. En caso de delito continuado o permanente, el del lugar en que cesó la continuación o permanencia. En caso de duda el que hubiese prevenido.
ARTÍCULO 51°.- Competencia del Tribunal de la Investigación Penal Preparatoria.- Las medidas cautelares de pruebas a producir durante la investigación penal preparatoria, y que requieran intervención jurisdiccional, deberán solicitarse a los Tribunales con competencia territorial en el lugar donde deban practicarse.
ARTÍCULO 52°.- Declaración de incompetencia.- El Tribunal que hiciera lugar a una excepción de incompetencia territorial, deberá remitir la causa al competente, poniendo a su disposición los imputados que estuvieran bajo prisión preventiva, sin perjuicio de despachar las medidas urgentes de investigación que le hubieran solicitado.
ARTÍCULO 53°.- Efectos de la declaración de incompetencia.- La declaración de incompetencia territorial no producirá la invalidación de los actos de investigación cumplidos antes de pronunciarse aquélla.
ARTÍCULO 54°.- División del trabajo en función de la competencia territorial.- Los jueces penales ejercerán su función en los límites territoriales que establezca la reglamentación respectiva.
Sección Tercera
Competencia por conexidad y acumulación
ARTÍCULO 55°.- Unificación del Tribunal de Juicio.- En caso de pluralidad de causas por hechos de competencia provincial que den lugar a acción de igual naturaleza, podrán tramitarse ante un mismo Tribunal de Juicio, a instancias del Ministerio Público Fiscal y del imputado: 1) cuando a una persona se le imputara más de un delito; 2) cuando los delitos imputados se afirmaran cometidos simultáneamente por varias personas reunidas o en distintos lugares y tiempo mediando acuerdo entre ellas; 3) cuando un delito se afirmara cometido para perpetrar otro, facilitar su comisión o procurar para sí o para otra persona su provecho o impunidad.
ARTÍCULO 56°.- Tribunal competente.- En los casos del artículo anterior, entenderá aquel Tribunal de Juicio competente según la regla general del artículo 50, donde el Ministerio Público Fiscal decidiera acumular sus pretensiones penales.
ARTÍCULO 57.- Acumulación de pretensiones.- El Ministerio Público Fiscal procederá a acumular sus pretensiones penales ante un mismo Tribunal de Juicio siempre que así se atienda a una mejor y más pronta administración de justicia y no se afecte la inviolabilidad de la defensa en juicio.
Capítulo III
Relaciones Jurisdiccionales
Sección Primera
Cuestiones de Jurisdicción y Competencia
ARTÍCULO 58°.- Tribunal competente.- Si dos Tribunales se declarasen simultánea y contradictoriamente competentes o incompetentes, el conflicto será resuelto por la Corte Suprema de Justicia cuando no tengan un superior común, y por este último en los demás supuestos.
ARTÍCULO 59°.- Promoción.- Sin perjuicio de la facultad del Tribunal de examinar de oficio su propia competencia, las partes podrán promover la cuestión por inhibitoria ante el Tribunal que consideren competente o por declinatoria ante el que estimen incompetente. El que optara por uno de estos medios no podrá abandonarlo y recurrir al otro, ni emplearlos simultánea o sucesivamente. El planteamiento será inadmisible si no expresa que no se ha utilizado el otro medio, y si resultara lo contrario, será condenado en costas, aunque aquélla se resuelva a su favor o sea abandonada .
ARTÍCULO 60°.- Oportunidad.- Las cuestiones de competencia podrán ser promovidas en cualquier estado de la Investigación Penal Preparatoria.
ARTÍCULO 61°.- Declinatoria.- La declinatoria se sustanciará como excepción de previo y especial pronunciamiento.
ARTÍCULO 62°.- Inhibitoria.- Cuando se promueva la inhibitoria se observarán las siguientes reglas: 1) el Tribunal ante quien se proponga resolverá dentro del tercer día, previa vista al Fiscal por igual término; 2) cuando se deniegue el requerimiento de inhibición, la resolución será apelable; 3) cuando se resuelva librar oficio inhibitorio, con él se acompañarán las piezas necesarias para fundar la competencia; 4) el Tribunal requerido, cuando reciba el oficio inhibitorio, resolverá previa vista por tres días a las partes. Cuando haga lugar a la inhibitoria, su resolución será apelable. Si la resolución declara su incompetencia, los autos serán remitidos oportunamente al Tribunal que la propuso, poniendo a su disposición al imputado y a los elementos de convicción que hubiere; 5) si se negara la inhibición, el auto será comunicado al Tribunal que la hubiera propuesto, en la forma prevista en el inciso 4, y se le pedirá que conteste si reconoce la competencia o, en caso contrario, que remita los antecedentes al Tribunal competente para dirimir el conflicto; 6) recibido el oficio expresado en el inciso anterior, el Tribunal que propuso la inhibitoria resolverá en el término de tres días y sin más trámite, si sostiene o no su competencia. En el primer caso, remitirá los antecedentes al Tribunal competente para resolver el conflicto y se lo comunicará al Tribunal requerido para que haga lo mismo con las actuaciones; en el segundo, se lo comunicará al competente remitiéndole todo lo actuado; 7) el conflicto será resuelto dentro de tres días, previa vista por igual término al Ministerio Público Fiscal, remitiéndose de inmediato la causa al Tribunal competente.
ARTÍCULO 63°.- Efectos.- Las cuestiones de competencia no suspenderán la Investigación Fiscal Preparatoria, que será continuada: 1) ante el Tribunal que primero conoció en la causa; 2) si dos Tribunales hubieran tomado conocimiento de la causa en la misma fecha, por ante el requerido de inhibición. Las cuestiones propuestas antes de la fijación de la audiencia para el debate suspenderán el proceso hasta la decisión del incidente, sin perjuicio de que el Tribunal haga lugar al anticipo de prueba previsto por este Código.
ARTÍCULO 64°.- Validez de los actos.- Al resolver el conflicto, el Tribunal determinará, si correspondiera, qué actos del declarado incompetente no conservan validez.
ARTÍCULO 65°.- Cuestiones de jurisdicción.- Las cuestiones de jurisdicción con jueces nacionales, militares o de otras provincias se resolverán conforme a lo dispuesto anteriormente para las de competencia, con arreglo a la ley nacional o tratados interprovinciales que existieran.
Sección Segunda
Extradición
ARTÍCULO 66°.- Requerimiento a tribunales del país.- Cuando un Tribunal pidiera a otro del país la extradición de un imputado o condenado por un delito, se procederá conforme a la ley respectiva.
ARTÍCULO 67°.- Requerimiento a tribunales extranjeros.- Si el imputado o condenado se encontrara en territorio extranjero, la extradición se tramitará por vía diplomática con arreglo a los tratados, las leyes nacionales, al principio de reciprocidad o las costumbres internacionales, y las disposiciones de este Código.
Capítulo IV
Inhibición y recusación
ARTÍCULO 68°.- Oportunidad y motivos de la inhibición y la recusación. Los Jueces deberán inhibirse de participar en audiencia en cuanto advirtieran la existencia de cualquier circunstancia que pudiera considerarse que afecta su imparcialidad. Podrán ser recusados por las partes cuando se generen dudas razonables acerca de su imparcialidad frente al caso. El juez que haya resuelto la prisión preventiva o participado en la audiencia preliminar no podrá integrar el tribunal de juicio ni intervenir en segunda instancia o instancias extraordinarias. El juez que haya pronunciado o concurrido a pronunciar sentencias no podrá intervenir en segunda instancia o instancias extraordinarias.
( Artículo 68 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 69°.- Interesados.- A los fines del artículo anterior, se considerarán interesados el representante del Ministerio Público Fiscal, el imputado, el querellante, el ofendido, el damnificado y el responsable civil.
ARTÍCULO 70°.- Trámite de la inhibición.- Cuando el Juez que se inhiba fuera del Tribunal de la Investigación Penal Preparatoria, remitirá la causa, por decreto fundado, al que deba reemplazarlo; éste proseguirá su curso de inmediato, sin perjuicio de remitir los antecedentes pertinentes a la Cámara de Apelación si estimara que la inhibición no tiene fundamento. La Cámara, en su caso, averiguará verbalmente el hecho y resolverá la incidencia sin otro trámite. Cuando el Juez que se inhiba forme parte de un Tribunal colegiado, pedirá se disponga su apartamiento y se dispondrá la integración del Tribunal, el que resolverá del mismo modo que en el supuesto anterior.
ARTÍCULO 72°.- Oportunidad, forma y prueba de la recusación.- La recusación deberá oponerse, bajo condición de admisibilidad, por escrito, con indicación precisa de los motivos, y en su caso de las pruebas ofrecidas, dentro del plazo de tres días de la primera intervención en el procedimiento, salvo que en este Código se establezca un plazo distinto. En caso de reemplazo del Juez o nueva integración del Tribunal, la recusación deberá ser propuesta dentro del mismo plazo a contar desde que se haya producido el reemplazo o notificada la nueva integración. Sin embargo, la recusación que se fundamentara en una causal producida o conocida después, podrá deducirse dentro de los tres días a contar desde su producción o conocimiento.
ARTÍCULO 73°.- Trámite de la recusación.- Si el Juez admitiera la recusación se observará lo dispuesto en el artículo 70. Si no la admitiera formará incidente con el escrito de recusación y la providencia de rechazo, que remitirá a la Cámara de Apelación. Previa audiencia en la que se recibirá la prueba e informarán las partes, la Cámara resolverá el incidente dentro de las cuarenta y ocho horas.
ARTÍCULO 74°.- Recusación de Juez de Tribunal colegiado.- Para resolver la recusación admitida por un Juez que forma parte de un Tribunal colegiado, se observará lo dispuesto en la segunda parte del artículo 70. Si no la admitiera, integrado que fuera el Tribunal, y previa audiencia en la que se recibirá la prueba e informarán las partes, en su caso, se resolverá la recusación dentro de las cuarenta y ocho horas, sin recurso alguno.
ARTÍCULO 75°.- Recusación no admitida durante la Investigación Penal Preparatoria.- Si la recusación se intentara durante la Investigación Penal Preparatoria y el Juez no la admitiera, continuará su intervención, pero si se hiciera lugar a la recusación los actos por él ordenados durante el trámite del incidente, serán invalidados si el recusante lo pidiese dentro del plazo de veinticuatro horas a contar desde que las actuaciones llegaran al Tribunal que deba actuar.
ARTÍCULO 76°.- Límites a la recusación e integración del Tribunal.- No podrán inhibirse ni ser recusados los jueces que integren el Tribunal para resolver la recusación. Resuelta la separación de un miembro, el Tribunal seguirá interviniendo en el proceso, sin perjuicio de la procedencia de causales de inhibición y recusación que correspondieran.
ARTÍCULO 77°.- Efectos.- Producida la separación, aunque posteriormente desaparezcan los motivos que la determinaron, la intervención de los nuevos Magistrados será definitiva.
ARTÍCULO 79°.- Costas y sanción.- Cuando la recusación fuera desestimada, además de la condena al pago de las costas del incidente, al recusante podrá aplicársele sanción de hasta quince días multa si aquélla fuera calificada de maliciosa, de la cual responderán solidariamente la parte y su letrado.

TÍTULO IV
Sujetos del procedimiento
Capítulo I
La víctima
ARTÍCULO 80°.- Derechos de la víctima. Las autoridades intervinientes en un procedimiento penal garantizarán a quienes aparezcan como víctimas u ofendidos penalmente por el delito los siguientes derechos: 1) a que se le reciba de inmediato y sin objeciones la denuncia del delito que la afecta y a ser informada sobre sus derechos cuando realice la denuncia o en su primera intervención en el procedimiento; 2) a recibir un trato digno y respetuoso; 3) a las explicaciones y a la documentación clara, precisa y exhaustiva de las lesiones o daños que se afirman sufridos por causa del hecho motivante de la investigación; 4) a minimizar las molestias que deban ocasionarse con motivo de los procedimientos y procesos. Los operadores del sistema penal deberán adoptar las medidas necesarias para prevenir un injustificado aumento de éstas, concentrando las intervenciones de la víctima en la menor cantidad de actos posibles, evitando convocatorias recurrentes y contactos innecesarios con el imputado. A tal fin, se adoptarán las siguientes medidas: a. la víctima podrá prestar declaración en su domicilio, por medios virtuales que permitan su transmisión o en una dependencia especialmente adaptada a tal fin. Asimismo, podrá acercar su declaración por escrito; b. en los actos en que la víctima participe, podrá disponerse el acompañamiento de un profesional o persona de su confianza; 5) la víctima podrá prestar testimonio o declaración en las audiencias de juicio, sin la presencia del imputado o del público, siempre bajo los debidos cuidados y garantizando el derecho de defensa del imputado; 6) a la salvaguarda de su intimidad en la medida compatible con el procedimiento regulado por este Código; 7) a la protección de su identidad e imagen y a la reserva de sus datos de identidad que el fiscal podrá disponer que sean protegidos para su conocimiento de otras personas, su seguridad y la de sus familiares y la de los testigos que depongan a su favor, preservándolos de la intimidación y represalia. Los jueces, fiscales, demás funcionarios y empleados judiciales y auxiliares de justicia que Intervengan en la investigación penal o en el proceso, deberán observar la debida diligencia en la protección de los datos personales tales como domicilio actual, teléfonos, correo electrónico y cualquier otro dato de las víctimas, sus familiares y testigos, en las mismas condiciones previstas en el artículo 258. En especial, podrá reservarse la información sobre su domicilio o que pudiere revelar su ubicación. La reserva cesará cuando el derecho de defensa del imputado lo hiciere imprescindible, previa resolución judicial. Deberán adoptarse las medidas necesarias para neutralizar el peligro. Sin que la enumeración sea taxativa, se presumirá la existencia de peligro: a. si se tratare de víctimas de delitos llevados adelante con violencia, con uso de armas, contra la vida o contra la integridad sexual, de trata de personas o delitos de lesa humanidad; b. si se tratare de delitos cometidos por una asociación ilícita u organización criminal; c. si se tratare de delitos cometidos contra una mujer mediando violencia de género o contra toda otra persona en virtud de su género, preferencia u orientación sexual; d. en función de la gravedad del hecho que motivó la condena, conforme las circunstancias del caso. 8) a requerir el inmediato reintegro de los efectos sustraídos y el cese del estado antijurídico producido por el hecho investigado en las cosas o efectos de su pertenencia, cuando ello corresponda según las disposiciones de este Código; 9) a plantear su disconformidad ante una desestimación de la denuncia o la continuidad de la acción penal ante el archivo. Asimismo, a reclamar por demora o ineficiencia en la investigación, ante el Fiscal Regional y, ante la negativa de éste, ante el Fiscal General, sin perjuicio de formular cuando correspondiere queja ante la Auditoría General del Ministerio Público de la Acusación. Cuando la investigación refiera a delitos que afectasen intereses colectivos o difusos, las personas jurídicas cuyo objeto fuera la protección del bien tutelado en la figura penal, tendrán la legitimación a la que hace referencia el presente inciso; 10) a presentar querella y a ejercer contra el imputado acciones tendientes a obtener la reparación por la responsabilidad civil proveniente del hecho punible, en los términos de este Código; 11) a ser oída por un Juez en audiencia pública en forma previa al dictado de las resoluciones que versen sobre: a. la aplicación de un criterio de oportunidad; b. la revisión de medidas cautelares personales; c. la suspensión del juicio a prueba; d. los supuestos de procedimiento abreviado; e. el sobreseimiento y el archivo jurisdiccional, o cualquier decisión que implique la extinción o suspensión de la acción penal. Igual derecho le asiste en la audiencia preliminar y en las audiencias de segunda instancia, y en el proceso de flagrancia. Previo al tratamiento o resolución de las medidas o actos mencionados se debe notificar fehacientemente a la víctima su derecho a ser oída en audiencia especial, teniendo en cuenta las facilidades establecidas en los incisos 4) y 5) y lo normado en el artículo 274. La escucha de la víctima, excepto que la misma no haga uso de su derecho a ser oída o fuera imposible su localización, hacen a la validez de los actos en los que tenga derecho a participar. La falta de convocatoria a la víctima significará una falta del funcionario a cargo. Durante la etapa de ejecución de la pena, tendrá derecho a ser oída por un Juez en audiencia pública en forma previa al dictado de las resoluciones, en los casos de conmutaciones de penas, libertades condicionales, salidas transitorias, cumplimiento en estado de semilibertad o semidetención, prisión domiciliaria, discontinua, asistida, régimen preparatorio de su liberación, aplicación de leyes penales más benignas y modificaciones de las medidas de seguridad impuestas. Las resoluciones adoptadas deberán serle comunicadas por la Oficina de Gestión Judicial. El Fiscal le hará saber a la víctima sobre su derecho a ser oída, debiendo manifestarse ésta respecto a ser notificada antes de cada acto a los que refiere el presente inciso; 12) a obtener información sobre la marcha del procedimiento y el resultado de la investigación, debiendo la Oficina de Gestión Judicial notificarle al domicilio que habrán de fijar, la fecha, hora y lugar de las audiencias preliminar y de juicio, así como la sentencia final cuando no concurriera a la audiencia del debate; 13) a que se adopten prontamente las medidas de coerción o cautelares que fueren procedentes para impedir que el delito continúe en ejecución o alcance consecuencias ulteriores, amenazas a la integridad y seguridad de la víctima; 14) a que en las causas en que se investiguen delitos que requieran la realización de pericias sean realizadas con la mayor celeridad posible, con especial cuidado de respetar el derecho establecido en el inciso 4) de este artículo; 15) a aportar información y evidencias durante la investigación, independientemente de su constitución como querellante. Esta enumeración no es taxativa y no será entendida como negación de otros derechos no enumerados.
( Artículo 80 modificado por el Artículo 7 la Ley N° 14181 )
ARTÍCULO 81°.- Asistencia genérica. Adecuada explicación. Desde los primeros momentos de su intervención, quien invoque verosímilmente la calidad de víctima tendrá derecho a ser informada sobre sus derechos. Además, la Autoridad Policial y el Ministerio Público de la Acusación, suministrarán la información que posibilite su derecho a ser asistida y patrocinada como tal por el Centro de Asistencia Judicial u organismos pertinentes creados o a crearse. Los funcionarios y magistrados, así como los miembros de la fuerza de seguridad, deberán dirigirse a la víctima o brindar la información en términos de claridad y comprensión en función de la condición de la misma. Las explicaciones sobre instancias, trámites o decisiones deberán ser informadas de manera asequible a los fines de garantizar la comprensión de la víctima.
( Artículo 81 modificado por el Artículo 7 la Ley N° 14181 )
ARTÍCULO 82°.- Asistencia técnica. Para el ejercicio de los derechos que se le acuerdan a quien invoque su condición de víctima, no será obligatorio el patrocinio letrado, salvo lo dispuesto en el artículo 94. Si se hallare en una condición de vulnerabilidad o no contara con medios suficientes para contratar un abogado, el Centro de Atención Judicial u organismo pertinente, se lo proveerá gratuitamente. Por decisión debidamente motivada ante el Juez interviniente, el abogado del Centro de Asistencia judicial u organismo pertinente que tuviere participación podrá no formular instancia de querella.
( Artículo 82 modificado por el Artículo 7 la Ley N° 14181 )
ARTÍCULO 83°.- Consideración especial. Comunicación de acuerdos patrimoniales.- Todo lo atinente a la situación de la víctima o damnificado, y en especial la reparación voluntaria del daño, el arrepentimiento activo de quien aparezca como autor o partícipe, la solución o morigeración del conflicto originario o la conciliación entre sus protagonistas, será tenido en cuenta en oportunidad de: 1) ejercer la acción el actor penal; 2) seleccionar la coerción personal indispensable; 3) individualizar la pena en la sentencia; 4) modificar en su medida o en su forma de cumplimiento la pena en la etapa de ejecución. Todos los acuerdos dirigidos al más rápido resarcimiento del perjuicio invocado por la víctima o damnificado, podrán ser puestos en conocimiento del Fiscal y de los Tribunales intervinientes a los fines que correspondan.
Capítulo III
El querellante
ARTÍCULO 93°.- Querellante. Sin perjuicio de lo establecido por este Código para el juicio por delito de acción privada, las personas físicas o de existencia ideal que pretendieran ser ofendidas penalmente por un delito de acción pública, o las víctimas indirectas del hecho delictivo, podrán intervenir en el proceso como parte querellante y ejercer todos los derechos que este Código establece.
( Artículo 93 modificado por el Artículo 7 la Ley N° 14181 )
ARTÍCULO 94°.- Requisitos de la instancia.- La instancia deberá formularse personalmente o por representante con poder especial, y en su caso con patrocinio letrado. El escrito, deberá contener: 1) nombre, apellido, domicilio real y legal del particular; 2) una relación sucinta del hecho en que afirma se funda su pretensión y el carácter que invoca; 3) nombre y apellido del o de los imputados si los conociera; 4) la petición de ser tenido como parte querellante y la firma.
ARTÍCULO 95°.- Oportunidad.- La instancia de constitución como parte querellante podrá tener lugar hasta la audiencia preliminar. Pasado ese momento, la instancia se rechazará, sin recurso. En ningún caso paralizará la tramitación de la causa.
ARTÍCULO 96°.- Trámite. La instancia será presentada, con copia para cada querellado, ante el Fiscal interviniente, quien deberá comunicar al Tribunal si acepta o rechaza el pedido en un plazo no mayor de tres días. Si no hay contradicción de las partes a la constitución del querellante, resolverá el Tribunal dándole su participación directamente y dando conocimiento a la Oficina de Gestión Judicial. En caso de rechazo de las partes, de los querellados o controversia entre los pretensos querellantes, el Fiscal lo remitirá sin demora al Tribunal de la investigación penal preparatoria. El Tribunal convocará a las partes a una audiencia dentro del plazo de cinco días y decidirá de inmediato, priorizando otorgar participación a la víctima. Una vez admitida la constitución del querellante, éste se incorporará en el proceso en la etapa en que se desarrolle. La resolución es apelable.
( Artículo 96 modificado por el Artículo 7 la Ley N° 14181 )
ARTÍCULO 97°.- Facultades y deberes. Sin perjuicio de los derechos reconocidos a toda víctima, quien haya sido admitido como querellante, durante el transcurso de la Investigación Penal Preparatoria y de todo el proceso, tendrá los siguientes derechos y facultades: 1) proporcionar durante la Investigación Penal Preparatoria elementos de prueba y solicitar diligencias particulares para el esclarecimiento del hecho objeto de la misma, la responsabilidad penal del imputado y la cuantificación del daño causado. Estas instancias serán presentadas al Fiscal interviniente, y su rechazo otorgará la facultad de proceder conforme lo establecido por el artículo 286, con el propósito de obtener un pronunciamiento definitivo, acerca de la procedencia de la solicitud o propuesta; 2) pedir medidas cautelares para asegurar el pago de la indemnización civil y costas o las medidas cautelares personales establecidas en los artículos 219 y 220; 3) asistir a las declaraciones de testigos durante la investigación penal preparatoria, con facultad para formular preguntas y pedir aclaraciones, pero no deberá necesariamente ser citado con anticipación, salvo que lo requiriera por escrito; 4) intervenir en el juicio dentro de los límites establecidos por este Código; 5) interponer las medidas que estime adecuadas para activar el procedimiento; 6) requerir pronto despacho; 7) formular acusación; 8) recurrir en los casos, por los medios y en la forma prevista para los representantes del Ministerio Público de la Acusación. La intervención como querellante no lo exime del deber de declarar como testigo. En ningún caso su actividad estará subordinada a directivas o conclusiones del Fiscal.
( Artículo 97 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 98°.- Desistimiento.- El querellante podrá desistir de su participación en cualquier momento, presentando renuncia expresa, aunque quedará obligado a las costas que su intervención hubiera causado. Se considerará que ha desistido tácitamente de su intervención cuando, sin justa causa: 1) no concurra a prestar declaración testimonial o a la realización de cualquier medio de prueba para cuya práctica sea necesaria su presencia; 2) no asista a la convocatoria formulada por el fiscal según lo dispuesto en el art. 287 de este Código; 3) no asista a la audiencia preliminar, o no acuse válidamente; 4) no concurra a la audiencia de debate, se ausente de ella sin autorización del Tribunal o no formule conclusiones. En lo casos de incomparecencia señalados precedentemente, la existencia de justa causa deberá acreditarse antes del inicio de la audiencia o diligencia, o en su defecto, dentro de las cuarenta y ocho horas siguientes. El desistimiento será declarado por el Tribunal de oficio o a pedido de parte, e impedirá toda posterior persecución por parte del querellante, en virtud del mismo hecho que constituye el objeto de su querella y con relación a los imputados que participaron en el procedimiento.
ARTÍCULO 99°.- Eventual reparación del perjuicio.- Mediando sentencia penal condenatoria, quien hubiera actuado como querellante podrá reclamar la indemnización del daño causado o la restitución de la cosa obtenida por el delito, en la forma y condiciones establecidas en este Código.
Capítulo IV
El Imputado
Sección Primera
Generalidades
ARTÍCULO 100°.- Calidad de imputado.- Los derechos que este Código acuerda al imputado, podrá hacerlos valer la persona que fuera detenida o indicada como autor o partícipe de un hecho delictuoso, en cualquier acto inicial del procedimiento dirigido en su contra y en función de la etapa en que se encuentre, hasta la terminación del proceso. Si estuviera privado de su libertad podrá formular sus instancias ante el funcionario encargado de la custodia, quien la comunicará inmediatamente al Tribunal interviniente.
ARTÍCULO 101°.- Derechos del imputado.- Los derechos que este Código le acuerda, serán comunicados al imputado apenas nace su condición de tal. En la oportunidad que este Código establece, el imputado deberá conocer: 1) la existencia de una causa seguida en su contra con los datos necesarios para individualizarla; 2) el o los hechos que se le atribuyen y la calificación legal que provisionalmente corresponda; 3) los derechos referidos a su defensa técnica; 4) que podrá solicitar audiencia a fin de prestar declaración cuando lo estime conveniente, presumiéndose mientras tanto que ejerce el derecho de abstenerse a declarar sin que ello signifique ninguna presunción en su contra.
ARTÍCULO 102°.- Identificación. La identificación del imputado se practicará por sus datos personales, huella genética digitalizada, impresiones digitales y señas particulares, los que deberá brindar. Si se negara a suministrar esos datos o los diera falsamente, se procederá a la identificación por testigos en la forma prescripta para los reconocimientos o por otros medios que se estimaran convenientes. La individualización por huella genética digitalizada, dactiloscópica, fotográfica o por cualquier otro medio que no afectara la dignidad ni la salud del identificado se practicará, aun contra su voluntad, mediante la oficina técnica respectiva.
( Artículo 102 modificado por el Artículo 18 la Ley N° 14374 )
ARTÍCULO 103°.- Identidad física.- Cuando fuera cierta la identidad física de la persona imputada, las dudas sobre los datos suministrados u obtenidos, no alterarán el curso del procedimiento, sin perjuicio de que se rectifiquen en cualquier estado del mismo o durante la ejecución de la sentencia.
ARTÍCULO 104°.- Domicilio. El imputado deberá denunciar su domicilio real, y fijar la forma de notificación, la que podrá ser a su opción en el domicilio legal constituido dentro del radio del tribunal, o por vía electrónica conforme lo determine la reglamentación. Todo cambio en su domicilio real deberá ser comunicado al Ministerio Público de la Acusación y al Tribunal. La falsedad o falta de actualización del domicilio real serán consideradas como indicio de fuga.
( Artículo 104 modificado por el Artículo 2 la Ley N° 14258 )
ARTÍCULO 105°.- Certificación de antecedentes. Previo a la audiencia del debate, se incorporarán los informes del Registro Nacional de Reincidencia, Registro Único de Antecedentes Penales de la Provincia de Santa Fe y otros referidos a antecedentes penales que aportaren las partes.
( Artículo 105 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 106°.- Incapacidad.- La afección mental del imputado, que excluya su capacidad de entender los actos del procedimiento, o de obrar conforme a ese conocimiento y voluntad, provocará la suspensión de su persecución penal hasta que desaparezca esa incapacidad. Sin perjuicio de la aplicación de las reglas que rigen el juicio para la imposición exclusiva de una medida de seguridad, la comprobación de esta incapacidad impedirá el procedimiento intermedio, el juicio y toda labor crítica del comportamiento que se le atribuye que no autorice expresamente la ley, pero no inhibirá la averiguación del hecho, su antijuridicidad y autoría, o que se continúe el procedimiento con respecto a otros coimputados. La incapacidad será declarada por el Tribunal competente, a pedido de parte y previo dictamen pericial. Sospechada la incapacidad, el Ministerio Público Fiscal o el Tribunal competente ordenará la peritación correspondiente. Sin perjuicio de su propia intervención, las facultades del imputado podrán ser ejercidas por su curador o el designado de oficio si no lo tuviere. Si carece de defensor o hubiere sido autorizado a defenderse por sí mismo, se designará inmediatamente un defensor de oficio. Los actos que el incapaz hubiera realizado como tal, carecerán de valor.
ARTÍCULO 107°.- Cuando para la preparación del informe sobre el estado psíquico del imputado fuera necesario restringir la libertad ambulatoria del mismo, el juez de la Investigación Penal Preparatoria o por el Tribunal competente dispondrá su ingreso al Servicio Penitenciario. Esta medida será ordenada por resolución fundada, sólo cuando existiera la probabilidad de que el imputado haya cometido el hecho y no fuera desproporcionada respecto de la importancia del procedimiento y de la pena o medida de seguridad que razonablemente pudiera corresponder. La medida sólo durará un plazo razonable para obtener la información técnica que la motiva, debiéndose velar por la celeridad en el cumplimiento de esta tarea.
( Artículo 107 modificado por el Artículo 2 la Ley N° 14392 )
ARTÍCULO 108°.- Examen médico inmediato.- Si el imputado fuera aprehendido con breve intervalo de cometido el hecho, se procederá a su inmediato examen psicológico, médico o bioquímico para apreciar su estado psíquico o si sufre intoxicación por ingestión alcohólica o uso de sustancias toxicomanígenas o alucinógenas, salvo que no se justifique dicho examen. Regirán al respecto los límites establecidos por el artículo 163.
ARTÍCULO 109°.- Examen psicológico y/o psiquiátrico.- Si al imputado se le atribuyera la comisión de delito o concurso de delitos, que estuviera reprimido con pena superior a los ocho años de prisión o reclusión, el Fiscal de Distrito requerirá siempre el examen psicológico y/o psiquiátrico del mismo que deberán practicar psicólogos y/o médicos oficiales.
Sección Segunda
Declaración del imputado
ARTÍCULO 110°.- Validez.- Para no ser invalidada la declaración del imputado deberá contar siempre con la presencia de su defensor y, antes de comenzar, se le hará saber que cuenta con el derecho de abstenerse de declarar sin que ello signifique ninguna presunción en su contra.
ARTÍCULO 111°.- Formas del interrogatorio.- Las preguntas que se formularán al imputado, serán claras y precisas. No están permitidas las preguntas capciosas o sugestivas. Al inicio del acto y manifestada su voluntad de declarar, se lo invitará a que exprese cuanto tenga por conveniente en descargo o aclaración de los hechos que se le atribuyen. Posteriormente se formularán todas las preguntas que se consideraran pertinentes.
ARTÍCULO 112°.- Declaración ante el Tribunal de la Investigación. Durante la Investigación Penal Preparatoria, el imputado podrá declarar y ser interrogado primero por la parte que lo ofreció, y luego por las demás. Esta declaración podrá ser utilizada como prueba en juicio siempre que se hubiera procedido a tenor del artículo 298, y en caso contrario podrá ser utilizada como declaración previa en los términos del artículo 326. Cuando el imputado hubiera sido condenado por sentencia firme, su declaración en proceso seguido contra los copartícipes del hecho se regirá a todo efecto por las reglas de la prueba testimonial, no pudiendo ampararse en prerrogativa alguna que hubiera surgido de su fenecida condición de imputado.
( Artículo 112 modificado por el Artículo 3 la Ley N° 14258 )
ARTÍCULO 113°.- Declaración en el debate.- Durante el debate, la declaración del imputado será recibida en la oportunidad y forma prevista especialmente. Luego de declarar, el imputado podrá ser interrogado por su propio defensor, y por las demás partes.
Sección Tercera
Defensores
ARTÍCULO 114°.- Defensa del imputado.- El imputado tendrá derecho a elegir como defensor de confianza a un abogado habilitado legalmente al efecto, o a defenderse personalmente salvo cuando de ello resulte un perjuicio evidente para la misma. En caso de no ejercer tales derechos, se le proveerá de oficio un defensor conforme a las normas aplicables que asegurarán la efectiva disponibilidad de defensa para todos los casos que requieren las disposiciones de este Código y según sus condiciones. Si el imputado se encontrara sufriendo una afección mental que excluyera su capacidad de entender o de querer los actos del procedimiento, el defensor será designado por su curador, si lo hubiere, o en su defecto se nombrará al defensor de oficio, para que ejercite su derecho de parte y, en su caso, éste último provea a su representación legal. En ningún caso el estado de incomunicación constituirá obstáculo alguno.
ARTÍCULO 115°.- Propuesta de terceros.- Cuando el imputado estuviera incomunicado, cualquier persona que tenga con él relación de parentesco o amistad podrá proponer un defensor, lo que se le hará saber a aquél de inmediato. La relación con el imputado no necesitará ser probada, bastando la manifestación bajo juramento del peticionario.
ARTÍCULO 116°.- Pluralidad de defensores.- El imputado podrá designar los defensores que considere convenientes, pero no será defendido simultáneamente por más de dos en las audiencias orales o en el mismo acto. Si el imputado tuviera más de un defensor, la notificación hecha a cualquiera de ellos valdrá para todos, y la sustitución de uno por otro no alterará trámites ni plazos. El defensor designado podrá sustituir facultades en un defensor auxiliar, para actuar en aquellas diligencias a las que no pudiera asistir personalmente. El defensor auxiliar sólo tendrá responsabilidad en aquellos actos en los que participe, pero ello no exime de responsabilidad al designado.
ARTÍCULO 117°.- Libertad de la defensa.- La defensa es completamente libre sin más restricciones que las impuestas por la ética, por el respeto debido a los jueces, a las partes y la observancia de las normas constitucionales y los trámites legales.
ARTÍCULO 118°.- Separación del defensor.- El Tribunal, aun de oficio, procederá a separar al defensor de confianza que abandonara el cargo al imputado sin defensa, incurriera en notorias omisiones o negligencia, provocara deliberadamente demoras en la sustanciación de la causa, o actuara en la defensa común incompatible de varios imputados. En tales casos será de aplicación lo dispuesto por el artículo 114 de este Código.
ARTÍCULO 119°.- Renuncia del defensor.- El defensor, en caso de renuncia al cargo, estará obligado a continuar en su desempeño hasta que el imputado proponga otro o le haya sido designado de oficio. Los plazos no se suspenderán en ningún caso. No se podrá renunciar durante las audiencias salvo imposibilidad manifiesta e imprevisible de ejercer razonablemente la defensa.
ARTÍCULO 120°.- Designación de oficio.- Si el imputado no nombrara defensor de confianza o hasta tanto el designado acepte el cargo o realice actos de defensa, asumirá su defensa un defensor designado de oficio, debiéndosele hacer saber al imputado el nombre del mismo. Para el caso de acumulación de causas, cuando así procediera, deberá oficiosamente nombrarse en todas ellas, al defensor de oficio correspondiente a la causa de atracción, dejándose sin efecto las designaciones de quienes pudieran haber actuado en las causas acumuladas.
ARTÍCULO 121°.- Deberes de los defensores de oficio.- Los defensores de oficio concurrirán a los institutos de detención y penitenciarios en los que se alojen sus defendidos para informarles sobre el estado de sus causas. En todos los casos tomarán conocimiento personal y directo de sus defendidos en el modo más inmediato posible.
ARTÍCULO 122°.- Sustitución del defensor de oficio.- Mediando causal de separación de las previstas en el Artículo 118 o cualquier otra que pueda perjudicar la eficacia de la defensa, el Tribunal, aún de oficio, podrá disponer que éste sea sustituido por quien corresponda según la normativa pertinente.
ARTÍCULO 123°.- Investidura.- Quien hubiera sido designado como defensor del imputado será tenido como tal desde el momento en que aceptara el cargo o realizara actos de defensa, pudiendo previamente examinar las actuaciones, salvo que se encontraran bajo reserva.
Sección Cuarta
Rebeldía
ARTÍCULO 124°.- Procedencia y declaración.- Será declarado rebelde el imputado que, sin grave impedimento, no compareciera a la citación, o se fugara del establecimiento o lugar donde estuviera detenido, o no obedeciera a una orden de detención, o se ausentara de la residencia fijada, sin licencia del Ministerio Público Fiscal o del Tribunal. La declaración de rebeldía será emitida por el Tribunal competente, a pedido de parte, previa constatación de la incomparecencia, fuga o ausencia, expidiendo orden de detención, si antes no se hubiera dictado. La orden se hará conocer también a las autoridades encargadas del control para salir del país, con mandato expreso de que lo impidan, y se inscribirá en el Registro Único de Antecedentes Penales que informará al Registro Nacional de Reincidencia, con todos los recaudos de una solicitud de extradición interna, que valdrá a ese efecto cuando el imputado fuera aprehendido en otro lugar del país.
ARTÍCULO 125°.- Efectos de la rebeldía.- La declaración de rebeldía no suspenderá la Investigación Penal Preparatoria, pero no podrá formularse la requisitoria de acusación prevista por el artículo 294, reservándose las actuaciones y otros efectos, instrumentos o piezas de convicción que fueran indispensable conservar. Si la rebeldía se declarara luego de la apertura del juicio habiendo comparecido el imputado a la primera audiencia, no impedirá su total sustanciación y el dictado de la sentencia. En tal caso el imputado rebelde será representado por su defensor o se le designará otro de oficio, y se lo considerará presente para todos los efectos de este Código. La declaración de rebeldía del imputado lo obligará al pago de las costas provocadas por su contumacia, originando la reanudación o el nuevo examen de la coerción personal que corresponda.
