LIBRO II
ACTIVIDAD PROCESAL
TÍTULO I
Los actos procedimentales
Capítulo I
Disposiciones Generales
ARTÍCULO 126°.- Idioma. Designación de intérprete.- En todos los actos del procedimiento, para que no sean invalidados, se utilizará el idioma nacional. Cuando éste no fuera conocido por la persona a quien deba brindársele información o deba requerírsele declaración, se le designará de oficio un intérprete, sin perjuicio de aceptarse la participación de aquél que la misma proponga. De igual manera se procederá cuando por imposibilidad física no pudiera oír o expresarse, aunque en tal caso podrá establecerse la comunicación por escrito.
ARTÍCULO 126° bis.- Audiencias presenciales y remotas. Las audiencias se celebrarán de forma presencial con la comparecencia personal del Juez o Tribunal, y en su caso de los jurados, de las partes y de los demás intervinientes. Respecto de los privados de libertad, ésta sólo será exigible en los casos que establezca la legislación respectiva. A petición de parte y por resolución fundada, y siempre que no se conculque el derecho de defensa del imputado o pudieren resentirse manifiestamente las postulaciones de las partes o la capacidad del Juez o Tribunal de obtener adecuada información para emitir resolución, las audiencias podrán celebrarse por videoconferencia u otro sistema remoto cuando ello fuera tecnológicamente viable. En tal caso, bajo sanción de nulidad, el Tribunal, y en su caso los jurados, deberán comparecer de forma presencial.
( Artículo 126 bis incorporado por el Artículo 3 la Ley N° 14392 )
ARTÍCULO 127°.- Audiencias diversas al juicio. En las audiencias que tengan lugar durante la investigación, el procedimiento intermedio o la ejecución penal, como así también en sus respectivas apelaciones, se observarán las siguientes reglas: 1) El Tribunal dirigirá la audiencia debiendo escuchar a todas las partes en la medida necesaria para que éstas expongan sucintamente sus argumentos principales y quede establecido qué puntos se consideran controvertidos, pudiendo limitar temporalmente el uso de la palabra o exigir que los planteos se concreten de forma clara y directa. A tal fin, podrá requerirles que aclaren o precisen sus postulaciones. 2) El Tribunal basará sus decisiones en la evidencia testimonial, material y documental enunciada por las partes, y se abstendrá de ordenar medidas que resulten dilatorias o ajenas a la temática debatida. En las audiencias de ejecución podrá tener contacto con los informes remitidos por el Servicio Penitenciario. 3) El Tribunal resolverá verbalmente en la misma audiencia con motivación suficiente, quedando prohibido el diferimiento de la resolución o de sus fundamentos en extenso, salvo para la resolución prevista en el artículo 303 y en su respectiva apelación. 4) De no mediar controversia entre las partes, por presentación conjunta podrán acordar su postura sobre la cuestión a decidir. En este caso, el Tribunal prescindirá de convocar a audiencia y resolverá directamente sobre la base de la evidencia testimonial, material y documental acompañada por las partes. El Tribunal deberá rechazar la presentación conjunta cuando considere que lo acordado viola una disposición de orden público.
( Artículo 127 modificado por el Artículo 4 la Ley N° 14392 )
ARTÍCULO 128°.- Documentos en idioma extranjero.- Cuando se presentaran documentos en idioma extranjero, deberá acompañarse su traducción realizada por traductor público matriculado o, en su defecto, persona designada por el Tribunal.
ARTÍCULO 129°.- Día y hora de cumplimiento.- Los actos procedimentales deberán cumplirse en días y horas hábiles, salvo los de la Investigación Penal Preparatoria. Sin embargo para el debate el Tribunal podrá habilitar los días y horas que estimara necesarios. Se consideran días y horas hábiles los señalados por el Código Procesal Civil y Comercial de Santa Fe.
ARTÍCULO 130°.- Juramento o compromiso de decir verdad.- Cuando se requiera la prestación de juramento o compromiso de decir verdad, se recibirá, para que no sea invalidado, por las creencias religiosas del que jure, o por su honor en caso de no profesarlas, después de instruirlo de las penas que la ley impone a la falsedad. El declarante jurará o se comprometerá a decir verdad de todo cuanto supiera y le fuera preguntado, mediante la fórmula: "lo juro" o "me comprometo".
ARTÍCULO 131°.- Manifestaciones y su documentación.- Las manifestaciones personales se recibirán en la forma y modalidad que asegure la cabal intelección de su contenido y la publicidad del juicio. Se documentarán en la medida exigida por la ley, por la reglamentación y atendiendo a la eficacia de su destino probatorio. El contenido de lo documentado deberá garantizar la fidelidad del acto, dejándose constancia de los datos necesarios para su individualización y para la salvaguarda de la defensa en juicio. Cuando una persona produzca declaraciones en cualquier acto del procedimiento, quien la reciba deberá preservar la dignidad del declarante así como la eficacia de la comunicación que se entable.
ARTÍCULO 132°.- Deber de lealtad.- Es deber de las partes y de sus representantes comportarse en el curso del procedimiento penal de acuerdo a los principios de lealtad, probidad y buena fe, evitando incurrir en actitudes sorpresivas o en conductas que impliquen un abuso del derecho procesal. Superado el período de reserva, los integrantes del Ministerio Público Fiscal deberán permitir a las partes y a su solicitud, todos los elementos de convicción, de cargo y de descargo que se hubieran reunido o conocido a lo largo de todo el procedimiento penal, considerándose falta grave su ocultamiento.
ARTÍCULO 133°.- Explicaciones, advertencias y facultad de testar. Sin perjuicio de las facultades disciplinarias y de la remisión en su caso de los antecedentes a los Colegios Profesionales, al Fiscal General del Ministerio Público de la Acusación o al Defensor Provincial del Servicio Público Provincial de Defensa Penal, quien presida el Tribunal podrá suspender brevemente la audiencia para requerir la presencia de todas las partes o de sus profesionales al despacho privado, a fin de solicitarles explicaciones por la conducta asumida. Luego de oírlas, podrá formular advertencias para evitar nuevos incidentes y asegurar el normal desarrollo del debate. Del mismo modo, cuando se proceda por escrito, el Tribunal, de oficio o a pedido de parte, podrá mandar que se teste toda frase injuriosa o redactada en términos indecorosos u ofensivos, e incluso devolver el escrito cuando fuera manifiestamente impertinente, dejándose constancia.
( Artículo 133 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 134°.- Expedición de copias e informes.- Se autorizará la expedición de copia o informe de las actuaciones cumplidas, cuando fueran solicitados por quien acredite interés legítimo en obtenerlos, y siempre que no se perjudique la eficacia de la Investigación Penal Preparatoria.
Capítulo II
Actos y resoluciones judiciales
ARTÍCULO 135°.- Poder coercitivo.- En el ejercicio de sus funciones, el Tribunal y el Ministerio Público Fiscal, podrán disponer la intervención de la fuerza pública y todas las medidas necesarias para el seguro y regular cumplimiento de los actos que ordenen.
ARTÍCULO 136°.- Actos fuera del asiento.- A pedido de parte, el Tribunal podrá constituirse fuera de su asiento, en cualquier lugar de la Provincia, cuando estimara indispensable conocer directamente elementos probatorios decisivos. En tal caso, si correspondiera, avisará al Tribunal de la respectiva competencia territorial. Asimismo, podrá ordenar, aún de oficio, la realización de la audiencia del debate fuera de su asiento pero dentro del ámbito de su competencia territorial, cuando así lo aconsejara una mayor eficacia en la producción probatoria y la publicidad del juicio.
ARTÍCULO 137°.- Resoluciones.- Las decisiones del Tribunal serán dadas por sentencia, auto, decreto o providencia y procederá cada una de ellas cuando este Código así lo determine.
ARTÍCULO 138°.- Resoluciones de los Tribunales Colegiados.- A fin de emitir pronunciamiento los miembros de Tribunales Colegiados establecerán los puntos sobre los que sea necesaria decisión. Acordarán un orden lógico de tratamiento de los mismos que permita resolver paulatinamente aquellos cuya definición resulte presupuesto de los otros; lo que se resuelva al respecto será tenido como definitivo a los efectos de la apreciación de los demás temas, debiendo sobre ellos pronunciarse los jueces no obstante la opinión que hubieran podido emitir anteriormente. Si no se obtiene mayoría respecto al monto de la pena deberá aplicarse el término medio de todos los votos.
ARTÍCULO 139°.- Plazos.- Los Tribunales dictarán los decretos dentro de las cuarenta y ocho horas en que el expediente sea puesto a despacho, los autos dentro de los cinco días, salvo que se disponga otro plazo menor, y, las sentencias dentro de los plazos especialmente establecidos. El Ministerio Público Fiscal proveerá dentro del plazo de cuarenta y ocho horas las instancias que le formulen los habilitados para deducirlas, salvo que se disponga otro plazo.
ARTÍCULO 140°.- Fundamentación. Las sentencias y los autos, así como las resoluciones del Ministerio Público de la Acusación, deberán ser motivados para no ser invalidados. Los decretos y providencias se motivarán cuando la ley expresamente lo imponga para su validez. El jurado rinde su veredicto según su leal saber y entender, sin expresión de los motivos de su decisión. Las instrucciones del Tribunal al jurado, el requerimiento acusatorio y el registro de la audiencia constituyen plena y suficiente base para el control amplio de la decisión.
( Artículo 140 modificado por el Artículo 5 la Ley N° 14258 )
ARTÍCULO 141°.- Copia auténtica.- Cuando por cualquier causa se destruyera, perdiera o sustrajera el original de una sentencia o de la documentación de otros actos procesales, la copia auténtica tendrá el valor de aquella.
ARTÍCULO 142°.- Publicidad. Las audiencias serán públicas, a menos que el Tribunal, atendiendo a las circunstancias del caso dispusiera lo contrario, mediante resolución fundada. Las sentencias y los autos podrán ser dados a publicidad, salvo que la naturaleza del proceso o razones de decoro aconsejaran su reserva. Si afectaran la intimidad, tranquilidad o seguridad de la víctima o de terceros, sus nombres serán eliminados de las copias para la publicidad. La publicidad de las audiencias deberá garantizarse y promoverse activamente. En particular, en los pasillos o lugares de acceso público de los Tribunales Penales deberá exhibirse públicamente la agenda de audiencias del día, con indicación de horario, sala, causa y magistrados intervinientes.
( Artículo 142 modificado por el Artículo 6 la Ley N° 14258 )
ARTÍCULO 143°.- Documentación. Las audiencias donde se desarrollen actos sujetos a impugnación, y la audiencia de debate en juicio oral en todo caso, serán documentadas por registro de audio y video, según establezca la reglamentación. La forma en que se registró la audiencia se hará constar en acta.
( Artículo 143 modificado por el Artículo 7 la Ley N° 14258 )
Capítulo III
Comunicaciones
ARTÍCULO 144°.- Regla.- Cuando un acto procesal se deba ejecutar por intermedio de otra autoridad se podrá encomendar su cumplimiento por oficio.
ARTÍCULO 145°.- Comunicación directa.- Los órganos judiciales podrán dirigirse directamente a cualquier autoridad de la Provincia, requiriendo informes o documentos, la que prestará su cooperación, sin demora alguna y dentro del plazo que, en su caso, se fije. Este artículo rige también con respecto a los informes y documentos requeridos a las entidades privadas y a los particulares. El incumplimiento por parte del requerido dará lugar a la aplicación por el Tribunal, de oficio o a solicitud de parte, de una sanción de hasta quince (15) días multa, sin perjuicio de las responsabilidades administrativas y penales en que pudiera haber incurrido. Esta norma será transcripta en la comunicación pertinente.
ARTÍCULO 146°.- Comunicaciones con otras jurisdicciones.- Las comunicaciones con otras jurisdicciones dentro del país o del extranjero serán diligenciadas sin retardo, de acuerdo con las leyes vigentes, con la reglamentación que se dicte, y en su caso siguiendo la vía diplomática en la forma prescripta por los tratados o costumbres internacionales.
Capítulo IV
Notificaciones, citaciones y emplazamientos
ARTÍCULO 147°.- Normas reglamentarias. Las resoluciones, citaciones, emplazamientos, vistas y traslados se comunicarán por medios electrónicos de conformidad con las normas prácticas que disponga la Corte Suprema de Justicia. Las normas prácticas deberán asegurar que las comunicaciones se hagan a la brevedad, sin excesos formales, y ajustadas a los siguientes principios: 1) que transmitan con claridad, precisión y en forma completa el contenido de la resolución o de la actividad requerida y las condiciones o plazos para su cumplimiento; 2) que contengan los elementos necesarios para asegurar la defensa y el ejercicio de los derechos y facultades de las partes; 3) que adviertan suficientemente al imputado o a la víctima cuando el ejercicio de un derecho esté sujeto a un plazo o condición. No obstante las normas prácticas dictadas, las partes podrán acordar expresamente en cada caso una modalidad de comunicación efectiva de acuerdo con las posibilidades técnicas a las que ellas tengan acceso y el juez o tribunal.
( Artículo 147 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 148°.- Domicilio legal y forma de notificación. Al comparecer en cualquier acto del procedimiento, las partes deberán constituir domicilio procesal dentro del radio urbano de la ciudad donde tenga su asiento el Tribunal y forma de notificación electrónica u otro mecanismo que establezca la reglamentación. El imputado tendrá derecho a optar en la forma de notificación, conforme lo dispuesto en el artículo 104. Cuando interviniera otro Tribunal con distinto asiento, las partes tendrán que fijar un nuevo domicilio procesal.
( Artículo 148 modificado por el Artículo 8 la Ley N° 14258 )
ARTÍCULO 149°.- Notificaciones. - Al imputado se le notificarán personalmente las sentencias que impongan penas de cumplimiento efectivo y las resoluciones que resuelvan sobre su prisión preventiva o le denieguen su libertad. Las demás sentencias condenatorias y resoluciones del Tribunal se notificarán de conformidad con las normas prácticas que disponga la Corte Suprema de Justicia de acuerdo al artículo 147. Todas las resoluciones deberán ser también notificadas al defensor del imputado. Cuando las resoluciones se dictaran en audiencia, tal circunstancia servirá como notificación personal a los intervinientes.
( Artículo 149 modificado por el Artículo 1 la Ley N° 13405 )
ARTÍCULO 150°.- Apercibimiento.- Toda citación se hará bajo apercibimiento de ser traída la persona citada por la fuerza pública si no diere cumplimiento a la orden judicial, la que se hará efectiva sin más trámite y de inmediato, salvo causas justificadas, sin perjuicio de la responsabilidad penal que corresponda y de las costas que causara.
ARTÍCULO 151°.- Plazo de las vistas y traslados.- Las vistas y traslados que debieran evacuarse por escrito y no tuvieran fijado un plazo por este Código o por el Tribunal, se considerarán corridas por tres días.
Capítulo V
Plazos
ARTÍCULO 152°.- Reglas generales.- Los actos procesales se practicarán en los plazos establecidos. El cómputo de los mismos se contará a partir de cada notificación o, si fueran comunes, desde la última practicada en la forma prevista por el Código Procesal Civil y Comercial. No se contará el día en que tuviera lugar la diligencia ni los inhábiles. Los plazos de horas se contarán desde la siguiente a la de la notificación y correrán aún durante las inhábiles.
ARTÍCULO 153°.- Prórroga especial.- Si el término fijado venciera después de las horas de oficina, el acto que deba cumplirse en ella podrá ser realizado durante las dos primeras horas hábiles del día siguiente.
ARTÍCULO 154°.- Carácter.- Los plazos serán improrrogables y perentorios, operando la caducidad por su solo vencimiento, salvo los establecidos para que las partes cumplan una actividad indispensable en el proceso.
ARTÍCULO 155°.- Abreviación y ampliación.- La parte a cuyo favor se hubiera establecido un plazo, podrá renunciarlo o consentir su abreviación mediante manifestación expresa. Las partes podrán acordar la modificación de los plazos que este Código les fija para cumplir actividades procesales. El acuerdo deberá ser comunicado al Tribunal interviniente.
ARTÍCULO 156°.- Observancia de los plazos. Los Tribunales y el Ministerio Público de la Acusación estarán obligados a cumplir y a hacer cumplir los plazos establecidos durante el procedimiento. La inobservancia de los plazos, hará pasibles a los Jueces, Fiscales y, en su caso, Defensores Públicos oficiales, de correcciones disciplinarias a aplicar aún de oficio por el Fiscal General del Ministerio Público de la Acusación, el Defensor Provincial del Servicio Público de la Defensa Penal o la Corte Suprema de Justicia, según el caso, sin perjuicio de otras medidas que legalmente correspondieran. Los profesionales que tuvieran participación en el procedimiento penal, y no cumplieran con los plazos establecidos, serán sancionados disciplinariamente, aun de oficio por el Tribunal, sin perjuicio de ser separados de la causa y remitirse sus antecedentes al Tribunal de Disciplina del Colegio respectivo o a quien correspondiere.
( Artículo 156 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 157°.- Retardo de justicia. Vencido el término en que se deba dictar resolución, el interesado podrá deducir pronto despacho y si dentro de tres días no la obtuviere, podrá interponer queja por el retardo ante el Superior. El Presidente del Tribunal ordenará al denunciado que informe dentro del plazo que le señalará. Si la queja fuera procedente el Superior fijará un plazo prudencial para que se pronuncie. Si la demora fuere imputable al Presidente o a un miembro del Tribunal la queja deberá formularse ante la Corte Suprema de Justicia.
ARTÍCULO 158°.- Demora en las medidas cautelares personales.- Cuando se haya planteado la revisión de una medida cautelar privativa de libertad o se haya impugnado la resolución que deniega la libertad y el Juez o Tribunal no resuelvan dentro de los plazos establecidos en este Código, el imputado podrá interponer pronto despacho y, si dentro de las veinticuatro horas no obtiene resolución se tendrá por concedida la libertad. En este caso el Juez o Tribunal que conforme a la ley sea reemplazante, ejecutará la libertad y comunicará la situación a la Corte Suprema de Justicia.
TÍTULO II
Prueba
Capítulo I
Disposiciones generales
ARTÍCULO 159°.- Libertad probatoria.- Todos los hechos y circunstancias relacionados con el objeto del proceso podrán ser acreditados por cualquier medio de prueba, salvo las excepciones previstas por las leyes. Todo medio de prueba, para ser admitido, deberá referir directa o indirectamente al objeto de la averiguación. Los Tribunales podrán limitar los medios de prueba ofrecidos para demostrar un hecho o una circunstancia cuando ellos resulten manifiestamente superabundantes o impertinentes. Cuando se postule un hecho como notorio, el Tribunal, con el acuerdo de las partes, podrá prescindir de la prueba ofrecida para demostrarlo, declarándolo comprobado. El acuerdo podrá ser provocado de oficio por el Tribunal.
ARTÍCULO 160°.- Tratamiento especial para menores de edad.- Siempre que se considere la intervención en un acto de un menor de dieciocho años, se atenderá primordialmente a la preservación del interés superior del mismo. A tal fin, se evitará toda exposición que fuera prescindible o, si no lo fuera, se procurará impedir que directa o indirectamente resulten del procedimiento consecuencias potencialmente dañosas para el pleno y armonioso desarrollo de su personalidad. Cuando se disponga la intervención en un acto de un menor, y conforme a su edad, se acordará intervención a un equipo multidisciplinario, que aconsejará acerca de la forma de producción del mismo y actuará en él, emitiendo opinión acerca de su valoración. En caso de necesidad y urgencia podrá suplirse la intervención de este equipo por profesionales o personas de manifiesta idoneidad, que se designen. La Corte Suprema de Justicia establecerá la conformación del equipo multidisciplinario antes aludido y proveerá lo necesario para que los actos en que tenga que intervenir un menor se desarrollen en ambientes adecuados conforme a los conocimientos técnicos disponibles al efecto.
ARTÍCULO 160 bis.- Cámara Gesell. Siempre que fuere posible, las declaraciones de las víctimas en situación de vulnerabilidad, aún siendo mayores de edad, serán entrevistadas por un psicólogo designado por el Tribunal que ordene la medida, no pudiendo en ese caso ser interrogado en forma directa por las partes. Cuando se cuente con los recursos necesarios, las víctimas serán recibidas en una "Sala Gesell", disponiéndose la grabación de la entrevista en un soporte audiovisual. Se deberá notificar al imputado y a su defensa de la realización de dicho acto. El acto se seguirá desde el exterior del recinto. Previo al inicio del mismo, el Tribunal hará saber al profesional a cargo de la entrevista el interrogatorio propuesto por las partes, así como las inquietudes que surgieran durante el transcurso de la misma, las que serán consideradas teniendo en cuenta las características del hecho y el estado emocional de la víctima. En aquellos procesos en que no exista un imputado identificado, los actos serán desarrollados con control judicial, previa notificación al Defensor Público Oficial.
( Artículo 160 bis incorporado por el Artículo 8 la Ley N° 14181 )
ARTÍCULO 161°.- Valoración.- La valoración que se haga de las pruebas producidas durante el proceso será fundamentada con arreglo a la sana crítica racional.
ARTÍCULO 162°.- Exclusiones probatorias.- Carecerá de toda eficacia la actividad probatoria cumplida vulnerando garantías constitucionales. La ineficacia se extenderá a todas aquellas pruebas que, con arreglo a las circunstancias del caso, no hubieran podido ser obtenidas sin su violación y fueran consecuencia necesaria de ella.
Capítulo II
Inspección y reconstrucción
ARTÍCULO 163°.- Inspección judicial. Mediante la inspección se comprobará el estado de las personas, lugares y cosas, los rastros y otros efectos materiales que hubiera, de utilidad para la averiguación del hecho o la individualización de los partícipes en él. De ella se labrará acta que describirá detalladamente esos elementos y, cuando fuera posible, se recogerán o conservarán los elementos probatorios útiles. La Fiscalía ordenará la individualización, recolección y/o toma de muestras de rastros biológicos y/ o genéticos no individualizados en el lugar del hecho que permitan obtener huellas genéticas para su incorporación al Registro Provincial de Huellas Genéticas Digitalizadas. Las inspecciones que por sus características exijan descripciones especiales u operaciones técnicas, serán realizadas de tal modo que no se afecte la dignidad o la salud de la persona.
( Artículo 163 modificado por el Artículo 19 la Ley N° 14374 )
ARTÍCULO 164°.- Levantamiento e identificación de cadáveres.- En caso de muerte violenta o sospechosa de criminalidad, antes de procederse a la inhumación del cadáver, se realizará la inspección corporal preliminar, la descripción de la situación o posición del cuerpo y de la naturaleza de las lesiones o heridas, sin perjuicio de otras medidas que se estimen adecuadas. Se procurará su identificación. Luego de realizadas las operaciones de rigor, se procederá a levantar el cuerpo disponiendo su traslado a los gabinetes médicos o lugar donde se practicará la autopsia, su identificación final y la entrega a sus familiares.
ARTÍCULO 165°.- Autopsia.- Cuando de la percepción exterior de la inspección corporal preliminar, no se conozca de manera manifiesta e inequívoca la causa de la muerte, se procederá, del modo más pronto posible, a la autopsia del cadáver para establecer la naturaleza de las lesiones, el modo y la causa del fallecimiento y sus circunstancias. La autopsia será practicada por médicos forenses, en lo posible con experiencia en tanatología, o, en su caso, por los peritos que se designen. Si el Ministerio Público no ha solicitado la realización de la autopsia, las otras partes podrán solicitar al Tribunal que la ordene, conforme a las reglas de los actos irreproducibles.
ARTÍCULO 166°.- Reconstrucción del hecho.- Se podrá disponer la reconstrucción del hecho, en las condiciones en que se afirme o se considere haberse producido. Cuando para la reconstrucción del hecho fuera necesaria la presencia activa del imputado, se requerirá previamente su conformidad y la asistencia de su defensor, como condición para la validez del acto.
ARTÍCULO 167°.- Registro.- Se podrá ordenar fundadamente el registro de lugares determinados. La orden de registro establecerá las condiciones de tiempo y modo, así como las medidas precautorias a adoptar, para evitar molestias innecesarias.
ARTÍCULO 168°.- Requisa.- La requisa personal deberá justificarse fundadamente cuando hubiera motivos razonables para presumir que alguien oculta consigo cosas relacionadas con un delito. Antes de proceder a la requisa se lo invitará a exhibir el objeto cuya ocultación se presume. Se podrá registrar un vehículo, siempre que haya motivos suficientes para presumir que una persona oculta en él objetos útiles vinculados a una investigación preexistente o cuando mediare fuerte presunción de que tales objetos son resultantes de la comisión de un delito o serán empleados para la inminente perpetración de un delito, lo que deberá hacerse constar así. Se asegurará el respeto por la dignidad del requisado.
ARTÍCULO 169°.- Allanamiento. Cuando el registro deba efectuarse en lugar habitado, casa de negocio o en sus dependencias y siempre que no se contara con la autorización libre y previamente expresada por quien tenga derecho a oponerse, el Tribunal, a solicitud fundada, autorizará el allanamiento con la mayor celeridad posible. La medida podrá ser cumplida personalmente por el Juez, o en su defecto éste expedirá autorización escrita en favor del Fiscal, o del funcionario judicial o policial a quien se delegue su cumplimiento, y comunicada por cualquier medio, incluso electrónico o informático. Si la diligencia fuera practicada por la Policía será aplicable en lo pertinente el artículo 268 inciso 6) y la diligencia deberá ser filmada desde el inicio del procedimiento. El Juez podrá, de manera fundada, eximir el cumplimiento del recaudo de filmación. La diligencia deberá autorizarse individualizando los objetos a secuestrar o las personas a detener. En cuanto a los objetos, podrá prescindirse de dicha individualización, dando suficientes razones de tal imposibilidad, brindando todos los detalles conducentes a la misma. La diligencia sólo podrá comenzar entre las siete (7) y las veintiún (21) horas. Sin embargo, se podrá autorizar a proceder en cualquier hora cuando el interesado o su representante lo consientan, o en los casos graves y que no admitan demora por el riesgo de frustrarse la investigación, o cuando peligre el orden público. La autorización del allanamiento será exhibida al que habita u ocupa el lugar donde deba efectuarse, o cuando estuviere ausente, a su encargado a falta de éste, a cualquier persona mayor de edad que se hallare en el lugar, prefiriendo a los familiares del primero. A la persona se le invitará a presenciar el registro. Cuando no se encontrare a nadie, ello se hará constar en el acta. Si en el acto se hallaren objetos que presumiblemente estuvieran relacionados a otros hechos delictivos o armas de fuego cuya tenencia no estuviera legalmente justificada, deberán ser secuestrados informando al Juez. Practicado el registro, se consignará en el acta su resultado, con expresión de todas las circunstancias útiles para la investigación. El acta será firmada por los concurrentes. Si alguien no lo hiciere se expondrá la razón. La autorización no será necesaria para el registro de los edificios públicos y oficinas administrativas, los establecimientos de reunión o de recreo, el local de las asociaciones, cualquier otro lugar cerrado que no esté destinado a habitación o residencia particular. En estos casos deberá darse aviso a las personas a cuyo cargo estuvieren los locales, salvo que ello fuere perjudicial a la investigación. Cuando para el cumplimiento de sus funciones o por razones de higiene, para prevenir daños ambientales o inundaciones, moralidad u orden público, alguna autoridad nacional, provincial, municipal o comuna competente necesite practicar registros domiciliarios, solicitará directamente al Juez autorización de allanamiento, expresando los fundamentos del pedido. El Juez resolverá la solicitud pudiendo requerir que se amplíe la información que se estime pertinente y ordenará los recaudos para su cumplimiento.
( Artículo 169 modificado por el Artículo 9 la Ley N° 14258 )
ARTÍCULO 170°.- Allanamiento sin autorización judicial. No será necesaria la autorización de allanamiento cuando la medida se deba realizar mediando urgencia que se justifique por: 1) incendio, inundación u otra causa semejante que ponga en peligro la vida o los bienes de los habitantes; 2) búsqueda de personas extrañas que hubieran sido vistas mientras se introducían en un local o casa, con indicios manifiestos de cometer un delito; 3) persecución de un imputado o presunto autor de delito que se hubiera introducido en un local o casa; 4) indicios de que en el interior de una casa o local se estuviera cometiendo un delito, o desde ella se solicitara socorro; 5) existencia de objetos o efectos relacionados con la comisión de un delito que pudieran ser advertidos a simple vista o con el auxilio de medios técnicos; 6) inmuebles abandonados o visiblemente intrusados; 7) en los supuestos de homicidios, amenazas y extorsiones, en contexto de criminalidad organizada o de conmoción pública, el Fiscal podrá disponer el allanamiento de un lugar habitado, casa de negocio o sus dependencias, o lugares comprendidos en un ámbito territorial determinado, según la gravedad y complejidad de los hechos investigados y el peligro que la demora pudiera acarrear para la investigación o para la seguridad pública. En todos los casos, deberá anoticiar al Juez por cualquier medio; 8) si durante la ejecución de una medida surgieren elementos serios y verosímiles que indiquen la necesidad de allanar lugares contiguos o adyacentes, y hubiere peligro de pérdida de la evidencia. En los supuestos de los incisos 5, 6, 7 y 8, la legalidad del allanamiento será controlada de oficio por el Juez, dentro de las veinticuatro (24) horas de concluida la medida. En su caso, la declaración de ilegalidad hará viable la exclusión probatoria de las evidencias que hubieran sido halladas, pero no impedirá la destrucción del material cuya tenencia estuviera prohibida o constituyera un riesgo para la seguridad pública.
( Artículo 170 modificado por el Artículo 10 la Ley N° 14258 )
ARTÍCULO 171°.- Interceptación de correspondencia e intervención de comunicaciones. El Tribunal, a pedido de partes, podrá autorizar por decreto fundado, la interceptación o el secuestro de la correspondencia postal, telegráfica o electrónica, o de todo otro efecto remitido o destinado al imputado o a terceros, aunque sean bajo nombres supuestos. Del mismo modo, se podrá autorizar la intervención de las comunicaciones del imputado o de terceros, cualquiera sea el medio técnico utilizado, para impedirlas o conocerlas.
( Artículo 171 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 172°.- Exclusiones.- No podrá secuestrarse válidamente, la documentación o grabación que se enviara, entregara u obrara en poder de los abogados para el eventual desempeño profesional, ni intervenirse o interceptarse en los mismos casos, las comunicaciones.
Capítulo III
Testigos
ARTÍCULO 173°.- Obligatoriedad.- Toda persona tendrá el deber de concurrir cuando fuera citada a fin de prestar declaración testimonial, excepción hecha de que se encontrara físicamente impedida en cuyo caso prestará declaración en su domicilio. Deberá declarar la verdad de cuanto supiere y le fuere preguntado, salvo las excepciones establecidas por la ley. El testigo podrá presentarse en forma espontánea, lo que se hará constar.
ARTÍCULO 174°.- Protección especial.- Las partes podrán solicitar al Tribunal la protección de un testigo con el objeto de preservarlo de la intimidación y represalia. El Tribunal acordará la protección cuando el peligro invocado, la gravedad de la causa y la importancia del testimonio, lo justificaran, impartiendo instrucciones precisas para el eficaz cumplimiento de la medida.
ARTÍCULO 175°.- Tratamiento especial.- Podrán solicitar que su declaración se lleve a cabo en el lugar donde cumplieran sus funciones o en su domicilio: El presidente y vicepresidente de la Nación, gobernadores, vicegobernadores, ministros, legisladores, fiscales de Estado, magistrados judiciales, oficiales superiores en actividad de las Fuerzas Armadas, integrantes de los ministerios públicos y rectores de las universidades oficiales del país, los ministros diplomáticos, los cónsules generales y los altos dignatarios de la Iglesia y los intendentes municipales de la Provincia.
ARTÍCULO 176°.- Informe escrito alternativo.- Cuando la índole de la información a suministrar así lo aconsejara, la declaración testimonial podrá ser reemplazada por un pedido de informe que se evacuará por escrito y bajo juramento. Si el informante fuera un particular, su firma deberá certificarse por autoridad judicial o escribano público.
ARTÍCULO 177°.- Facultad de abstenerse.- Podrán abstenerse de declarar y así serán previamente informados, quienes tengan con el imputado los siguientes vínculos: cónyuge, ascendientes o descendientes, parientes consanguíneos o por adopción hasta el cuarto grado, y por afinidad hasta el segundo grado. También podrán hacerlo los periodistas comprendidos en las leyes que reglamentan su actividad profesional sobre el secreto de las fuentes de información periodística, salvo que los interesados en su reserva expresamente los relevaren de guardar secreto.
ARTÍCULO 178°.- Testimonio inadmisible.- No podrán ser admitidas como testigos las personas que, respecto del objeto de su declaración, tuvieran el deber de guardar un secreto particular u oficial. En caso de ser citadas, deberán comparecer, explicar el motivo del cual surge la obligación de guardar secreto y abstenerse de declarar.
ARTÍCULO 179°.- Criterio judicial.- La parte que considerara errónea la invocación del testigo respecto a la facultad de abstenerse o la reserva del secreto, podrá solicitar al Tribunal que ordene su declaración.
ARTÍCULO 180°.- Incomunicación de los testigos.- Antes de declarar, los testigos no podrán comunicarse entre sí ni con otras personas. No podrán presenciar el debate, salvo que se considere imprescindible, y después de declarar, se podrá disponer su permanencia en la antesala.
ARTÍCULO 181°.- Citación y gastos.- La reglamentación dispondrá los modos de citación de los testigos, el pago de sus gastos si correspondiera.
Capítulo IV
Peritos
ARTÍCULO 182°.- Procedencia.- El Tribunal podrá ordenar el examen pericial a pedido de parte, cuando fuera pertinente para conocer o valorar algún hecho o circunstancia relativa a la causa, y fuese necesario o conveniente poseer conocimientos especializados en determinado arte, ciencia o técnica. El Tribunal determinará, en consecuencia, los puntos sobre los cuales a de versar la pericia.
ARTÍCULO 183°.- Calidad habilitante.- Los peritos deberán tener título de tales en la materia sobre la que han de expedirse, siempre que la profesión, arte o técnica, estuvieran reglamentados. De existir peritos oficiales, la designación recaerá en los que correspondan; en caso contrario, entre los funcionarios públicos, que en razón de su título profesional o de su competencia se encuentren habilitados para emitir dictamen acerca del hecho o circunstancia que se quiera establecer. En su defecto, si no los hubiera, y no mediando acuerdo de partes, deberá designarse a persona de idoneidad manifiesta.
ARTÍCULO 184°.- Obligatoriedad del cargo.- El designado como perito tendrá el deber de aceptar y desempeñar fielmente el cargo, salvo que tuviera un grave impedimento. En este caso deberá ponerlo en conocimiento del Tribunal al ser notificado de la designación. Los peritos no oficiales aceptarán el cargo bajo juramento.
ARTÍCULO 185°.- Incapacidad e incompatibilidad.- No podrán ser peritos: los menores de edad, los insanos, los que puedan abstenerse de declarar como testigos y los inhabilitados.
ARTÍCULO 186°.- Inhibición y recusación.- Sin perjuicio de lo dispuesto en el artículo anterior son causas legales de inhibición y recusación de los peritos, las enumeradas en el artículo 68. La parte que recusara a un perito deberá hacerlo por escrito dentro del plazo de tres días desde la notificación de la designación, expresando, bajo apercibimiento de inadmisibilidad, la causa de la recusación y la prueba que ofreciera. El incidente será resuelto luego de producida la prueba si la hubiera y oído el interesado.
ARTÍCULO 187°.- Facultades de las Partes. Asesores Técnicos.- Antes de comenzar las operaciones periciales, se comunicará a las partes la orden de practicar la pericia. Dentro del plazo de tres días, cualquiera de ellas podrá proponer otro perito para que dictamine conjuntamente con el ya designado. Podrán proponer fundadamente puntos de pericia y objetar los admitidos o propuestos por otras. Cuando alguna de las partes considere necesario ser asistida por un asesor en una ciencia, arte o técnica podrá designarlo, haciéndolo saber al Juez o Tribunal. El asesor técnico podrá presenciar las operaciones técnicas o periciales y hacer observaciones durante su transcurso, de las que se dejará constancia, aunque no emitirá dictamen. En las audiencias el asesor podrá acompañar a la parte con quien colabora, auxiliarla en los actos propios de su función e interrogar directamente, pero sólo a los peritos, traductores o intérpretes. Bajo la dirección de la parte a la que asiste podrá concluir sobre la prueba pericial.
ARTÍCULO 188°.- Ejecución.- El tribunal resolverá todas las cuestiones que se planteen. Los peritos practicarán juntos el examen, siempre que sea posible; las partes y sus asesores técnicos podrán asistir a él y solicitar las aclaraciones pertinentes, debiendo retirarse cuando los peritos comiencen la deliberación. Si algún perito, por negligencia o causa grave no concurre a realizar las operaciones periciales dentro del plazo otorgado, se ordenará su sustitución.
ARTÍCULO 189°.- Dictamen pericial.- El dictamen será fundado y contendrá una relación detallada, clara y precisa: de las operaciones practicadas y sus resultados, las observaciones de las partes o de sus asesores técnicos y las conclusiones que se formulen respecto de cada tema estudiado. Los peritos podrán dictaminar por separado cuando exista disparidad de opiniones entre ellos. El dictamen se presentará por escrito, firmado y fechado, sin perjuicio del informe oral en las audiencias.
ARTÍCULO 190°.- Peritos nuevos.- Cuando los informes sean dudosos, insuficientes o contradictorios, a pedido de parte el Tribunal podrá nombrar uno o más peritos nuevos, según la importancia del caso, para que lo examinen y amplíen o, si es factible y necesario, realicen otra vez la pericia.
ARTÍCULO 191°.- Auxilio judicial.- Se podrá ordenar la presentación o el secuestro de cosas y documentos, y la comparecencia de personas, si es necesario para llevar a cabo las operaciones periciales. También se podrá requerir al imputado y a otras personas que confeccionen un cuerpo de escritura, graben su voz o lleven a cabo operaciones semejantes. Cuando la operación sólo pueda ser ejecutada voluntariamente por la persona requerida y ella rehúse colaborar, se dejará constancia de su negativa y se dispondrá lo necesario para suplir esa falta de colaboración.
ARTÍCULO 192°.- Traductores e intérpretes.- En lo relativo a traductores e intérpretes, regirán analógicamente las disposiciones precedentes.
ARTÍCULO 193°.- Instituciones.- Cuando el peritaje se encomiende a una institución científica o técnica y en las operaciones deban intervenir distintos peritos o equipos de trabajo, se podrá elaborar un único informe bajo la responsabilidad de quien dirija los trabajos conjuntos, debiendo el mismo ser suscripto por todos los intervinientes.
Capítulo V
Reconocimientos y careos
ARTÍCULO 194°.- Reconocimiento de personas. Podrá ordenarse que se practique el reconocimiento de una persona para identificarla o establecer que quien la menciona o alude, efectivamente la conoce o la ha visto por cualquier medio físico o técnico del que se disponga, de manera indistinta.
( Artículo 194 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 195°.- Interrogatorio previo. Antes del reconocimiento, y previo juramento o promesa de decir verdad, a excepción del imputado, quien haya de practicarlo será interrogado para que describa a la persona de que se trata, y para que diga si la conoce o si con anterioridad la ha visto personalmente o en imagen. Este acto previo deberá realizarse observando cuidado, respeto y contención de la víctima o el testigo, prohibiéndose los comentarios o exigencias que impliquen alguna turbación o presión hacia el observador; asimismo, se pondrán a disposición de los mismos todas las medidas que la legislación establece en materia de protección de víctimas y testigos.
( Artículo 195 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 196°.- Formas del reconocimiento. Reconocimiento en rueda de personas. Después del interrogatorio se compondrá una fila de personas con otras tres (3) o más que tengan semejanzas exteriores con la que debe ser reconocida, y ésta elegirá su colocación entre aquellas. Si se procurara individualizar a una persona a la que se indica como perteneciente a un grupo determinado en cuanto a la identidad de sus componentes, podrán formarse filas de no menos de cuatro (4) integrantes sólo con los componentes de ese grupo. En uno u otro caso, quienes fueran objeto de la diligencia, no podrán negarse a su realización y deberán comparecer, en cuanto fuera posible, en las mismas condiciones en que pudieron ser vistos por quien practicará el reconocimiento, a cuyo fin se les impedirá que recurran a cualquier alteración en el físico o la vestimenta. En presencia de la fila o desde un punto en que no pueda ser visto, según se estimara oportuno, el deponente manifestará si allí se encuentra la persona a la que haya hecho referencia, invitándoselo a que, en caso afirmativo, la designe clara y precisamente. La diligencia se hará constar en acta, donde se consignarán todas las circunstancias útiles, incluso el nombre y domicilio de los que hubieran formado la fila, salvo que se practicara durante el debate. En caso que se disponga de otros medios técnicos de registración del acto, los mismos podrán ser utilizados de modo complementario. Podrá también realizarse, de modo indistinto, el reconocimiento de una persona en los términos del artículo 198 de este Código.
( Artículo 196 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 197°.- Pluralidad de reconocimientos.- Cuando varias personas deban reconocer a una, cada reconocimiento se practicará separadamente sin que aquéllas se comuniquen entre sí, pero en la Investigación Penal Preparatoria podrá labrarse una sola acta. Cuando fueran varias las personas a las que una deba identificar, el reconocimiento de todas podrá efectuarse en un solo acto.
ARTÍCULO 198°.- Reconocimiento por fotografías o video-imagen. Podrá también realizarse el reconocimiento de una persona mediante la utilización de fotografías o video-imágenes de la persona a reconocer. En ese caso, el número de personas a ser exhibidas no podrá ser inferior a siete (7), observándose en lo demás, las reglas del artículo 196.
( Artículo 198 modificado por el Artículo 2 la Ley N° 13746 )
ARTÍCULO 199°.- Reconocimiento o exhibiciones fotográficas. Prohibición. Las autoridades prevencionales se abstendrán de practicar reconocimiento o exhibiciones fotográficas respecto a personas sobre las que existan sospechas; en este caso, si la misma no pudiere ser habida, a través de la oficina técnica respectiva se elaborará un cuadernillo de fotos que será remitido al Fiscal para que, en su caso, proceda según el Artículo 194.
ARTÍCULO 200°.- Reconocimiento o exhibiciones fotográficas. Procedencia.- El preventor podrá mostrar a las víctimas o testigos álbumes de personas cuando se procure la individualización de personas desconocidas o sobre las que no existan sospechas, de la siguiente manera: 1) la diligencia deberá cumplimentarse con las formalidades establecidas en este capítulo. El acta además contendrá lugar, fecha y hora, identificación de la persona que intervenga, la individualización y conformación de los álbumes mostrados, las precisas palabras de quien practica la medida y cualquier circunstancia útil; 2) si la exhibición fotográfica brindare resultados positivos se remitirá al Fiscal, junto al acta respectiva, una copia de la fotografía señalada y, al menos, de otras cuatro inmediatas que compongan el álbum correspondiente; 3) será considerada falta grave, cualquier señalización de fotografías y exhibición deliberada y en fraude a la ley por el preventor.
ARTÍCULO 201°.- Otras medidas de reconocimiento.- Cuando el que haya de practicar la medida manifestara que desconoce la fisonomía de la persona a reconocerse, por imposibilidad física, visual o cualquier motivo distinto, pero que posee otros datos útiles, como la voz, marcas, señas u otras circunstancias particulares para su individualización, se procederá en cada caso a arbitrar la forma de realizarse el acto, respetándose en lo posible las pautas precedentes.
ARTÍCULO 202°.- Reconocimiento de cosas.- Antes del reconocimiento de una cosa, se invitará a la persona que deba verificarlo, a que la describa. En lo demás y en cuanto fuera posible, regirán las reglas que anteceden.
ARTÍCULO 203°.- Procedencia del careo.- Podrá ordenarse el careo de personas que en sus declaraciones hubieran discrepado sobre hechos o circunstancias importantes, pero el imputado no será obligado a carearse. Para que no sea invalidado, en el careo del imputado deberán observarse los requisitos previstos para su declaración.
ARTÍCULO 204°.- Forma del careo.- El careo se verificará entre dos personas. Para efectuarlo se leerán, en lo pertinente, las declaraciones que se reputen contradictorias. Se llamará la atención a los careados sobre las discrepancias a fin de que se reconvengan o traten de ponerse de acuerdo.
Capítulo VI
Técnicas especiales de investigación y prueba.
( Capítulo 6 incorporado por el Artículo 37 la Ley N° 14258 )
ARTÍCULO 204º bis.- Implementación de medidas probatorias. Podrán utilizarse técnicas especiales de investigación y prueba, con previa autorización judicial, para los delitos previstos en la Ley 23.737, en los artículos 125, 125 bis, 126, 127, 128 y 131 del Código Penal, y delitos cuya pena máxima en abstracto fuera superior a tres (3) años de prisión, cuando ello fuera necesario por la complejidad de la tarea investigativa, El Tribunal resolverá la petición sin sustanciación o en audiencia unilateral, haciendo constar en acta reservada la solicitud recibida, los fundamentos para su concesión, la duración de la medida autorizada y el plazo de revisión de la misma, y las condiciones y modalidades en la que habrán de ejecutarse. Las eventuales prórrogas se tramitarán de la misma forma.
( Artículo 204 bis incorporado por el Artículo 38 la Ley N° 14258 )
ARTÍCULO 204° ter.- Tipos. Podrán disponerse las siguientes medidas especiales de investigación y prueba: a) Agente encubierto: es el funcionario de las fuerzas de seguridad, de investigación judicial o de organismos de inteligencia que, con autorización judicial, presta su consentimiento y ocultando su identidad o utilizando una falsa se introduce en organizaciones delictivas, con el fin de identificar o detener a los autores, partícipes o encubridores, impedir la consumación de un delito, o reunir información y elementos de prueba necesarios para la investigación. Librada la autorización judicial, la designación del agente encubierto y la instrumentación necesaria para su protección está a cargo del Ministerio de Justicia y Seguridad o del organismo que en un futuro lo reemplace, que actuará en enlace permanente con la Fiscalía. b) Agente revelador: es el funcionario de las fuerzas de seguridad, de investigación judicial o de organismos de inteligencia designado a fin de ejecutar el transporte o compra, para sí o para terceros, de dinero, bienes, servicios, armas, o participar de cualquier otra actividad de una organización delictiva, con la finalidad de identificar a las personas implicadas en un delito, detenerlas, incautar los bienes, o de recolectar material probatorio que sirva para el esclarecimiento de los hechos ilícitos. El accionar del agente revelador no es de ejecución continuada ni se perpetúa en el tiempo, por lo tanto, no está destinado a introducirse en organizaciones delictivas. Librada la autorización judicial, la designación del agente encubierto y la instrumentación necesaria para su protección está a cargo del Ministerio de Justicia y Seguridad o del organismo que en un futuro lo reemplace, que actuará en enlace permanente con la Fiscalía. El Tribunal, a pedido del Ministerio Público de la Acusación, podrá establecer qué agentes habrán de llevar a cabo las tareas referidas actuando como agentes reveladores, teniendo a su cargo la designación del agente revelador y la instrumentación necesaria para su actuación. El Ministerio de Justicia y Seguridad o el organismo que en un futuro lo reemplace reglamentará las cuestiones atinentes a la procedencia, y forma de contraprestación económica, con noticia al fiscal y con quien actuará en relación directa. c) Informante: es la persona que, bajo reserva de identidad, aporta a las fuerzas de seguridad u otros organismos encargados de la investigación de hechos ilícitos, datos, informes, testimonios, documentación o cualquier otro elemento o referencia pertinente y útil que permita iniciar o guiar la investigación de hechos, pudiendo obtener a cambio un beneficio económico. No podrán ser informantes el personal que pertenezca o haya pertenecido a alguna de las fuerzas de seguridad u organismos de inteligencia del Estado. El Ministerio de Justicia y Seguridad o el organismo que en un futuro lo reemplace reglamentará las cuestiones atinentes a la forma de contraprestación económica. d) Entrega vigilada: la Fiscalía, con noticia inmediata al Tribunal, podrá autorizar que se postergue la detención de personas o secuestro de bienes cuando estime que la ejecución inmediata de dichas medidas puede comprometer el éxito de la investigación. También podrá disponer la suspensión de la entrega vigilada y ordenar la detención de los partícipes y el secuestro de los elementos vinculados al delito, si las diligencias pusieren en peligro la vida, la integridad de las personas o la aprehensión posterior de los partícipes del delito, sin perjuicio de que, si surgiere ese peligro durante las diligencias, los funcionarios públicos intervinientes de la entrega vigilada apliquen las normas de detención establecidas para el caso de flagrancia.
( Artículo 204 ter incorporado por el Artículo 39 la Ley N° 14258 )
ARTÍCULO 204º quater.- Reglas de actuación, Ningún integrante de las fuerzas de seguridad, policiales o de inteligencia podrá ser obligado a actuar como agente encubierto ni como agente revelador. La negativa a hacerlo no será tenida como antecedente desfavorable para ningún efecto. El agente encubierto, el agente revelador y el informante no serán convocados a juicio en ningún caso, y su declaración se ajustará a las previsiones del articulo 298. Si la declaración pudiera implicar un riesgo para su integridad o la de otras personas, o cuando pudiera frustrar intervenciones ulteriores del mismo agente, se emplearán los recursos técnicos necesarios para impedir que pueda identificarse al declarante por su voz o su rostro. La declaración prestada en estas condiciones deberá valorarse con especial consideración por el tribunal interviniente. No se ejercerá la acción penal contra el agente encubierto o el agente revelador que incurriere en un delito como consecuencia necesaria del desarrollo de la actuación encomendada, siempre que éste no implique poner en peligro cierto la vida o la integridad psíquica o física de una persona o la imposición de un grave sufrimiento físico o moral a otro. Cuando el agente encubierto, el agente revelador o el informante hubiesen resultado imputados en un proceso, harán saber confidencialmente su carácter a la Fiscalía o al Tribunal, quien en forma reservada recabarán la pertinente información de la autoridad que corresponda. Verificada la calidad en cuestión, se resolverá sin develar la verdadera identidad del imputado.
( Artículo 204 quater incorporado por el Artículo 40 la Ley N° 14258 )
ARTÍCULO 204º quinquies.- Registro de las medidas. Duración. Confidencialidad. Destrucción. Las medidas especiales de investigación previstas en el artículo 204 ter serán registradas mediante cualquier medio técnico idóneo que asegure la valoración de la información obtenida, debiendo resguardarse su inalterabilidad y la cadena de custodia. Las medidas especiales no podrán exceder de noventa (90) días, prorrogables por idéntico término y por única vez, por auto fundado, bajo pena de nulidad. Para los funcionarios encargados de efectuar la intervención y el resguardo rige el deber de confidencialidad y secreto respecto de la información obtenida por estos medios, excepto respecto de la autoridad que la haya requerido. Quienes incumplan este deber incurrirán en responsabilidad personal. El Tribunal dispondrá por auto fundado, a pedido de la Fiscalía, la destrucción ante la presencia de al menos dos (2) testigos del material registrado que no tenga vinculación con la causa.
( Artículo 204 quinquies incorporado por el Artículo 41 la Ley N° 14258 )
ARTÍCULO 204º sexies.- Individualización de personas por huellas genéticas digitalizadas. Deberá ordenarse la obtención de ácido desoxirribonucleico (ADN) del imputado con la finalidad de confeccionar huella genética digital para su inmediata incorporación al Registro Provincial de Huellas Genéticas Digitalizadas. Para tales fines, serán admisibles mínimas extracciones de sangre, saliva, piel, cabello u otras muestras biológicas, a efectuarse según las reglas del saber médico si no existiere perjuicio alguno para la integridad física de la persona sobre la que deba efectuarse la medida, según la experiencia común y la opinión del experto a cargo de la intervención. La misma será practicada del modo menos lesivo para la persona y sin afectar su pudor, teniendo especialmente en consideración su género y otras circunstancias particulares. El uso de las facultades coercitivas sobre el afectado por la medida en ningún caso podrá exceder el estrictamente necesario para su realización. Si se estimare conveniente, y siempre que sea posible alcanzar igual certeza con el resultado de la medida, podrá ordenarse la obtención de ácido desoxirribonucleico (ADN) por medios distintos a la inspección corporal, como el secuestro de objetos que contengan células ya desprendidas del cuerpo, para lo cual podrán ordenarse medidas como el registro domiciliario, la requisa personal o procedimientos inocuos que impliquen la descamación de células o piel. Asimismo, en el caso de un delito de acción pública en el que se deba obtener ácido desoxirribonucleico (ADN) de la presunta víctima del delito, la medida se practicará teniendo en cuenta tal condición, a fin de evitar su revictimización y resguardar los derechos específicos que tiene. En ningún caso regirá la facultad de abstención prevista en este Código. Si la persona que ha de ser objeto del examen, informada de sus derechos, consintiere en hacerlo, la Fiscalía ordenará que se practique sin más trámite. Ante su negativa, solicitará la orden judicial supletoria.
( Artículo 204 sexies modificado por el Artículo 20 la Ley N° 14374 )
ARTÍCULO 204º septies.- Arrepentido. La aplicación del artículo 41 ter del Código Penal se sujetará a las siguientes reglas: 1) El acuerdo podrá ser presentado hasta la formulación del requerimiento acusatorio previsto en el artículo 295, o en forma conjunta con éste, con aval de la Fiscalía Regional respectiva y de la Fiscalía General. La declaración del imputado será formalizada como anticipo jurisdiccional de prueba, según lo dispuesto en el artículo 298. La validez de esta declaración como prueba en contra del imputado que declara estará condicionada a la homologación judicial del acuerdo. 2) Se aplicarán en lo pertinente las normas relativas al procedimiento abreviado, no rigiendo la notificación previa al querellante, la facultad de expresar disconformidad ni la facultad de rechazo prevista en el primer párrafo del articulo 343. 3) El acuerdo será presentado ante el Tribunal de la Investigación Penal Preparatoria, que verificará el cumplimiento de los recaudos formales y procederá a su homologación. 4) A solicitud de la Fiscalía, la sentencia podrá diferir la reducción de pena derivada del artículo 41 ter del Código Penal, por un plazo de hasta dos (2) años. En este caso, la aplicación definitiva del beneficio estará sujeta al informe favorable de la Fiscalía, sobre la utilidad de la información brindada por el imputado. Cuando la reducción de la escala penal prevista por el artículo 41 ter del Código Penal aparezca como probable, podrá ser considerada para resolver la situación cautelar del imputado. 5) Homologado el acuerdo, la eventual declaración en juicio del imputado arrepentido se regirá por las normas relativas a la declaración de testigos, considerándose a todo efecto cesada su facultad de abstención y quedando sujeto a las penalidades que pudieran corresponder por la falsedad en su declaración. 6) Según las circunstancias del caso, el imputado arrepentido podrá ser incorporado al Programa Provincial de Acompañamiento y Protección de Víctimas y Testigos, de conformidad con la legislación respectiva.
( Artículo 204 septies incorporado por el Artículo 43 la Ley N° 14258 )
